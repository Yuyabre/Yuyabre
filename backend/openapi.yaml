    OrderitemsOrderItemsModification:
      type: object
      description: A modification pair for order items. When 'added' is not provided - 'removed' considered as out of stock. When 'added' is provided - it is a substitution for 'removed'
      required:
        - removed
      properties:
        removed:
          type: array
          items:
            $ref: '#/components/schemas/OrderitemsOrderItemRemoved'
        added:
          type: array
          items:
            $ref: '#/components/schemas/OrderitemsOrderItemAdded'
    OrderitemsOrderItemsModificationRejection:
      type: object
      required:
        - errorCode
      properties:
        errorCode:
          type: string
          description: The rejection reason.
          enum:
            - badRequestFormat
            - orderNotFound
            - removedItemNotFound
            - removedItemDuplicate
            - removedItemSubstitutionNotEnabled
            - addedItemNotFound
            - addedPriceIsGreaterThanRemoved
            - newTotalPriceLessThanOrEqualToZero
            - notSupported
            - afterModificationOrderShouldHaveAtLeastOneItem
            - other
        removed:
          type: object
          description: Supplied when error code is removedItemNotFound, removedItemDuplicate or removedItemSubstitutionNotEnabled
          $ref: '#/components/schemas/OrderitemsOrderItemRemoved'
        added:
          type: object
          description: Supplied when error code is addedItemNotFound
          $ref: '#/components/schemas/OrderitemsOrderItemAdded'
        pricing:
          type: object
          description: Detailed information when rejection happened due to pricing. Supplied when error code is addedPriceIsGreaterThanRemoved
          properties:
            orderItemsModification:
              type: object
              $ref: '#/components/schemas/OrderitemsOrderItemsModification'
            currency:
              type: string
              description: The currency of the items on the menu in ISO 4217 format, i.e. GBP, EUR, AUD or NZD
            priceDifference:
              type: number
              format: integer
              description: Price difference in the minor unit of the currency
        orderItemsModification:
          type: object
          description: Supplied when error code is equal to notSupported
          $ref: '#/components/schemas/OrderitemsOrderItemsModification'
        reasons:
          type: array
          description: A list of reasons. Supplied when error code is notSupported. The collection could be extended in the future as it is not finite hence clients should handle unknown enum values gracefully. 'other' reason should be used as a fallback
          items:
            type: string
            description: The reason
            enum:
              - oneToManySubstitution
              - manyToOneSubstitution
              - manyToManySubstitution
              - removedComplexItemInSubstitution
              - removedMealDealInSubstitution
              - addedMealDealInSubstitution
              - other
      example:
        errorCode: addedPriceIsGreaterThanRemoved
        pricing:
          orderItemsModification:
            removed:
              - orderItemId: i1-7370d231-7eca-493b-9a1a-ef22e69fcb7a
            added:
              - menuItemId: 5810d672-de4d-4add-ba94-a50057df1bf2
                menuItemVariationId: 9632192e-0b3f-4ddb-bc9b-554edccd05f2
          priceDifference: 7500
          currency: GBP
