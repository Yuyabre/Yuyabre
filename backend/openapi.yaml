  /v1/delivery:
    post:
      tags:
        - Logistic Management
        - Define Delivery Plan
        - Delivery as a Service
        - publicly-accessible
      summary: Create a Delivery
      description: Request a new delivery from a collect point to a delivery point. A collect point can be a restaurant and the delivery point a customer.
      operationId: v1DeliveryPost
      security:
        - daas_jwt: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
      requestBody:
        required: true
        description: Create a delivery.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaasDaaSDeliveryRequest'
      responses:
        '202':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaaSDeliveryResponse'
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasErrorException'
              example:
                error: InvalidArgumentException
                message: 'targetCollectTime must be after earliest collect time of: 2022-05-27T19:59:58.109Z'
                type: INVALID_ARGUMENT_EXCEPTION
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasErrorException'
              example:
                error: EntityNotFoundException
                message: Estimate for requestId 7db164e9-dc79-4ee0-8b6b-e720dbd0f662 has either expired or does not exist.
                type: ENTITY_NOT_FOUND_EXCEPTION
        '503':
          description: Service Unavailable
          content:
            application/json:
              example:
                error: ServiceUnavailableException
                message: Delivery is currently unavailable due to a service outage. We apologize for any inconvenience caused while we work to resolve this issue.
                type: SERVICE_UNAVAILABLE_EXCEPTION
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api-daas, api-daas-produk, api-daas-prodaus, api-daas.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-daas-staging, api-daas-staguk, api-daas-stagaus, api-daas.stageu1]>
      x-component-name: daasdispatcher
      x-status: Stable
