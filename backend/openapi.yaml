    ConfigComparable:
      anyOf:
        - type: integer
        - $ref: '#/components/schemas/ConfigVersionNumber'
    ConfigCompositeFeatureValue:
      title: CompositeFeatureValue
      description: Composite of primitive FeatureValues
      type: object
      additionalProperties:
        anyOf:
          - type: string
          - type: boolean
          - type: integer
    ConfigConfig:
      additionalProperties: false
      type: object
      required:
        - createdAt
        - features
      properties:
        createdAt:
          description: The time the config file was created.
          format: date-time
          type: string
        features:
          description: The features defined for the scope this config file corresponds to.
          type: array
          items:
            additionalProperties: false
            type: object
            required:
              - key
              - valueType
              - defaultValueRules
            properties:
              key:
                description: The unique key of the feature.
                type: string
              valueType:
                description: The type of the value held by the feature.
                type: string
                enum:
                  - string
                  - bool
                  - int
                  - composite
              defaultValueRules:
                description: Default values in case nothing matches in evaluation.
                type: array
                items:
                  additionalProperties: false
                  type: object
                  required:
                    - restrictions
                    - value
                  properties:
                    restrictions:
                      $ref: '#/components/schemas/ConfigPredicate'
                    value:
                      allOf:
                        - description: Default value.
                        - $ref: '#/components/schemas/ConfigFeatureValue'
              evaluationLogic:
                additionalProperties: false
                description: Information required to evaluate the value.
                type: object
                required:
                  - type
                  - detail
                properties:
                  type:
                    description: The mechanism used for evaluation.
                    type: string
                    enum:
                      - IdHash
                  detail:
                    description: The details of the logic used to execute the evaluation mechanism.
                    oneOf:
                      - $ref: '#/components/schemas/ConfigIdHashEvaluationLogicDetail'
              tags:
                description: Tags to help categorise the feature.
                type: array
                items:
                  type: string
      example:
        createdAt: '2023-10-25T10:30:42.490Z'
        features:
          - key: ept-samples::composite_feature
            valueType: composite
            defaultValueRules:
              - restrictions:
                  property: Country
                  in:
                    - NL
                    - UK
                value:
                  beanThereDoneThat: true
                  legumeWeight: 7
                  chiliFactor: nuclear
              - restrictions: {}
                value:
                  beanThereDoneThat: false
                  legumeWeight: 10
                  chiliFactor: winter
            evaluationLogic:
              type: IdHash
              detail:
                bucketBy: AnonUserId
                prefix: some-prefix
                rules:
                  - restrictions:
                      or:
                        - property: Country
                          in:
                            - ES
                            - IT
                        - and:
                            - property: Country
                              in:
                                - UK
                                - AU
                            - property: AppVersion
                              gte: 31.9.2
                    audienceFraction: 0.5
                    variants:
                      - weight: 1
                        value: foo
                        experimentKey: WibbleExperiment
                        experimentVariant:
                          beanThereDoneThat: true
                          legumeWeight: 1
                          chiliFactor: death
                      - weight: 1
                        value: bar
                        experimentKey: WibbleExperiment
                        experimentVariant:
                          beanThereDoneThat: false
                          legumeWeight: 5
                          chiliFactor: jam
            tags:
              - tag-1
    ConfigEquatable:
      anyOf:
        - type: integer
        - type: boolean
        - type: string
    ConfigFeatureValue:
      anyOf:
        - type: integer
        - type: boolean
        - type: string
        - $ref: '#/components/schemas/ConfigCompositeFeatureValue'
    ConfigIdHashEvaluationLogicDetail:
      type: object
      required:
        - bucketBy
        - prefix
        - rules
      properties:
        bucketBy:
          description: The id to hash to evaluate the bucket.
          type: string
          enum:
            - AnonUserId
        prefix:
          description: The string to prepend to the id to evaluate the buckets.
          type: string
        rules:
          description: One or more set of variants, with different restrictions.
          type: array
          items:
            additionalProperties: false
            type: object
            required:
              - restrictions
              - audienceFraction
              - variants
            properties:
              restrictions:
                $ref: '#/components/schemas/ConfigPredicate'
              audienceFraction:
                description: Proportion of users to be evaluated.
                minimum: 0
                maximum: 1
                type: number
              variants:
                type: array
                items:
                  additionalProperties: false
                  type: object
                  required:
                    - weight
                    - value
                  properties:
                    weight:
                      description: The relative weight of this variant, for traffic allocation.
                      minimum: 0
                      type: integer
                    value:
                      allOf:
                        - description: Value to return.
                        - $ref: '#/components/schemas/ConfigFeatureValue'
                    experimentKey:
                      description: Experiment key to track, if not null.
                      nullable: true
                      type: string
                    experimentVariant:
                      description: Experiment variant name to track, if not null.
                      nullable: true
                      type: string
    ConfigPredicate:
      additionalProperties: false
      description: A logical statement that is affirmed or denied when a restriction is being evaluated.
      type: object
      properties:
        and:
          description: Everything in array must evaluate to true.
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/ConfigPredicate'
        or:
          description: Something in array must evaluate to true.
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/ConfigPredicate'
        eq:
          allOf:
            - description: Value must equal this.
            - $ref: '#/components/schemas/ConfigEquatable'
        neq:
          allOf:
            - description: Value must not equal this.
            - $ref: '#/components/schemas/ConfigEquatable'
        in:
          description: Value must be in this array.
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/ConfigEquatable'
        nin:
          description: Value must not be in this array.
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/ConfigEquatable'
        gt:
          allOf:
            - description: Value must be greater than this.
            - $ref: '#/components/schemas/ConfigComparable'
        gte:
          allOf:
            - description: Value must be greater than or equal to this.
            - $ref: '#/components/schemas/ConfigComparable'
        lt:
          allOf:
            - description: Value must be less than this.
            - $ref: '#/components/schemas/ConfigComparable'
        lte:
          allOf:
            - description: Value must be less than or equal to this.
            - $ref: '#/components/schemas/ConfigComparable'
        property:
          description: The property to compare against.
          type: string
          enum:
            - Country
            - AppVersion
    ConfigVersionNumber:
      description: Version number
      pattern: ^(0|[1-9]\d*)(\.(0|[1-9]\d*))*$
      type: string
