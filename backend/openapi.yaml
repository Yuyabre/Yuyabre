    put:
      tags:
        - Logistic Management
        - Define Delivery Plan
        - Delivery as a Service
        - publicly-accessible
      summary: Cancel a Delivery
      description: Request cancellation of a delivery which is either unassigned or have not been viewed by a courier if already assigned.
      operationId: v1DeliveryCancellationRequestPut
      security:
        - daas_jwt: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
      requestBody:
        required: true
        description: Cancel a delivery.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaasDaaSCancelDeliveryRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaaSCancelDeliveryResponse'
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasErrorException'
              example:
                error: DeliveryCouldNotBeCancelledException
                message: The delivery could not be cancelled. The delivery request is still being processed.
                type: DELIVERY_CANNOT_BE_CANCELLED_ERROR
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasErrorException'
              example:
                error: EntityNotFoundException
                message: The request id does not exist.
                type: ENTITY_NOT_FOUND_EXCEPTION
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api-daas, api-daas-produk, api-daas-prodaus, api-daas.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-daas-staging, api-daas-staguk, api-daas-stagaus, api-daas.stageu1]>
      x-component-name: daasdispatcher
      x-status: Stable
  /v1/delivery/collect-points:
    get:
      tags:
        - Logistic Management
        - Define Delivery Plan
        - Delivery as a Service
        - publicly-accessible
      summary: Get Collect Points
      description: The Collect Points endpoint enables partners can return a list of locations that they have access to.
      operationId: v1DeliveryCollectPointsGet
      security:
        - daas_jwt: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
        - name: limit
          in: query
          description: The number of collect-points to fetch.
          required: false
          schema:
            format: int32
            type: integer
            default: 100
            minimum: 1
            maximum: 100
            nullable: true
        - name: offset
          in: query
          description: The number of collect-points to skip.
          required: false
          schema:
            format: int32
            type: integer
            default: 0
            minimum: 0
            nullable: true
      responses:
        '200':
          headers:
            cache-control:
              description: Information about how the response can be cached.
              schema:
                type: string
                example: no-cache
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaaSCollectPointResponse'
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api-daas, api-daas-produk, api-daas-prodaus, api-daas.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-daas-staging, api-daas-staguk, api-daas-stagaus, api-daas.stageu1]>
      x-component-name: daaspartners
      x-status: Stable
