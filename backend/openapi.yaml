        type: carousel
        carouselId: lunch
        restaurantIds:
          - '123123'
          - '456456'
          - '789789'
    RankRankedItemProductCarousel:
      allOf:
        - $ref: '#/components/schemas/RankRankedItem'
        - required:
            - carouselId
            - products
          description: An instance of a product carousel. This is primarily used for the dish carousel.
          type: object
          properties:
            carouselId:
              type: string
              description: The ID of the carousel
              nullable: false
            products:
              type: array
              nullable: false
              description: An array of products for the product carousel
              items:
                type: object
                required:
                  - restaurantId
                  - productId
                description: A product included in the carousel
                properties:
                  restaurantId:
                    type: string
                    description: The restaurant ID for the product
                    nullable: false
                  productId:
                    type: string
                    description: The product ID for the product
                    nullable: false
      example:
        type: productCarousel
        carouselId: lunch
        products:
          - restaurantId: '123123'
            productId: 00000000-1111-1111-1111-111111
          - restaurantId: '456456'
            productId: 00000000-2222-2222-2222-222222
          - restaurantId: '789789'
            productId: 00000000-3333-3333-3333-333333
    RankRankedItemRestaurant:
