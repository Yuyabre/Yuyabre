            - LOCALITY_REQUIRED
            - ADMINISTRATIVE_AREA_REQUIRED
            - POSTAL_CODE_REQUIRED
            - GEOLOCATION_REQUIRED
            - TABLE_IDENTIFIER_REQUIRED
            - ORDER_NOTE_NOT_ACCEPTED
            - KITCHEN_NOTE_NOT_ACCEPTED
            - COURIER_NOTE_NOT_ACCEPTED
            - TIP_INVALID
