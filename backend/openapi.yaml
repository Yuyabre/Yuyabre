    Authorization400ConnectTokenResponse:
      properties:
        error:
          description: |-
            The error code representing the error that occurred. Can also include custom values. More info at RFC6749#section-5.2
            - invalid_request:
            -       The request is missing a required parameter, includes an
            -       unsupported parameter value (other than grant type),
            -       repeats a parameter, includes multiple credentials,
            -       utilizes more than one mechanism for authenticating the
            -       client, or is otherwise malformed.
            - invalid_client
            -         Client authentication failed (e.g., unknown client, no
            -         client authentication included, or unsupported
            -         authentication method).  The authorization server MAY
            -         return an HTTP 401 (Unauthorized) status code to indicate
            -         which HTTP authentication schemes are supported.  If the
            -         client attempted to authenticate via the "Authorization"
            -         request header field, the authorization server MUST
            -         respond with an HTTP 401 (Unauthorized) status code and
            -         include the "WWW-Authenticate" response header field
            -         matching the authentication scheme used by the client.
            - invalid_grant
            -         The provided authorization grant (e.g., authorization
            -         code, resource owner credentials) or refresh token is
            -         invalid, expired, revoked, does not match the redirection
            -         URI used in the authorization request, or was issued to
            -         another client.
            - unauthorized_client
            -         The authenticated client is not authorized to use this
            -         authorization grant type.
            - unsupported_grant_type
            -         The authorization grant type is not supported by the
            -         authorization server.
            - invalid_scope
            -         The requested scope is invalid, unknown, malformed, or
            -         exceeds the scope granted by the resource owner.
            - mfa_required
            -         A custom response. The MFA flow has been initiated which
            -         means a one time code is required to finish the authentication 
            -         via the mfa_otp grant type. 
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
            - mfa_required
          type: string
        error_description:
          description: OPTIONAL. A description of the error that occurred.
          type: string
        error_uri:
          description: OPTIONAL. URI identifying a human-readable web page with information about the error.
          type: string
      type: object
    AuthorizationConnectTokenRequest:
      required:
        - client_id
        - grant_type
      properties:
        redirect_uri:
          description: Required for the `authorization_code` grant type
          type: string
        username:
          description: Resource owner username (required for `password` grant type)
          type: string
        password:
          description: Resource owner password (required for `password` grant type)
          type: string
        client_secret:
          description: The client secret - either in the post body, or as a basic authentication header.
          type: string
        client_id:
          description: client identifier
          type: string
        code_verifier:
          description: PKCE proof key
          type: string
        code:
          description: The authorization code (required for `authorization_code` grant type)
          type: string
        acr_values:
          description: |-
            Allows passing in additional authentication related information for the `password` grant type - the following  are special proprietary `acr_values`:
            - `idp:name_of_idp` bypasses the login/home realm screen and forwards the user directly to the selected identity provider (if allowed per client configuration)
            - `tenant:name_of_tenant` can be used to pass a tenant name to the token endpoint
          type: string
        refresh_token:
          description: The refresh token (required for `refresh_token` grant type)
          type: string
        grant_type:
          description: The grant type which determines the type of flow. A custom value is also allowed.
          enum:
            - authorization_code
            - client_credentials
            - password
            - refresh_token
            - mfa_otp
            - otac
            - implicit
            - urn:ietf:params:oauth:grant-type:device_code
            - urn:ietf:params:oauth:grant-type:saml2-bearer
            - urn:ietf:params:oauth:grant-type:jwt-bearer
            - urn:ietf:params:oauth:grant-type:token-exchange
            - urn:openid:params:grant-type:ciba
          type: string
        device_code:
          description: The device code (required for `urn:ietf:params:oauth:grant-type:device_code` grant type)
          type: string
        scope:
          description: One or more registered scopes. If not specified, a token for all explicitly  allowed scopes will be issued.
          type: string
    AuthorizationConnectTokenResponse:
      properties:
        access_token:
          description: The access token. This is a JSON web token (JWT) encoded as Base64 URL-encoding. This is returned if the `response_type` included `token`.
          type: string
        expires_in:
          description: The number of seconds until the access token expires.
          type: integer
        id_token:
          description: |-
            An ID token. This is a JSON web token (JWT) encoded as Base64 URL-encoding. 
            This is returned if the `response_type` included `id_token`.
          type: string
        token_type:
          description: This is always `bearer`, and is returned only  when `token` is specified as a `response_type`.
          type: string
        scope:
          description: The original scopes you provided.
          type: string
      type: object
