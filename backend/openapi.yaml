          format: date-time
          minLength: 1
        endDate:
          description: ISO 8601 format of the end datetime of the request.
          type: string
          format: date-time
          minLength: 1
          nullable: true
        name:
          description: Name of the request to be created.
          type: string
          maxLength: 150
        reason:
          description: The reason for creating the request.
          type: string
          maxLength: 5000
        allowRestaurantOverride:
          description: Whether a restaurant should be allowed to delete this request, regardless of who raised it.
          type: boolean
        categories:
          description: A free text category used to group multiple requests. This field is not intended to be used by clients.
          type: array
          items:
            type: string
            maxLength: 100
          nullable: true
      type: object
      description: A request to make restaurant unavailable.
      required:
        - startDate
        - name
        - reason
        - allowRestaurantOverride
      additionalProperties: false
      example:
        serviceTypes:
          - dineIn
          - delivery
        startDate: '2020-01-16T09:00:00Z'
        endDate: '2020-01-16T19:00:00Z'
        name: Out of Chicken
        reason: No more chicken in stock.
        allowRestaurantOverride: true
        categories:
          - chicken-issue
    AvailabilityScheduledUnavailabilityStatus:
      properties:
        delivery:
          $ref: '#/components/schemas/AvailabilityServiceTypeStatus'
        collection:
          $ref: '#/components/schemas/AvailabilityServiceTypeStatus'
        dineIn:
          $ref: '#/components/schemas/AvailabilityServiceTypeStatus'
      type: object
      example:
        delivery:
          currentlyAvailable: true
          restaurantIsReadyForAvailability: false
          restaurantIsAbleToMakeAvailable: true
        collection:
          currentlyAvailable: true
          restaurantIsReadyForAvailability: false
          restaurantIsAbleToMakeAvailable: true
        dineIn:
          currentlyAvailable: true
          restaurantIsReadyForAvailability: false
          restaurantIsAbleToMakeAvailable: true
    AvailabilityServiceTypeStatus:
      properties:
        currentlyAvailable:
          description: Whether the restaurant is currently available or not.
          type: boolean
        restaurantIsReadyForAvailability:
          description: If there are events the restaurant CAN remove this will be `False`. Some events will be set with the `allowRestaurantOverride` flag as `False` meaning a Restaurant Partner cannot remove the event. This value being true advises the restaurant partner there are some events they can remove, regardless if removing those events will make them available or not.
          type: boolean
        restaurantIsAbleToMakeAvailable:
          description: If there are events the restaurant CAN NOT remove this will be `False`. There may also be events the restaurant can remove, however if this flag is `False` it means a call to make restaurant available by a Restaurant Partner will only remove events they are able to and not result in the restaurant becoming available.
          type: boolean
      type: object
      description: Provides information on a Service Type's Scheduled Unavailability state.
      example:
        currentlyAvailable: true
        restaurantIsReadyForAvailability: false
        restaurantIsAbleToMakeAvailable: true
    AvailabilityServiceTypes:
      type: string
      enum:
        - delivery
        - collection
        - dineIn
    BankdetailsGetAccessRolesResponse:
      description: Response containing information on what rights the user has to update the bank details
      properties:
