        - sdkAmount
      properties:
        label:
          description: The descriptive name of the price summary item such as Delivery Cost.
          type: string
          nullable: false
        amount:
          description: The amount of the price summary item as minor currency units.
          type: number
          format: integer
          nullable: false
        sdkAmount:
          description: The amount of the price summary item formatted for native SDK.
          type: string
          nullable: false
      type: object
    CheckoutPaymentsCheckoutPaymentsPost201Response:
      description: The details of the payment.
      type: object
      properties:
        id:
          description: The id of the payment created.
          type: string
          nullable: false
        status:
          description: The current status of the payment.
          $ref: '#/components/schemas/CheckoutPaymentsCheckoutPaymentsStatusGetResponse'
      required:
        - id
        - status
      additionalProperties: false
    CheckoutPaymentsCheckoutPaymentsPostRequest:
      description: The details needed to start a payment.
      type: object
      properties:
        currency:
          description: |
            The currency code in ISO-4217 format.

            Currently, the currencies supported for each tenant are:
              - AT: `EUR`
              - AU: `AUD`
              - BE: `EUR`
              - BG: `BGN`
              - CH: `CHF`
              - DE: `EUR`
              - DK: `DKK`
              - ES: `EUR`
              - IE: `EUR`
              - IT: `EUR`
              - LU: `EUR`
              - NL: `EUR`
              - NZ: `NZD`
              - PL: `PLN`
              - SK: `EUR`
              - UK: `GBP`
          type: string
          minLength: 3
          maxLength: 3
          nullable: false
        total:
          description: |
            Total price the customer expects to pay as minor currency units in ISO-4217 format.

            The total price should include any fees applied for payment methods.
          type: number
          format: integer
          minimum: 0
          nullable: false
        methods:
          description: Collection of payment methods to pay for checkout.
          type: array
          minItems: 1
          maxItems: 10
          nullable: false
          items:
            $ref: '#/components/schemas/PaymentsPaymentType'
        returnUrl:
          description: URL to return to once payment is in `rejected`, `accepted` or `failed` status.
          type: string
          format: uri
      required:
        - currency
        - total
        - methods
        - returnUrl
      additionalProperties: false
    CheckoutPaymentsCheckoutPaymentsStatusGetResponse:
      discriminator:
        propertyName: code
        mapping:
          pending: '#/components/schemas/CheckoutPaymentsStatusPending'
          awaitingAction: '#/components/schemas/CheckoutPaymentsStatusAwaitingAction'
          rejected: '#/components/schemas/CheckoutPaymentsStatusRejected'
          accepted: '#/components/schemas/CheckoutPaymentsStatusAccepted'
          failed: '#/components/schemas/CheckoutPaymentsStatusFailed'
        oneOf:
