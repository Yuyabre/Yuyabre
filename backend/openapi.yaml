    ClaimsauthenticityserviceClaimRecommendationRequestPayload:
      type: object
      description: Represent the expected correct format of the request body
      properties:
        customerId:
          description: Id of the customer that placed the original order
          type: string
        orderId:
          type: string
          description: Id of the order against which a claim has been created
        queryId:
          type: string
