          minItems: 2
          maxItems: 2
    DiscoveryRestaurantsV3ModalItemAction:
      title: Modal Item Action
      description: Action to be triggered within the modal.
      type: object
      required:
        - type
        - text
        - targets
      properties:
        type:
          description: |
            The type of action item.
            Known values:
              * `button` - Button styled action. 
              * `link` - Link styled action.
          type: string
        text:
          description: The text to be displayed with the action.
          type: string
        targets:
          description: A list of targets for the action.
          type: array
          items:
            type: object
            required:
              - type
              - value
            properties:
              type:
                description: |
                  The type of action.
                  Known values:
                    * `url` - Action to redirect users to any external URL to SERP (or menu).
                    * `filter` - Action to open search and apply a filter selection to it.
                    * `partnerMenu` - Action to open partner menu.
                    * `vertical` - Action to open search and apply a vertical selection to it.
                    * `copyCode` - Action to copy text to clipboard (e.g. a voucher code).
                type: string
              value:
                description: |
                  The value to be used with the action type specified.
                  Property requirement:
                    * `url` - Mandatory.
                    * `filter` - Mandatory.
                    * `partnerMenu` - Mandatory.
                    * `vertical` - Mandatory.
                    * `copyCode` - Mandatory.
                type: string
        trackingInfo:
          type: object
