                type: string
            required:
              - name
          example:
            es-ES:
              name: Populate translated name here
        availability:
          description: |-
            The menu availability determining the hours that the menu is available for ordering for each day of the week.

            In UK, IE, ES, IT, AU, availability also updates opening hours. In DE, NL, AT, BE, BG, DK, LU, PL and SK, the availability field updates the menu times only.

            Availability may be truncated in cases where the restaurant hours are set manually by your delivery partner.

            For Takeaway any time before 07:00 gets allocated to the previous day rather than the day of the week supplied.
          type: object
          required:
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday
          properties:
            monday:
              $ref: '#/components/schemas/JetConnectMenusUtfConnectorWorkingHours'
            tuesday:
              $ref: '#/components/schemas/JetConnectMenusUtfConnectorWorkingHours'
            wednesday:
