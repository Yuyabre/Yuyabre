              - $ref: '#/components/schemas/PaymentoptionsPaymentTypesPayPal'
              - $ref: '#/components/schemas/PaymentoptionsPaymentTypesSavedCard'
              - $ref: '#/components/schemas/PaymentoptionsPaymentTypesTakeawayPay'
            discriminator:
              propertyName: paymentType
              mapping:
                accountCredit: '#/components/schemas/PaymentoptionsPaymentTypesAccountCredit'
                applePay: '#/components/schemas/PaymentoptionsPaymentTypesApplePay'
                card: '#/components/schemas/PaymentoptionsPaymentTypesCard'
                cash: '#/components/schemas/PaymentoptionsPaymentTypesCash'
                googlePay: '#/components/schemas/PaymentoptionsPaymentTypesGooglePay'
                payPal: '#/components/schemas/PaymentoptionsPaymentTypesPayPal'
                savedCard: '#/components/schemas/PaymentoptionsPaymentTypesSavedCard'
                takeawayPay: '#/components/schemas/PaymentoptionsPaymentTypesTakeawayPay'
        basketBreakdown:
          type: array
          description: List of necessary amounts.
          items:
            type: object
            required:
              - itemType
              - itemAmount
            properties:
              itemType:
                type: string
                description: The type of basket item.
                enum:
                  - subTotal
                  - multiBuyDiscount
                  - restaurantDiscount
                  - basketAdjustments
                  - deliveryFee
                  - serviceFee
              itemAmount:
                type: integer
                description: Amount of basket item available (in minor currency units).
              subItems:
                type: array
                description: Sub items for this basket item.
                nullable: true
                items:
                  type: object
                  required:
                    - name
                    - type
                    - amount
                  properties:
                    name:
                      type: string
                      description: The name of the relevant sub-item.
                    type:
                      type: string
                      description: The identifier of the relevant sub-item.
                    amount:
                      type: integer
                      description: Amount of the sub-item (in minor currency units).
      example:
        orderId: 8d523bc6850d49dab6cccf3084971578
        basketTotal: 1000
        chargesTotal: 50
        orderTotal: 1050
        charges:
          - chargeType: serviceFee
            chargeAmount: 50
            displayText: Service Charge
        balances:
          - balanceType: accountCredit
            balanceAmount: 200
          - balanceType: takeawayPay
            balanceAmount: 0
        availableDeductions:
          - deductionType: voucher
            applied: false
            appliesTo:
              paymentTypes:
                - cash
                - card
                - savedCard
                - payPal
          - deductionType: accountCredit
            applied: true
            appliesTo:
              types:
                - card
                - savedCard
                - payPal
            availableAmount: 200
            appliedAmount: 200
        availablePaymentTypes:
          - paymentType: cash
            paymentAmount: 1050
          - paymentType: card
            paymentAmount: 850
            appliedDeductions:
              - accountCredit
            psp: Adyen
            cardTypes:
              - VISA
              - MASTERCARD
              - AMEX
          - paymentType: savedCard
            paymentAmount: 850
            appliedDeductions:
              - accountCredit
            cards:
              - id: '12334456'
                cardType: VISA
                expiry: 2022-01
                last4Digits: '1234'
                psp: Adyen
          - paymentType: payPal
            paymentAmount: 850
            appliedDeductions:
              - accountCredit
            psp: Braintree
        basketBreakdown:
          - itemType: subTotal
            itemAmount: 1000
          - itemType: multiBuyDiscount
            itemAmount: -250
          - itemType: restaurantDiscount
            itemAmount: -150
          - itemType: basketAdjustments
            itemAmount: -150
            subItems:
              - name: StampCard discount
                type: StampCard
                amount: -250
              - name: Bag fee
                type: BagFee
                amount: 100
          - itemType: deliveryFee
            itemAmount: 550
          - itemType: serviceFee
            itemAmount: 50
