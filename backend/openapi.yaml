    CheckoutVouchersVoucherStatus:
      discriminator:
        propertyName: code
        mapping:
          valid: '#/components/schemas/CheckoutVouchersVoucherStatusValid'
          unavailable: '#/components/schemas/CheckoutVouchersVoucherStatusUnavailable'
          expired: '#/components/schemas/CheckoutVouchersVoucherStatusExpired'
          redeemed: '#/components/schemas/CheckoutVouchersVoucherStatusRedeemed'
          ineligible: '#/components/schemas/CheckoutVouchersVoucherStatusIneligible'
          inactive: '#/components/schemas/CheckoutVouchersVoucherStatusInactive'
        oneOf:
          - $ref: '#/components/schemas/CheckoutVouchersVoucherStatusValid'
          - $ref: '#/components/schemas/CheckoutVouchersVoucherStatusUnavailable'
          - $ref: '#/components/schemas/CheckoutVouchersVoucherStatusExpired'
          - $ref: '#/components/schemas/CheckoutVouchersVoucherStatusRedeemed'
          - $ref: '#/components/schemas/CheckoutVouchersVoucherStatusIneligible'
          - $ref: '#/components/schemas/CheckoutVouchersVoucherStatusInactive'
      required:
        - code
      properties:
        code:
          nullable: false
          description: The voucher status code.
          enum:
            - valid
            - unavailable
            - expired
            - redeemed
            - ineligible
            - inactive
          type: string
      type: object
      description: Details of the voucher status.
    CheckoutVouchersVoucherStatusExpired:
      allOf:
        - $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
      additionalProperties: false
      type: object
      properties:
        code:
          description: Voucher was previously available to apply at checkout, but is no longer available.
    CheckoutVouchersVoucherStatusInactive:
      allOf:
        - $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
      additionalProperties: false
      type: object
      properties:
        code:
          description: Voucher is not yet available to apply at checkout.
    CheckoutVouchersVoucherStatusIneligible:
      allOf:
        - $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
      additionalProperties: false
      type: object
      required:
        - code
        - reason
      properties:
        code:
          description: Voucher cannot be applied as the checkout is ineligible.
        reason:
          nullable: false
          description: |
            The reason why the voucher is not eligible to be applied.
            * `restaurant`: Voucher unavailable for orders to this restaurant.
            * `cuisine`: Voucher unavailable for orders of this cuisine.
            * `customer`: Voucher unavailable for this customer.
            * `location`: Voucher unavailable for this location.
            * `time`: Voucher unavailable for this time of the day.
            * `day`: Voucher unavailable for today.
            * `serviceType`: Voucher unavailable for this service type.
            * `platform`: Voucher unavailable for an order placed on the current platform e.g. Web, iOS, Android.
            * `minimumOrders`: Voucher unavailable unless minimum customer's order count is met.
            * `maximumOrders`: Voucher only available for customers who placed fewer orders.
            * `minimumOrderValueNotMet`: Voucher unavailable unless minimum order value not met.
            * `voucherBalanceNotMet`: Voucher unavailable unless basket total value is higher than voucher value.
          enum:
            - restaurant
            - cuisine
            - customer
            - location
            - time
            - day
            - serviceType
            - platform
            - minimumOrders
            - maximumOrders
            - minimumOrderValueNotMet
            - voucherBalanceNotMet
          type: string
        MinimumOrderValue:
          nullable: false
          description: The minimum amount the user needs to spend to become eligible for the voucher.
          type: integer
        DisplayText:
          nullable: true
          description: The text to display to the user.
          type: string
    CheckoutVouchersVoucherStatusRedeemed:
      allOf:
        - $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
      additionalProperties: false
      type: object
      properties:
        code:
          description: Voucher has been already been redeemed.
    CheckoutVouchersVoucherStatusUnavailable:
      allOf:
        - $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
      additionalProperties: false
      type: object
      properties:
        code:
          description: Generic reason for when voucher is not available to apply at checkout.
    CheckoutVouchersVoucherStatusValid:
      allOf:
        - $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
        - required:
            - amount
            - details
      additionalProperties: false
      type: object
      properties:
        code:
          description: Voucher can be applied.
        name:
          type: string
          description: |
            The name of the voucher. This will only be set when the country is one of the following:
              - Austria (AT)
              - Belgium (BE)
              - Bulgaria (BG)
              - Denmark (DK)
              - Germany (DE)
              - Luxembourg (LU)
              - Netherlands (NL)
              - Poland (PL)
              - Slovakia (SK)
              - Switzerland (CH)
          minLength: 1
          maxLength: 50
          nullable: true
        amount:
          type: number
          format: integer
          description: The amount that will be redeemed from the voucher on completing this checkout as minor currency units.
          nullable: false
        details:
          type: object
          description: Details about the voucher.
          nullable: false
          oneOf:
            - required:
                - balance
            - required:
                - percentage
          properties:
            balance:
              type: object
              description: Details about the remaining balance available on the voucher.
              additionalProperties: false
              nullable: true
              properties:
                amount:
                  type: number
                  format: integer
                  description: The amount left to redeem on the voucher before this checkout is completed as minor currency units in ISO-4217 format.
                  nullable: false
              required:
                - amount
            percentage:
              type: object
              description: Details about the percentage applied for the voucher.
              additionalProperties: false
              nullable: true
              properties:
                percent:
                  type: number
                  format: double
                  description: The percentage applied for the voucher.
                  nullable: false
              required:
                - percent
