    JetConnectMenusUtfConnectorMenuType:
      description: The menu type
      type: string
      pattern: ^(COLLECTION|DELIVERY)$
      example: DELIVERY
    JetConnectMenusUtfConnectorMenus:
      description: The payload of a request to ingest menus.
      type: object
      required:
        - restaurants
        - menus
      properties:
        restaurants:
          description: A collection of one or more restaurant IDs associated with the menu(s). These are identifiers of restaurants from the menu source - typically the POS.
          type: array
          items:
            type: string
            example: '5678'
        menus:
          description: A collection of one or more menus to ingest
          type: array
          items:
            $ref: '#/components/schemas/JetConnectMenusUtfConnectorBaselineMenu'
        callback_url:
          description: URL to which notification of success/failure of the asynchronous menu ingestion process will be sent.
          type: string
          format: uri
          example: https://example.com/menu_webhook
    JetConnectMenusUtfConnectorModifier:
      description: A modifier group that could be applied on an item
      type: object
      required:
        - name
        - description
        - pick
      properties:
        name:
          description: The modifier name
          type: string
          example: Cook to
        description:
          description: The modifier description
          type: string
          example: How much do you want your steak cooked?
        translations:
          description: The translations of the modifier name & description, using IETF BCP 47 as the language identifier.
          type: object
          additionalProperties:
            type: object
            properties:
              name:
                description: The translated name
                type: string
              description:
                description: The translated description
                type: string
            required:
              - name
              - description
          example:
            es-ES:
              name: Populate translated name here
              description: Populate translated description here
        pick:
          description: The number of options the customer is allowed
          allOf:
            - type: object
              required:
                - pick_same_option
              properties:
                pick_same_option:
                  description: True if the same option can be added more than once
                  type: boolean
                  example: true
            - $ref: '#/components/schemas/JetConnectMenusUtfConnectorModifierPickExactly'
            - $ref: '#/components/schemas/JetConnectMenusUtfConnectorModifierPickRange'
        options:
          description: A collection of options the customer can select from
          type: array
          items:
            $ref: '#/components/schemas/JetConnectMenusUtfConnectorItem'
    JetConnectMenusUtfConnectorModifierPickExactly:
      description: The customer must select a fixed number of options
      type: object
      properties:
        exactly:
          description: The number of options the customer is allowed
          type: integer
          format: int32
          example: 1
    JetConnectMenusUtfConnectorModifierPickRange:
      description: The customer can select a min-max number of options
      type: object
      properties:
        range:
          description: The range of options the customer is allowed. In  DE, NL, AT, BE, BG, DK, LU, PL and SK the range option will be structured as check boxes. There cannot be a minimum or maximum number of options defined.
          type: object
          properties:
            from:
              description: Minimum number of options the customer can select
              type: integer
              format: int32
              example: 2
            to:
              description: Maximum number of options the customer can select
              type: integer
              format: int32
              example: 4
    JetConnectMenusUtfConnectorNutritionalInfo:
      description: The energy content of the item expressed in either kcal or kJ or both.
      type: object
      properties:
        kcal:
          description: The value of the energy content of the item in kcal.
          type: integer
          format: int32
          example: 200
        kj:
          description: The value of the energy content of the item in kJ.
          type: integer
          format: int32
          example: 200
        additional_details:
          description: |-
            The nutritional information to be shared as a free text field. Please reach out to your JETConnect contact to seek further information on what is required, as this varies per country.

            Note: This feature is currently only available for integration in DE, NL, AT, BE, BG, DK, LU, PL and SK.
