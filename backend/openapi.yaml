    CheckoutDeliveryModelOptions:
      type: object
      description: Contains the delivery quotes
      nullable: true
      required:
        - selectedOption
        - hasChanged
        - options
      properties:
        selectedOption:
          type: string
          description: The identifier of the delivery model option selected by the customer.
          nullable: false
          enum:
            - courier
            - drone
        hasChanged:
          nullable: false
          type: boolean
          description: Indicates whether the delivery model option has changed during this request.
        associatedPartner:
          type: object
          nullable: true
          description: A separate partner associated with this partner, if any.
          required:
            - id
            - seoName
          properties:
            id:
              type: string
              description: Unique identifier for the associated partner.
              minLength: 1
              maxLength: 100
              nullable: false
            seoName:
              type: string
              description: Public name of the associated partner used for Search Engine Optimization (SEO).
              minLength: 1
              maxLength: 100
              nullable: false
        options:
          type: array
          nullable: false
          description: The list of available delivery models for the checkout.
          minItems: 1
          items:
            type: object
            required:
              - id
              - available
            properties:
              id:
                type: string
                description: The identifier of the delivery model.
                nullable: false
                enum:
                  - courier
                  - drone
              deliveryCharge:
                type: object
                nullable: true
                description: The delivery fee for this delivery model - null if fee is not calculated.
                properties:
                  fee:
                    format: decimal
                    type: number
                    nullable: false
                    minimum: 0
                    description: The amount of the delivery fee
              available:
                type: boolean
                description: Whether the delivery model is currently available
                nullable: false
              unavailabilityReason:
                type: string
                description: A localized message explaining to the customer why the delivery model is not available, if applicable.
                nullable: true
                minLength: 0
                maxLength: 250
