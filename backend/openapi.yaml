              items:
                type: string
              description: The list of new entities
            removed:
              type: array
              items:
                type: string
              description: The list of removed entities
            is_suspended:
              type: boolean
              description: The status of the screening request
      example:
        event: monitored_search_updated
        data:
          search_id: 10117833
          updated:
            - 8NMXF7QX4QV8LFD
            - X4525MEAZKKPX0T
            - 73HBD537LCX5JT6
          new:
            - Q3OX4KS0KEMCVDH
            - UCC60H79WVU94Z0
          removed:
            - 9D1ETD0ADTT4HDH
            - I38XC0R6Y1EQ083
          is_suspended: true
