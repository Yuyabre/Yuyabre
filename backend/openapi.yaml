      description: The pricing information of an item.
      properties:
        depositAmount:
          format: int32
          type: number
          minimum: 0
          description: The amount that can be received by a customer for depositing the item's packaging. This should be specified using minor units (pence/cents) of the currency.
          nullable: true
        depositType:
          $ref: '#/components/schemas/RestaurantsMenuSyncV3DepositType'
          nullable: true
        fees:
          $ref: '#/components/schemas/RestaurantsMenuSyncV3Fees'
          nullable: true
        unitPrice:
          $ref: '#/components/schemas/RestaurantsUnitPrice'
          nullable: true
    RestaurantsMenuSyncV3Time:
      type: object
      required:
        - daysOfTheWeek
        - fromDateTime
        - toDateTime
      properties:
        daysOfTheWeek:
          items:
            enum:
              - monday
              - tuesday
              - wednesday
              - thursday
              - friday
              - saturday
              - sunday
            type: string
          description: The days of the week. The array must contain at least one day.
          type: array
          uniqueItems: true
          minItems: 1
          nullable: false
        toDateTime:
          description: Time of day the availability begins, in local time, format is ISO 8601 hh:mm:ss
          type: string
          minLength: 8
          maxLength: 8
          nullable: false
        fromDateTime:
          description: Time of day the availability begins, in local time, format is ISO 8601 hh:mm:ss
          type: string
          minLength: 8
          maxLength: 8
          nullable: false
      example:
        daysOfTheWeek:
          - monday
          - tuesday
          - wednesday
          - thursday
          - friday
          - saturday
          - sunday
        fromDateTime: '11:30:00'
        toDateTime: '14:30:00'
    RestaurantsMenuSyncV3Variation:
      type: object
      required:
        - id
        - name
        - type
        - basePrice
        - availabilityIds
      properties:
        name:
          description: The name of the variation.  If the variation type is `noVariation`, this should be set to an empty string, otherwise the name should be at least 1 character.
          type: string
          minLength: 0
          nullable: false
        nameTranslations:
          description: Translations of the name of the variation.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
        dealOnly:
          description: This flag indicates the variation is only available as part of a deal, the item will not be displayed as a stand alone menu item.
          type: boolean
          nullable: true
        kitchenNumber:
          description: Identifies the item with a number on the physical menu that the kitchen understand e.g. on a Chinese menu number 16 could correspond to "BBQ ribs"
          type: string
          nullable: true
        type:
          description: Denotes the type of variation, `variation` if there are multiple variations of the parent `menuitem`, `noVariation` if there's only one
          enum:
            - noVariation
            - variation
          type: string
          nullable: false
        modifierGroupsIds:
          items:
            type: string
          description: Maps to the modifier groups that are applicable to this variation.
          type: array
          nullable: true
        id:
          description: A unique identifier at menu level for a variation, can be shared with parent menu item id.
          type: string
          minLength: 1
          nullable: false
        externalId:
          description: The partner identifier for a variation. For example, this could be a price look-up / stock keeping unit code.
          type: string
          minLength: 0
          maxLength: 1000
          nullable: true
        basePrice:
          description: The base price of this variation in the minor unit of the currency.
          type: number
          format: int32
          minimum: 0
          nullable: false
        nutrition:
          $ref: '#/components/schemas/RestaurantsNutrition'
          nullable: true
        numberOfServings:
          $ref: '#/components/schemas/RestaurantsNumberOfServings'
          nullable: true
        dealGroupsIds:
          items:
            type: string
          description: Maps to the deal groups that are applicable to this variation.
          type: array
          nullable: true
        availabilityIds:
          items:
            type: string
          description: Maps to an availability item, availabilities determines which days and times the item can be sold.
          type: array
          minItems: 1
          nullable: false
        physicalProperties:
          $ref: '#/components/schemas/RestaurantsMenuSyncV3PhysicalProperties'
          description: The physical properties of an item.
          nullable: true
        pricing:
          $ref: '#/components/schemas/RestaurantsMenuSyncV3Pricing'
          description: The pricing information for an item.
          nullable: true
        additionalInformation:
          type: string
          description: This field will be deprecated in the future and is to be used for migrating and compatibility with L-TA menus only.
          nullable: true
        additionalInformationTranslations:
          description: Translations of the additional information of the variation.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
        gtin:
          $ref: '#/components/schemas/RestaurantsGtin'
          nullable: true
        productTypes:
          $ref: '#/components/schemas/RestaurantsProductTypes'
          nullable: true
      example:
        name: 12 inch
        nameTranslations:
          - language: it
            text: 12 pollici
        dealOnly: false
        kitchenNumber: '100'
        type: variation
        modifierGroupsIds:
          - 8547130-req-1
          - 8547130-opt-1
        id: '8547130'
        basePrice: 1000
        nutrition:
          energyContent:
            - min: 100
              max: 200
              unit: kcal
            - min: 418
              max: 836
              unit: kJ
          nutritionTable:
            - description: Per 100g
              referenceQuantity:
                unit: g
                quantity:
                  value: 100
              nutritionProperties:
                - name: protein
                  unit: g
                  quantity:
                    value: 0.1
                    lessThan: true
                - name: fat
                  unit: g
                  percentRI: 50
                  quantity:
                    value: 15
                    lessThan: false
        numberOfServings:
          min: 1
          max: 1
        dealGroupsIds: []
        availabilityIds:
          - 1-lunch-delivery
          - 2-lunch-collection
          - 3-dinner-delivery
          - 4-dinner-collection
        physicalProperties:
          grossWeight:
            value: 100
            unit: g
        gtin: '012345678905'
    RestaurantsMenuSyncV3VolumeUnitType:
      description: The unit type for a volume.
      type: string
      enum:
        - cl
        - l
        - ml
    RestaurantsMenuSyncV44XxValidationError:
      description: A HTTP 4xx error response
      properties:
        fault:
          required:
            - traceId
            - faultId
            - errors
          description: Details of the fault.
          properties:
            traceId:
              description: A value that helps identify the trace back to logs, so that we can easily find what was happening on our system when the fault was generated
              type: string
            faultId:
              description: A value that helps identify this response back to logs, so we can easily find this specific fault
              type: string
            errors:
              items:
                properties:
                  description:
                    description: Specific details about the error that may assist you in resolving the issue
                    type: string
                  errorCode:
                    description: A code that identifies the problem type. It will be supported by human-readable documentation that identifies how to resolve the error
                    type: string
                  path:
                    description: JSON path to the element in the request body that failed validation.
                    type: string
                  name:
                    description: The value of the name property for the element in the request body that failed validation.
                    type: string
                  id:
                    description: The value of the id property for the element in the request body that failed validation.
                    type: string
                type: object
                required:
                  - description
                  - errorCode
                  - path
                  - name
                  - id
              type: array
          type: object
      type: object
      example:
        traceId: 1d0ec97a-d0fa-4618-b18d-334f9c2f0da2
        faultId: b8f46a3a-ddd8-4456-b9ea-73571217a7fa
        errors:
          - description: 'Invalid category: eb8144fc-6126-43dc-84fb-f83fb416cc02 - no item with ID c613c13f-6c79-4e7a-a057-3788d371f38as exists on the menu'
            errorCode: '217'
            path: Categories[6].ItemIds[0]
            name: Pizzas
            id: eb8144fc-6126-43dc-84fb-f83fb416cc02
    RestaurantsMenuSyncV4AdditionalCharges:
      type: object
      description: Represents extra costs that must be made clear to the customer. Current examples are for deposit return schemes and levies on single-use plastics.
      properties:
        fees:
          description: Additional, non-recoverable charges. This object will be extended with additional properties as new requirements for fee types emerge.
          type: object
          properties:
            singleUsePlastic:
              type: number
              format: int32
              minimum: 0
              description: Expressed in the minor unit of the currency. A mandatory fee for plastic included with the product, as required by single-use plastic (SUP) legislation in the market.
        deposits:
          description: Additional charges that the customer can recover by returning something to the store or a designated place like a recycling centre. This object will be extended with additional properties as new requirements for deposit types emerge.
          type: object
          properties:
            depositReturnScheme:
              type: number
              format: int32
              minimum: 0
              description: Expressed in the minor unit of the currency. A mandatory fee for plastic included with the product, as required by single-use plastic (SUP) legislation in the market.
    RestaurantsMenuSyncV4AdditionalPricing:
      type: object
      description: The details of how a modifier or deal item variation can be ordered for a given service type.
      required:
        - additionPrice
      properties:
        additionPrice:
          description: Represents the change to the base price in the minor unit of the currency as a result of adding this modifier or deal item variation. Note that this can be a negative number. For example, the modifier 'No Cheese' might have an addition price of -50, meaning this amount is subtracted from the base price when a customer adds the modifier.
          type: number
          format: int32
          nullable: false
        removalPrice:
          type: number
          format: int32
          minimum: 0
          description: Represents the change to the base price in the minor unit of the currency as a result of removing a defaulted selection of this modifier or deal item variation. Note that the value is not required to be the negative of the addition price. For example, the price of a variation 'beef burger' might be increased by 200 when an extra 'beef patty' modifier is added, but reduced by 0 when the default 'beef patty' modifier is removed.
          nullable: true
        additionalCharges:
          $ref: '#/components/schemas/RestaurantsMenuSyncV4AdditionalCharges'
          nullable: true
        unitPrice:
          $ref: '#/components/schemas/RestaurantsUnitPrice'
          nullable: true
    RestaurantsMenuSyncV4Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          description: Identifier for the category. Unique within the product catalogue.
          type: string
          minLength: 1
          nullable: false
        name:
          description: The name of the category.
          type: string
          minLength: 1
          nullable: false
        itemIds:
          items:
            type: string
          description: An array of one or more references to the items in the category. Each id must be unique within the category and an item with that id must exist within the product catalogue. Empty when children is not empty.
          type: array
          minItems: 0
          uniqueItems: true
          nullable: true
        children:
          items:
            type: string
          description: The ids of the categories that are children of this category. Each id must be unique within the array and a category with that id must exist in the product catalogue. Empty when item ids is not empty.
          type: array
          minItems: 0
          uniqueItems: true
          nullable: true
        timeConstraints:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4TimeConstraint'
          description: An optional array of objects representing restrictions on when the category is available. By default, the category is available whenever the store is open.
          type: array
          minItems: 0
          nullable: true
        nameTranslations:
          description: An optional array of translations for the name of the category.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
          uniqueItems: true
        description:
          description: The description of the category.
          type: string
          minLength: 0
          nullable: true
        descriptionTranslations:
          description: An optional array of translations for the description of the category.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
          uniqueItems: true
    RestaurantsMenuSyncV4CategoryInformation:
      type: object
      required:
        - categories
      properties:
        categories:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4Category'
      example:
        categories:
          - id: beverages-001
            name: Beverages
            description: A selection of beverages.
            children:
              - soft-beverages-002
              - alcoholic-beverages-003
          - id: soft-beverages-002
            name: Soft Beverages
            description: Coke & Pepsi
            itemIds:
              - item-001
              - item-002
          - id: alcoholic-beverages-003
            name: Alcoholic Beverages
            description: Wine and beer
            itemIds:
              - item-003
              - item-004
    RestaurantsMenuSyncV4DealGroup:
      type: object
      required:
        - id
        - name
        - numberOfChoices
        - dealItemVariations
      properties:
        id:
          description: Identifier for the deal group. Unique at the level of the product catalogue.
          type: string
          minLength: 1
          nullable: false
        numberOfChoices:
          description: The number of deal item variations that must be selected to satisfy this deal group. The value cannot be greater than 1 if the deal group contains variations with modifier groups.
          type: integer
          format: int32
          minimum: 1
          nullable: false
        dealItemVariations:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4DealItemVariation'
          description: An array of one or more references to the variations that can be selected in order to satisfy this deal group. Their ids must exist within the product catalogue and the array cannot contain duplicate ids.
          type: array
          minItems: 1
          uniqueItems: true
          nullable: false
        name:
          description: The name of the deal group.
          minLength: 1
          type: string
          nullable: false
        nameTranslations:
          description: An optional array of translations for the name of the deal group.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
    RestaurantsMenuSyncV4DealItemVariation:
      type: object
      required:
        - variationId
        - minChoices
        - maxChoices
        - termsOfSale
      properties:
        variationId:
          description: A reference to a variation that can be chosen as a part of a deal group. May not reference a variation that has deal groups itself.
          type: string
          minLength: 1
          nullable: false
        minChoices:
          description: The minimum number of times this deal item variation can be chosen within a deal group.
          type: integer
          format: int32
          minimum: 0
          nullable: false
        maxChoices:
          description: The maximum number of times this deal item variation can be chosen within a deal group.
          format: int32
          type: integer
          minimum: 1
          nullable: false
        termsOfSale:
          type: object
          description: Provides the details of how and when the deal item variation can be ordered.
          properties:
            delivery:
              $ref: '#/components/schemas/RestaurantsMenuSyncV4AdditionalPricing'
              description: An object that provides details of the deal item variation's effect on the price for delivery. If null or not provided, the deal item variation is not available for delivery.
              nullable: true
            collection:
              $ref: '#/components/schemas/RestaurantsMenuSyncV4AdditionalPricing'
              description: An object that provides details of the deal item variation's effect on the price for collection. If null or not provided, the deal item variation is not available for collection.
              nullable: true
        externalId:
          description: The partner identifier for a deal item variation. For example, this could be a price look-up / stock keeping unit code.
          type: string
          minLength: 0
          maxLength: 1000
          nullable: true
    RestaurantsMenuSyncV4IngestProductCatalogueRequest:
      type: object
      required:
        - sourceApplication
      properties:
        eTag:
          description: The ETag of the S3 object that is obtained from the response of the [S3 POST upload](https://docs.aws.amazon.com/AmazonS3/latest/API/RESTObjectPOST.html). Can be optionally used to ensure the correct object is ingested. The ETag must retain all quotes as returned by AWS after the upload.
          type: string
          nullable: true
        menuVersionTimestamp:
          type: string
          description: ISO-8601 string representing the UTC timestamp when the menu data was last updated in the source system. This is used in conjunction with [offline item requests](#operation/restaurantsTenantRestaurantIdCatalogueOfflineItemRequestsPost) to ensure that records of offline items are not removed from our system if the menu data is older than the offline items request.
          format: date-time
          nullable: true
        sourceApplication:
          type: string
          description: The name of the client application sending the request to ingest the product catalogue. For example, 'jetconnect', 'menubuilder', or 'menupusher'.
          nullable: false
        brandId:
          type: string
          description: An identifier for the brand to which the product catalogue belongs. This may take the form of a brand slug (e.g. 'je-uk-kfc'), but a plain identifier (e.g. 'kfc') is preferred for new integrations.
          nullable: true
        posId:
          type: string
          description: An identifier for the point of sale system that produced the product catalogue data.
          nullable: true
        productDataToEnrich:
          type: array
          description: An array indicating which types of data from a databank integration may be used to enrich the data provided in the request.
          minItems: 0
          uniqueItems: true
          nullable: true
          items:
            enum:
              - allProductInformation
              - images
      description: A command to ingest product catalogue data.
      example:
        eTag: '"1b2cf535f27731c974343645a3985328"'
        sourceApplication: menuBuilder
        brandId: burger-chain
        posId: pos1
        productDataToEnrich:
          - allProductInformation
          - images
        menuVersionTimestamp: '2023-06-19T14:28:00Z'
    RestaurantsMenuSyncV4Item:
      type: object
      required:
        - id
        - name
        - variations
      properties:
        id:
          description: The identifier for the item. Unique within the product catalogue.
          type: string
          minLength: 1
          nullable: false
        name:
          description: The name of the item.
          type: string
          minLength: 1
          nullable: false
        variations:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4Variation'
          description: 'An array of one or more objects that represent distinct - but related - products for sale. When an item has more than one variation, this commonly represents different sizes. For example: small vs large pizza, or 330ml can vs 500ml bottle of lemonade.'
          type: array
          minItems: 1
          nullable: false
        nameTranslations:
          description: An optional array of translations for the name of the item.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
          uniqueItems: true
        description:
          description: The description of the item.
          type: string
          nullable: true
        descriptionTranslations:
          description: An optional array of translations for the description of the item.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
          uniqueItems: true
        externalId:
          description: The partner identifier for an item. For example, this could be a price look-up or stock keeping unit code.
          type: string
          minLength: 0
          maxLength: 1000
          nullable: true
        requireOtherProducts:
          description: Indicates whether the item can be ordered by itself or has to be ordered with other items. Typically, this applies to items within categories for drinks and desserts.
          type: boolean
          nullable: true
        imageUrl:
          description: URL for an image of the item.
          type: string
          minLength: 0
          nullable: true
        labels:
          description: 'An array of labels that will be displayed to customers. Allowed values: ''alcohol'', ''hot'', ''vegetarian'', ''vegan''. The alcohol label has historically been used to denote any item with a restriction applied, but this usage is considered deprecated and has been superseded by productTypes.'
          type: array
          items:
            type: string
          uniqueItems: true
          minItems: 0
          maxItems: 4
          nullable: true
        dealGroups:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4DealGroup'
          description: An optional array of objects that represent choices customers can make from variations of other items in the product catalogue. If the array contains objects, the item is a deal.
          type: array
          nullable: true
          minItems: 0
          uniqueItems: true
        modifierGroups:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4ModifierGroup'
          description: An optional array of objects that represent choices customers can make to modify the item.
          type: array
          nullable: true
          minItems: 0
          uniqueItems: true
    RestaurantsMenuSyncV4Modifier:
      type: object
      required:
        - id
        - name
        - minChoices
        - maxChoices
        - termsOfSale
      properties:
        id:
          description: The identifier for the modifier. Unique within the product catalogue.
          type: string
          minLength: 1
          nullable: false
        name:
          description: The name of the modifier.
          type: string
          minLength: 1
          nullable: false
        minChoices:
          description: The minimum number of times this modifier can be chosen within a given modifier group.
          type: integer
          format: int32
          minimum: 0
          nullable: false
        maxChoices:
          description: The maximum number of times this modifier can be chosen within a given modifier group.
          type: integer
          format: int32
          minimum: 1
          nullable: false
        termsOfSale:
          type: object
          description: Provides the details of how the modifier can be ordered.
          properties:
            delivery:
              $ref: '#/components/schemas/RestaurantsMenuSyncV4AdditionalPricing'
              description: An object that provides details of the modifier's effect on the price for delivery. If null or not provided, the modifier is not available for delivery.
              nullable: true
            collection:
              $ref: '#/components/schemas/RestaurantsMenuSyncV4AdditionalPricing'
              description: An object that provides details of the modifier's effect on the price for collection. If null or not provided, the modifier is not available for collection.
              nullable: true
        externalId:
          description: The partner identifier for a modifier. For example, this could be a price look-up or stock keeping unit code.
          type: string
          maxLength: 1000
          nullable: true
        nameTranslations:
          description: An optional array of translations for the name of the variation.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
        nutrition:
          description: Nutritional information for the modifier.
          $ref: '#/components/schemas/RestaurantsNutrition'
          nullable: true
        numberOfServings:
          description: The number of servings, expressed as a range.
          $ref: '#/components/schemas/RestaurantsNumberOfServings'
          nullable: true
        additionalInformation:
          type: string
          description: This field will be deprecated in the future and is to be used for migrating and compatibility with L-TA menus only.
          nullable: true
        additionalInformationTranslations:
          description: An optional array of translations for the additional information for the modifier.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
        physicalProperties:
          $ref: '#/components/schemas/RestaurantsMenuSyncV4PhysicalProperties'
          nullable: true
        gtin:
          $ref: '#/components/schemas/RestaurantsGtin'
          nullable: true
        productTypes:
          $ref: '#/components/schemas/RestaurantsProductTypes'
          nullable: true
    RestaurantsMenuSyncV4ModifierGroup:
      type: object
      required:
        - id
        - minChoices
        - maxChoices
        - modifiers
      properties:
        id:
          description: The identifier for the modifier group. Unique within the product catalogue.
          type: string
          minLength: 1
          nullable: false
        minChoices:
          description: The minimum number of modifiers that must be selected to satisfy this modifier group.
          type: integer
          format: int32
          minimum: 0
          nullable: false
        maxChoices:
          description: The maximum number of modifiers that must be selected to satisfy this modifier group.
          type: integer
          format: int32
          minimum: 1
          nullable: false
        modifiers:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4Modifier'
          description: An array of one or more modifiers that can be selected to satisfy this modifier group.
          type: array
          minItems: 1
          nullable: false
        name:
          description: A name for the modifier group, usually phrased as a question.
          type: string
          nullable: true
          example: Would you like any extras?
        nameTranslations:
          description: An optional array of translations for the name of the modifier group.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
    RestaurantsMenuSyncV4PhysicalProperties:
      type: object
      description: The physical properties of an item.
      properties:
        grossWeight:
          description: The gross weight information for an item.
          $ref: '#/components/schemas/RestaurantsGrossWeight'
          nullable: true
        netQuantity:
          description: The net quantity information for an item.
          $ref: '#/components/schemas/RestaurantsNetQuantity'
          nullable: true
          example:
            unit: ml
            value: 330
            quantity: 6
            summary: Represents a product with a net quantity of 330ml per item in a multipack of 6 items, e.g. 6 pack of Coca-Cola.
    RestaurantsMenuSyncV4ProductCatalogue:
      type: object
      description: Schema for product catalogue data to publish to the JET platform. This schema is also known as Menu Sync v4.
      required:
        - name
        - baseLanguage
        - currency
        - categories
        - items
      properties:
        name:
          description: The name for the product catalogue. Usually matches the name of the store.
          type: string
          minLength: 1
          nullable: false
        baseLanguage:
          description: The language used for the base text in the product catalogue, represented as an ISO 639-1 language code.
          type: string
          minLength: 2
          maxLength: 2
          pattern: ^[a-z]{2}$
          nullable: false
        currency:
          $ref: '#/components/schemas/SharedCurrency'
          description: The currency used to represent prices, represented as an ISO 4217 currency code. For example, GBP, EUR or AUD.
        categories:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4Category'
          description: The categories used to organize the items in the product catalogue.
          type: array
          minItems: 0
          nullable: true
        categoryInformation:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4CategoryInformation'
          description: The categories and sub-categories used to organize the items in the product catalogue.
          type: array
          minItems: 0
          nullable: true
        items:
          items:
            $ref: '#/components/schemas/RestaurantsMenuSyncV4Item'
          description: The items sold by the store.
          type: array
          minItems: 1
          nullable: false
        quantityRestrictions:
          items:
            $ref: '#/components/schemas/RestaurantsQuantityRestriction'
          description: Specifies restrictions on the quantities for items added to the basket.
          type: array
          minItems: 0
          nullable: true
        description:
          description: A top-level description for the product catalogue.
          type: string
          nullable: true
    RestaurantsMenuSyncV4TimeConstraint:
      type: object
      description: A constraint on the time and days of the week when something is available
      required:
        - fromTime
        - toTime
        - daysOfWeek
      properties:
        fromTime:
          description: The time of day (inclusive) when the product or category becomes available, in the 24-hour format HH:mm:ss.
          $ref: '#/components/schemas/SharedIso8601Time'
          nullable: false
        toTime:
          description: The time of day (exclusive) when the product or category becomes unavailable, in the 24-hour format HH:mm:ss.
          $ref: '#/components/schemas/SharedIso8601Time'
          nullable: false
        daysOfWeek:
          description: An array of one or more days of the week on which the time constraint applies.
          type: array
          minItems: 1
          maxItems: 7
          uniqueItems: true
          nullable: false
          items:
            $ref: '#/components/schemas/SharedDayOfWeek'
    RestaurantsMenuSyncV4Variation:
      type: object
      required:
        - id
        - name
        - termsOfSale
      properties:
        id:
          description: The identifier for the variation. Unique for variations within the product catalogue, but may be shared with id of the item to which the variation belongs.
          type: string
          minLength: 1
          nullable: false
        name:
          description: The name of the variation. If this is the only variation for the item, this should be the same as the name of the item.
          type: string
          minLength: 1
          nullable: false
        termsOfSale:
          type: object
          description: Provides the details of how and when the variation can be ordered.
          properties:
            delivery:
              items:
                $ref: '#/components/schemas/RestaurantsMenuSyncV4VariationPricing'
              description: An array of objects that provides details of when and how (including price) the variation can be ordered for delivery. If empty, null, or not provided, the variation is not available for delivery.
              minItems: 0
              nullable: true
            collection:
              items:
                $ref: '#/components/schemas/RestaurantsMenuSyncV4VariationPricing'
              description: An array of objects that provides details of when and how (including price) the variation can be ordered for collection. If empty, null, or not provided, the variation is not available for collection.
              minItems: 0
              nullable: true
        nameTranslations:
          description: An optional array of translations for the name of the variation.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
        dealOnly:
          description: Indicates whether the variation is only available as part of a deal or will be available to order as a standalone item.
          type: boolean
          nullable: true
        kitchenNumber:
          description: Identifies the item with a number on the physical menu that the kitchen understand e.g. on a Chinese menu number 16 could correspond to "BBQ ribs"
          type: string
          nullable: true
        modifierGroupIds:
          items:
            type: string
          description: An optional array of references to the modifier groups that are applicable for this variation.
          type: array
          minItems: 0
          nullable: true
        externalId:
          description: The partner identifier for a variation. For example, this could be a price look-up or stock keeping unit code.
          type: string
          minLength: 0
          maxLength: 1000
          nullable: true
        nutrition:
          $ref: '#/components/schemas/RestaurantsNutrition'
          nullable: true
        numberOfServings:
          $ref: '#/components/schemas/RestaurantsNumberOfServings'
          nullable: true
        dealGroupIds:
          items:
            type: string
          description: An optional array of references to the deal groups that are applicable for this variation.
          type: array
          minItems: 0
          nullable: true
        physicalProperties:
          $ref: '#/components/schemas/RestaurantsMenuSyncV4PhysicalProperties'
          description: The physical properties of the variation.
          nullable: true
        additionalInformation:
          type: string
          description: This field will be deprecated in the future and is to be used for migrating and compatibility with L-TA product catalogues only.
          nullable: true
        additionalInformationTranslations:
          description: An optional array of translations for the additional information for the variation.
          type: array
          minItems: 0
          items:
            $ref: '#/components/schemas/RestaurantsMenuTranslation'
          nullable: true
        gtin:
          $ref: '#/components/schemas/RestaurantsGtin'
          nullable: true
        productTypes:
          $ref: '#/components/schemas/RestaurantsProductTypes'
          nullable: true
    RestaurantsMenuSyncV4VariationPricing:
      type: object
      description: The details of how and when a variation can be ordered for a given service type
      required:
        - basePrice
      properties:
        basePrice:
          description: The base price for the variation in the minor unit of the currency.
          type: number
          format: int32
          minimum: 0
          nullable: false
        additionalCharges:
          $ref: '#/components/schemas/RestaurantsMenuSyncV4AdditionalCharges'
          nullable: true
        unitPrice:
          $ref: '#/components/schemas/RestaurantsUnitPrice'
          nullable: true
        timeConstraint:
          description: Restriction on the time and days when the variation is available for sale. If null or not provided, there are no specific restrictions on when the variation can be ordered.
          $ref: '#/components/schemas/RestaurantsMenuSyncV4TimeConstraint'
          nullable: true
    RestaurantsOrderTime:
      properties:
        upperBoundMinutes:
          description: Order time upper bound value, in minutes.
          format: int32
          type: integer
        dayOfWeek:
          description: Day of week for order time
          enum:
            - sunday
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
          type: string
        serviceType:
          description: Service type of the order time
          enum:
            - Delivery
            - Collection
          type: string
        lowerBoundMinutes:
          description: Order time lower bound value, in minutes.
          format: int32
          type: integer
        overrides:
          description: Time-based adjustments to upper and lower bounds. No limits for the overrides count. No overlaps allowed.
          type: array
          items:
            $ref: '#/components/schemas/RestaurantsOrderTimeOverride'
      description: The object representing order time entry
      example:
        upperBoundMinutes: 50
        dayOfWeek: monday
        serviceType: Delivery
        lowerBoundMinutes: 35
        overrides:
          - startTime: '18:00:00'
            endTime: '20:00:00'
            lowerBoundMinutes: 44
            upperBoundMinutes: 59
      type: object
    RestaurantsUpdateOrderTimeRequest:
      properties:
        upperBoundMinutes:
          description: Order time upper bound value, in minutes.
          format: int32
          type: integer
        lowerBoundMinutes:
          description: Order time lower bound value, in minutes.
          format: int32
          type: integer
      description: Request object for order time update
      example:
        upperBoundMinutes: 50
        lowerBoundMinutes: 35
      type: object
    RestaurantsWebhooksMenuIngestionComplete:
      type: object
      properties:
        tenant:
          format: enum
          description: Country code for the market the restaurant is in
          enum:
            - au
            - dk
            - es
            - ie
            - it
            - 'no'
            - uk
            - nz
          type: string
        result:
          format: enum
          description: The result of the menu ingestion process
          enum:
            - success
            - fail
          type: string
        correlationId:
          description: The ID of the execution which has been completed
          type: string
        restaurantId:
          description: The Just Eat restaurant ID
          type: string
        timestamp:
          description: The ISO-8601 datetime at which the menu ingestion completed
          format: date-time
          type: string
        fault:
          description: Details of the fault which caused the menu ingestion to fail. This is only present if menu ingestion did not complete successfully
          properties:
            id:
              description: A unique ID for the fault
              type: string
            errors:
              items:
                properties:
                  description:
                    description: A description of the error to help you resolve the issue
                    type: string
                  code:
                    description: An alphanumeric code for the error
                    type: string
                type: object
              description: Details of errors which caused the fault
              type: array
          type: object
      example:
        tenant: uk
        result: fail
        correlationId: 64bef5ee-7265-47f8-9aee-28bc74f00b13
        restaurantId: '123456'
        timestamp: '2020-01-01T00:00:00.0000000+00:00'
        fault:
          id: 70e307df-0156-4d3c-ab92-dd57a103350b
          errors:
            - description: 'Invalid variation: 15237d6c-c866-55da-9e61-b4f59dcab9ae - variations must be associated with at least one availability'
              code: '123'
            - description: 'Invalid availability ID: menu-105369-availabilities - availability IDs must be integers'
              code: '145'
    RestaurantsWebhooksOrderTimeUpdated:
      type: object
      properties:
        upperBoundMinutes:
          description: Order time upper bound value, in minutes.
          format: int32
          type: integer
        serviceType:
          format: enum
          description: Service type of the order time.
          enum:
            - Delivery
            - Collection
          type: string
        dayOfWeek:
          format: enum
          description: The day of the week that has been updated.
          enum:
            - Sunday
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
          type: string
        lowerBoundMinutes:
          description: Order time lower bound value, in minutes.
          format: int32
          type: integer
        restaurantId:
          description: The Just Eat restaurant ID
          type: string
      example:
        upperBoundMinutes: 50
        serviceType: Delivery
        dayOfWeek: Monday
        lowerBoundMinutes: 35
        restaurantId: '123456'
    RestaurantserviceBusinessTypeEnum:
      description: The business type of a partner.
      enum:
        - restaurant
        - grocery
      type: string
    RestaurantservicePartnerAddress:
      type: object
      description: Addresses that are associated with the partner.
      properties:
        type:
          type: string
          description: |
            The type of address, describing the association of the address with the partner. The possible types are:
              - **commercial** - Indicates the address is the commercial location for the partner.
          enum:
            - commercial
        lines:
          type: array
          description: Holds more location specific details such as the house number, building name or street.
          items:
            type: string
        postalCode:
          type: string
          description: Holds the postal code that typically maps to a geographic area. The codes, and the system behind them, varies from country to country.
        city:
          type: string
          description: Holds the postal settlement, such as a city or town.
        country:
          type: string
          description: Contains the country code as defined by ISO 3166 codes.
        location:
          $ref: '#/components/schemas/SharedGeoJsonPoint'
    RestaurantservicePartnerBrandDetails:
      type: object
      description: Detail of the brand/chain associated with the partner.
      properties:
        externalId:
          type: integer
          description: The external identifier of the brand.
        name:
          type: string
          description: The name of a brand.
    RestaurantservicePartnerEmailAddress:
      type: object
      description: Email contact addresses associated with the partner.
      properties:
        email:
          type: string
          description: Email address of the partner.
        label:
          type: string
          description: Label for the email (e.g., owner email, business email).
          enum:
            - ownerEmail
            - ownerEmergencyEmail
            - businessEmail
            - alternativeBusinessEmail
    RestaurantservicePartnerInformationResponse:
      properties:
        id:
          description: Unique identifier of the partner in JET.
          type: string
        legacyIds:
          description: Consisting of legacy ids across platforms for backward compatibility of the downstream services.
          properties:
            takeawayId:
              description: Legacy Takeaway partner ID
              type: integer
            jeId:
              description: Legacy Just Eat partner ID
              type: integer
        name:
          description: Name of the partner in JET.
          type: string
        tenant:
          description: Two letter tenant code indicating what market the partner is in.
          type: string
        isTestPartner:
          description: Indicates if the partner is a test partner.
          type: boolean
        addresses:
          type: array
          description: A list of addresses associated with the partner.
          items:
            $ref: '#/components/schemas/RestaurantservicePartnerAddress'
        emailAddresses:
          type: array
          description: Email contact addresses associated with the partner.
          items:
            $ref: '#/components/schemas/RestaurantservicePartnerEmailAddress'
        phoneNumbers:
          type: array
          description: Phone contact addresses associated with the partner.
          items:
            $ref: '#/components/schemas/RestaurantservicePartnerPhoneNumbers'
        brand:
          $ref: '#/components/schemas/RestaurantservicePartnerBrandDetails'
          description: Detail of the brand/chain associated with the partner.
        businessType:
          $ref: '#/components/schemas/RestaurantserviceBusinessTypeEnum'
          description: The business type of a partner.
        status:
          $ref: '#/components/schemas/RestaurantservicePartnerStatusEnum'
          description: The status of a partner.
        generalSettings:
          type: object
          description: Indicates a group of partner settings/capabilities.
          properties:
            allowCourierTipping:
              description: Indicates if courier tipping is allowed for the partner.
              type: boolean
            allowOrderComments:
              description: Indicates if order comments are allowed for the partner.
              type: boolean
            allowItemSubstitutions:
              description: Indicates if item substitutions are allowed for the partner.
              type: boolean
            allowSelfClosing:
              description: Indicates whether the partner is allowed to close themselves.
              type: boolean
            excludeFromSearch:
              description: Indicates whether the partner should be excluded from search results.
              type: boolean
            showAddressOnline:
              type: boolean
              description: Showing the address on Web/APP when setting is enabled. (for Pickup orders - The restaurant's address must always be shown)
            allowPhoneNumberDisplayInEmail:
              type: boolean
              description: This setting shows or hides the phone number on the order confirmation email.
            allowGoogleFoodOrder:
              type: boolean
              description: Determines whether the restaurant is available on the Google Food Ordering Platform.
            isVIPPartner:
              type: boolean
              description: Indicates whether the partner is a VIP one.
      description: Response containing details of the partner in JET.
      example:
        id: DACVSSQJ2F8T
        legacyIds:
          takeawayId: 273
          jeId: 987654
        name: Test Partner
        tenant: uk
        isTestPartner: false
        status: active
        brand:
          externalId: 77483
          name: Test Brand
        addresses:
          - lines:
              - '123'
              - Test Street
            city: Testville
            postalCode: TE5 7ST
            country: uk
            location:
              type: point
              coordinates:
                - 51.501285
                - -0.142442
        businessType: restaurant
        generalSettings:
          allowCourierTipping: true
          allowOrderComments: true
          allowItemSubstitutions: true
          excludeFromSearch: true
          allowSelfClosing: true
          showAddressOnline: true
          allowPhoneNumberDisplayInEmail: false
          allowGoogleFoodOrder: true
          isVIPPartner: false
      type: object
    RestaurantservicePartnerPhoneNumbers:
      type: object
      properties:
        number:
          type: string
          description: Phone number of the partner in E.164 format.
          pattern: ^\+[1-9]\d{1,14}$
        label:
          type: string
          description: Label for the phone number (e.g., owner phone, marketing phone).
          enum:
            - ownerPhone
            - ownerEmergencyPhone
            - businessPhone
            - alternativeBusinessPhone
        isMobile:
          type: boolean
          description: Indicates if the phone number is a mobile number.
    RestaurantservicePartnerStatusEnum:
      description: The status of a partner.
      enum:
        - active
        - inactive
      type: string
    RestaurantsettingsRestaurantSettingsResponse:
      properties:
        isMenuManagementTeaserVisible:
          description: A value indicated whether menu management teaser should be shown on restaurant edit menu page
