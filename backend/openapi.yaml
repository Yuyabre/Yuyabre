              SeoName:
                type: string
                description: Public name of this partner used for Search Engine Optimization (SEO).
                minLength: 1
                maxLength: 100
                nullable: false
              IsPrimary:
                type: boolean
                description: Indicates whether this partner is the primary partner for this basket.
        Options:
          type: array
          nullable: false
          description: The list of available delivery models for the checkout.
          minItems: 1
          items:
            type: object
            required:
              - Id
              - Available
            properties:
              Id:
                type: string
                description: The identifier of the delivery model.
                nullable: false
                enum:
                  - courier
                  - drone
              DeliveryCharge:
                type: object
                nullable: true
                description: The delivery fee for this delivery model - null if fee is not calculated.
                properties:
                  fee:
                    format: decimal
                    type: number
                    nullable: false
                    minimum: 0
                    description: The amount of the delivery fee
              Available:
                type: boolean
                description: Whether the delivery model is currently available
                nullable: false
              UnavailabilityReason:
                type: string
                description: A localized message explaining to the customer why the delivery model is not available, if applicable.
                nullable: true
                minLength: 0
                maxLength: 250
    BasketDiscount:
      description: Discount details.
      additionalProperties: false
      type: object
      title: Discount
      properties:
        discountAmount:
          description: Money discount.
          nullable: false
          type: number
          format: decimal
          minimum: 0.01
        discountPercentage:
          description: Percent discount.
          nullable: false
          format: integer
          type: number
          minimum: 1
          maximum: 100
      minProperties: 1
      maxProperties: 1
      example:
        discountAmount: 51.07
    BasketGenericErrorResponse:
      description: Generic error response structure
      properties:
        ErrorCode:
          type: string
          description: Detailed error code that happened
        Description:
          type: string
          description: The details of the error
        SubErrors:
          items:
            type: string
          type: array
          description: The details of the inner errors
      type: object
    BasketGroupSummary:
      description: Group information.
      properties:
        GroupSummaryId:
          type: string
          description: Unique identifier of the group
        GroupName:
          type: string
          description: Name of the group based on the Initiator name
        Url:
          type: string
          description: URL to user-facing web application to join the group
        Status:
          type: string
          description: Status of the actual group
          enum:
            - open
            - locked
            - deleted
        Participants:
          type: array
          description: Participant needed to relate products to participants of the group.
          items:
            type: object
            properties:
              ParticipantId:
                type: string
                description: Unique identifier of the participant
              Name:
                type: string
                description: Name of the participant
              Role:
                type: string
                enum:
                  - initiator
                  - participant
                description: Role of the participant within the group
              Status:
                type: string
                enum:
                  - ordering
                  - ready
                description: Status of the participant within the group
              BalanceShare:
                nullable: true
                type: object
                description: JET Pay information
                properties:
                  IsAvailable:
                    type: boolean
                    description: Indicates if participant can share their balance with initiator.
                  Balance:
                    format: decimal
                    type: number
                    description: The amount participant has to share from their balance.
                  OptedIn:
                    type: boolean
                    description: Indicates if participant opted to share their balance with initiator.
                  Reference:
                    type: string
                    description: The reference information that participant can add for their tracking purpose.
                  ReferenceRequired:
                    type: boolean
                    description: Indicates if Reference is mandatory field that need to be filled by participant.
              Adjustments:
                items:
                  $ref: '#/components/schemas/BasketAdjustments'
                type: array
                description: List of participant adjustments
                example:
                  - Type: ItemDepositGroup
                    Name: Deposit £0.25 x 2
                    Adjustment: 0.5
                    Description: Deposit £0.25 x 2
                  - Type: ShareMyBalance
                    Name: Share My Balance
                    Adjustment: -4
                    Description: Share My Balance
              BasketTotals:
                type: object
                description: Calculated totals for participant.
                properties:
                  SubTotal:
                    format: decimal
                    type: number
                    description: The subtotal for the participant before any discounts or fees.
                  AdjustmentsTotal:
                    format: decimal
                    type: number
                    description: Total of the adjustments.
                  Total:
                    format: decimal
                    type: number
                    description: The total for the participant after shared balance.
              Products:
                type: array
                description: Product selected
                items:
                  type: object
                  properties:
                    BasketProductId:
                      type: string
                      description: The basket product identifier
                    TotalPrice:
                      format: decimal
                      type: number
                      description: The total price
                    Quantity:
                      type: number
                      format: integer
                      description: The quantity
              Deals:
                type: array
                description: Deals selected
                items:
                  type: object
                  properties:
                    BasketProductId:
                      type: string
                      description: The basket product identifier
                    TotalPrice:
                      format: decimal
                      type: number
                      description: The total price
                    Quantity:
                      type: number
                      format: integer
                      description: The quantity
      type: object
    BasketInvalidParticipant:
      description: Details about error with group order participant
      properties:
        ParticipantId:
          type: string
          description: The participant id
        ErrorType:
          type: string
          description: The type of the error
      type: object
    BasketInvalidProduct:
      description: An invalid product
