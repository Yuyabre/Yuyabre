        We do not support a PATCH request on the root path and a 400 status code will be returned.
      properties:
        customer:
          $ref: '#/components/schemas/CheckoutCheckoutUpdateCustomer'
        fulfilment:
          $ref: '#/components/schemas/CheckoutCheckoutUpdateFulfilment'
        notes:
          $ref: '#/components/schemas/CheckoutCheckoutNotesV2'
        voucher:
          $ref: '#/components/schemas/CheckoutCheckoutVoucherV2'
          nullable: true
        deliveryModelOptions:
          $ref: '#/components/schemas/CheckoutCheckoutDeliveryModelOptions'
          nullable: true
        deliveryOptions:
          type: object
          description: |
            Information about the voucher to apply.
          additionalProperties: false
          nullable: true
          properties:
            voucher:
              $ref: '#/components/schemas/CheckoutCheckoutVoucherV2'
              nullable: true
        additionalProducts:
          type: object
          description: Information about the additional product to apply.
          additionalProperties: false
          nullable: true
          properties:
            memberships:
              type: array
              nullable: true
              items:
                $ref: '#/components/schemas/CheckoutCheckoutUpdateMembership'
                nullable: false
        tipping:
          $ref: '#/components/schemas/CheckoutCheckoutUpdateTipping'
        payment:
          $ref: '#/components/schemas/CheckoutCheckoutPaymentCheckoutUpdatePayment'
      type: object
    CheckoutCheckoutUpdateTipping:
      type: object
      description: |
        Details of any tips that should be applied.

        Tips should only be applied to checkouts if the Checkout Options endpoint indicates that tipping is enabled.

        The applied tip should be a value that the Checkout Options endpoint indicates is supported on this Checkout.
      additionalProperties: false
      nullable: true
      properties:
        courier:
          type: object
          description: Details of any courier tip that should be applied.
          additionalProperties: false
          nullable: true
          properties:
            fixedAmount:
              type: object
              nullable: true
              description: Set to indicate that a fixed amount tip should be applied.
              required:
                - amount
              properties:
                amount:
                  type: number
                  format: integer
                  nullable: false
                  minimum: 1
                  description: The tip amount that should be applied in minor currency units.
            customAmount:
              type: object
              nullable: true
              description: Set to indicate that a custom amount tip should be applied.
              required:
                - amount
              properties:
                amount:
                  type: number
                  format: integer
                  nullable: false
                  minimum: 1
                  description: The tip amount that should be applied in minor currency units.
    CheckoutCheckoutVoucherResponse:
      type: object
