    CustomersupportLegalConcernRequest:
      type: object
      description: A request to report a legal concern from a customer
      properties:
        name:
          maxLength: 160
          description: The customer name
          type: string
        emailAddress:
          maxLength: 160
          description: The customer email address
          type: string
          format: email
        topic:
          description: Topic code representing the context for the legal concern
          enum:
            - menu
            - review
            - sellersInformation
          type: string
        reason:
          description: Reason code representing the reason for the legal concern
          enum:
            - fake
            - nameOrDescriptionViolatesThirdPartyTrademarkRights
            - itemOrImageViolatesThirdPartyTrademarkRights
            - itemNotFromBrand
            - itemFakeCopyOrIllegal
            - itemDescriptionWrongOrMisleading
            - itemImagesDoNotRepresent
            - itemAllergenInformationMissingOrIncorrect
            - itemMayContainRestrictedIngredients
            - insultsHarassesOrDiscriminates
            - indicatesBriberyModernDaySlaveryOrExploitation
            - inaccurateFoodHygieneRating
            - incorrectLocation
            - inaccurateDescriptionIncorrectOrOffensive
            - incorrectOpeningTimes
            - other
            - profanityOrOffensiveWording
          type: string
        partnerId:
          maxLength: 30
          description: The id of the Partner (e.g. a restaurant)
          type: string
        partnerName:
          maxLength: 200
          description: The name of the Partner (e.g. a restaurant)
          type: string
        details:
          maxLength: 4000
          description: The details of the legal concern request including the specific complaint that the customer has about this content
          type: string
        identifier:
          maxLength: 120
          description: An identifier for the content that the customer has a legal concern with to help assist in the identification of the content e.g. menu item name or review id
          type: string
        additionalInformation:
          maxLength: 70
          description: Additional information used to help identify the specifics of the legal concern e.g. category of the menu item that has been reported
          type: string
        confirmation:
          description: Legal confirmation from the customer that their report is accurate to the best of their knowledge
          type: boolean
      required:
        - name
        - emailAddress
        - topic
        - reason
        - details
        - confirmation
      example:
        name: Bob Smith
        emailAddress: bob.smith@justeattakeaway.com
        topic: sellersInformation
        reason: incorrectLocation
        partnerId: '123456'
        partnerName: Random Restaurant
        details: The seller is not telling the truth in their information
        identifier: '123456'
        confirmation: true
    CustomersupportSupportTicketRequest:
      type: object
      description: A request to raise a support ticket from a customer
      properties:
        name:
          maxLength: 160
          description: The customer name
          type: string
        emailAddress:
          maxLength: 160
          description: The customer email address
          type: string
          format: email
        phoneNumber:
          maxLength: 20
          description: The customer phone number
          type: string
        details:
          maxLength: 4000
          description: The customer's description of their request, including any extra details that will help an agent resolve their problem
          type: string
        relatedSubject:
          maxLength: 200
          description: The related subject of the support request, e.g. title of the FAQ article that this request was made from
          type: string
        reason:
          maxLength: 100
          description: The summary reason why the support request is being made used to direct the support request to the correct location
          type: string
        orderNumber:
          maxLength: 30
          description: The friendly order identifier of the order related to the support request
          type: string
      required:
        - name
        - emailAddress
        - phoneNumber
        - details
        - relatedSubject
        - reason
      example:
        name: Bob Smith
        emailAddress: bob.smith@justeattakeaway.com
        phoneNumber: '01234567890'
        details: My order was missing half of the pizza I ordered!
        relatedSubject: How do we handle missing items in your order
        reason: default
        orderNumber: '12345678'
