                    type: integer
            deliveryArea:
              description: The outward code (for postcode based searches) or district (for latitude-longitude based searches) of the search location.
              type: string
            baseCustomerSegment:
              description: |
                A number representing the requesting customer's segment.
                Known values:
                  * 0 - Prospect
                  * 1 - New
                  * 2 - Early
                  * 3 - Engaged
                  * 4 - Reactivated
                  * 5 - Lapsing
                  * 6 - Dormant
                  * 7 - Churned
              type: number
        restaurants:
          description: A ranked collection of restaurants.
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryRestaurantsV3EnrichedRestaurantItem'
        deliveryFees:
          description: Information related to delivery fees.
          type: object
          required:
            - restaurants
          properties:
            restaurants:
              description: A dictionary of restaurant delivery fees.
              type: object
              additionalProperties:
                x-additionalPropertiesName: restaurant id
                type: object
                properties:
                  restaurantId:
                    description: The identifier of the restaurant.
                    type: string
                  minimumOrderValue:
                    description: The minimum order value (excluding fees) required, in the smallest unit of local currency (e.g. pence).
                    type: number
                  bands:
                    description: Collection of delivery fee bands.
                    type: array
                    items:
                      type: object
                      properties:
                        minimumAmount:
                          description: The minimum order value (excluding fees) when this fee band applies. The fee with the highest `minimumAmount` that is less than or equal to order value applies. This is in the smallest unit of local currency (e.g. pence).
                          type: number
                        fee:
                          description: The delivery fee, in the smallest unit of local currency (e.g. pence).
                          type: number
        promotedPlacement:
          description: Information related to promoted placement restaurants.
          type: object
          required:
            - filteredSearchPromotedLimit
            - rankedIds
            - restaurants
          properties:
            filteredSearchPromotedLimit:
              description: How many restaurants were promoted by applying a filtered search.
              type: number
              minimum: 0
            rankedIds:
              description: Restaurants that can be promoted, in preferred order.
              type: array
              items:
                type: string
            restaurants:
              description: A dictionary of promoted restaurants.
              type: object
              additionalProperties:
                x-additionalPropertiesName: restaurant id
                type: object
                required:
                  - restaurantId
                  - defaultPromoted
                properties:
                  restaurantId:
                    description: Id of the restaurant.
                    type: string
                  defaultPromoted:
                    description: Should be promoted by default.
                    type: boolean
        filters:
          description: A dictionary of pre-calculated filters for this search.
          type: object
          additionalProperties:
            x-additionalPropertiesName: filter id
            type: object
            required:
              - displayName
              - restaurantIds
              - imageName
            properties:
              displayName:
                description: The display name for the filter.
                type: string
              imageName:
                description: The image name of the filter, which should be used when retrieving imagery for the filter.
                type: string
              group:
                description: Used to determine how to combine multiple selected filters. OR filters from the same group, AND from different groups. e.g. cuisine OR cuisine AND offer.
                type: string
              restaurantIds:
                description: The list of restaurant ids that match this filter.
                type: array
                items:
                  type: string
              trackingType:
                description: An opaque value used for analytics.
                type: string
        defaultLayout:
          description: The recommended filters and verticals to display for this search.
          type: object
          required:
            - refineFilters
            - verticals
          properties:
            refineFilters:
              description: An ordered list of filter ids to be included as refine filters.
              type: array
              items:
                type: string
            verticals:
              description: An ordered list of verticals for this search.
              type: array
              items:
                type: object
                required:
                  - type
                  - id
                  - title
                  - contents
                  - applicableFilters
                properties:
                  type:
                    description: The type of layout item.
                    type: string
                    enum:
                      - vertical
                  id:
                    description: The id of the vertical.
                    type: string
                  title:
                    description: The title of the vertical.
                    type: string
                  contents:
                    description: The initial, unfiltered, best match layout for this vertical. Unknown items should be ignored.
                    type: array
                    items:
                      anyOf:
                        - $ref: '#/components/schemas/DiscoveryRestaurantsV3LayoutListItem'
                        - $ref: '#/components/schemas/DiscoveryRestaurantsV3LayoutEnrichedListItem'
                        - $ref: '#/components/schemas/DiscoveryRestaurantsV3LayoutCarouselListItem'
                        - $ref: '#/components/schemas/DiscoveryRestaurantsV3LayoutWebViewListItem'
                        - $ref: '#/components/schemas/DiscoveryRestaurantsV3LayoutRestaurantItem'
                  applicableFilters:
                    description: An ordered list of filter ids that are specific to the vertical.
                    type: array
                    items:
                      type: string
                  hidden:
                    description: A flag to indicate that the vertical should not be included in any navigation
                    type: boolean
                  heroImageUrl:
                    description: URL template that can be used to access the vertical's hero image. The {transformations} placeholder can be replaced with additional Cloudinary transformations (e.g. height, width). For more details see https://cloudinary.com/documentation/image_transformations
                    type: string
                    format: uri
                  subType:
                    description: The subtype of the vertical. Unknown subtypes should be ignored.
                    type: string
                    enum:
                      - landing
                      - verticalLanding
        enrichedLists:
          description: A dictionary to store extra details for enriched lists used in any layouts.
          type: object
          additionalProperties:
            x-additionalPropertiesName: enriched list id
            type: object
            properties:
              subtitle:
                description: The subtitle for the enriched list.
                type: string
              trackingId:
                description: The tracking id for the enriched list, used to identify what generated the enriched list.
                type: string
        catalogueItems:
          description: A dictionary to store extra details for catalogue items used in any layouts.
          type: object
          additionalProperties:
            x-additionalPropertiesName: catalogueItemId
            $ref: '#/components/schemas/DiscoveryRestaurantsV3CatalogueItem'
        banners:
          description: A dictionary to store extra details for banners used in any layouts.
          type: object
          additionalProperties:
            x-additionalPropertiesName: Banner id
            $ref: '#/components/schemas/DiscoveryRestaurantsV3BannerItem'
        offers:
          description: Information related to restaurant offers.
          type: object
          required:
            - restaurants
          properties:
            restaurants:
              description: A dictionary of restaurant offers.
              type: object
              additionalProperties:
                x-additionalPropertiesName: restaurant id
                type: object
                properties:
                  featured:
                    description: An ordered list of offers representing the first offer of each `offerType`.
                    type: array
                    items:
                      type: object
                      required:
                        - offerType
                      properties:
                        description:
                          description: Description of the offer. e.g. `Cheeky Tuesday - 20% off when you spend £15`
                          type: string
                        offerType:
                          description: The type of offer. Currently supported types are `Percent`, `FreeItem`, `Bogof`, `StampCard`, `BogofMixMatch` and `Notification`.
                          type: string
                        exclusive:
                          description: If the offer is exclusive to the requested customer.
                          type: boolean
        sponsored:
          type: object
          description: Sponsored campaign data, keyed by vertical ID.
          additionalProperties:
            x-additionalPropertiesName: vertical id
            type: object
            properties:
              lists:
                type: object
                description: Sponsored campaign IDs, keyed by restaurant ID for this vertical.
                additionalProperties:
                  x-additionalPropertiesName: restaurant id
                  type: string
              carousels:
                type: object
                description: Sponsored campaign data, keyed by carousel ID in this vertical.
                additionalProperties:
                  x-additionalPropertiesName: carousel id
                  type: object
                  description: Sponsored campaign IDs, keyed by restaurant ID for this vertical and carousel.
                  additionalProperties:
                    x-additionalPropertiesName: restaurant id
                    type: string
        auctions:
          description: A dictionary of sponsored verticals and related tracking information.
          type: object
          additionalProperties:
            x-additionalPropertiesName: verticalId
            type: object
            description: A dictionary of restaurants and their related auction id.
            additionalProperties:
              x-additionalPropertiesName: restaurantId
              type: string
        favourites:
          description: Information about the user's favourites.
          type: object
          properties:
            restaurants:
              description: An array of restaurant IDs that the user has marked as favourites. This will be an empty array if the user has no favourites or is not authenticated. This property will be omitted if favourites are unavailable.
              type: array
              items:
                type: string
        componentThemes:
