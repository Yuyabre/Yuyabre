          description: Current time zone of the restaurant in IANA format.
          type: string
          nullable: true
        optInDate:
          description: Current subscriptions opt-in date (UTC). Stamps may only be collected after this date. If this is in the future or null, the restaurant should not be considered part of the scheme.
          format: date-time
          nullable: true
          type: string
        optOutDate:
          description: Current subscriptions opt-out date (UTC). Only provided when the restaurant has confirmed their opt-out, see opt-out confirmation date. No further stamps can be earned after this date.
          format: date-time
          nullable: true
          type: string
        optOutConfirmationDate:
          description: Current subscriptions opt-out confirmation date (UTC). Only existing customers with an incomplete set of stamps can collect further stamps after this date.
          format: date-time
          nullable: true
          type: string
        offerInformation:
          description: Information about the offer.
          properties:
            offerType:
              description: Type of the offer.
              enum:
                - default
              format: enum
              type: string
            stampCardSize:
              description: Number of stamps required to complete a stamp card.
              format: int32
              type: integer
            discountPercentage:
              description: Percent of order value collected for each stamp.
              format: float
              type: number
          type: object
      type: object
    ConsumersSearchByConsumerResponse:
      description: A set of search results
      properties:
        cards:
          items:
            properties:
              amount:
                description: The amount for the gift card
                format: int32
                type: integer
              pan:
                type: string
                description: The pan
            type: object
          type: array
      type: object
    ConsumersUpdatePassword:
      required:
        - tenant
        - newPassword
        - oldPassword
      properties:
        tenant:
          description: Tenant for the consumer
          type: string
        newPassword:
          description: The new password
          type: string
        oldPassword:
          description: The old password
          type: string
      example:
        tenant: ie
        newPassword: Pa55word
        oldPassword: OldPassword
      type: object
    ConsumersUpdatePasswordResetFlowResponse:
      type: object
