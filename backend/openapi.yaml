    CheckoutCheckoutGetCustomer:
      type: object
      nullable: false
      description: |
        Details of the customer making the purchase.

        Details of the customer will need to be submitted to the service. No default values will be set.
      properties:
        lastName:
          maxLength: 100
          type: string
          description: |
            Customer's last name (Optional). Also known as Family Name.

            Please note, for the following countries, the maximum length is 30 characters:
              - Austria (AT)
              - Belgium (BE)
              - Bulgaria (BG)
              - Denmark (DK)
              - Germany (DE)
              - Luxembourg (LU)
              - Netherlands (NL)
              - Poland (PL)
              - Slovakia (SK)
              - Switzerland (CH)
          minLength: 0
          nullable: true
        phoneNumber:
          maxLength: 16
          type: string
          description: |
            Customer's phone number.

            A phone number can be represented in:
              - E.164 format e.g. +447777111111 or;
              - Local format of submitted tenant e.g. 07777111111.

            E.164 formatted phone numbers are preferred.
          minLength: 3
          nullable: true
        firstName:
          maxLength: 100
          type: string
          description: |
            Customer's first name. Also known as Given Name(s).

            Please note, for the following countries, the maximum length is 30 characters:
              - Austria (AT)
              - Belgium (BE)
              - Bulgaria (BG)
              - Denmark (DK)
              - Germany (DE)
              - Luxembourg (LU)
              - Netherlands (NL)
              - Poland (PL)
              - Slovakia (SK)
              - Switzerland (CH)
          minLength: 1
          nullable: true
        dateOfBirth:
          nullable: true
          description: |
            Customer's date of birth represented in ISO 8601 date format.

            Required in Australia (AU) only for fulfilling an order that contain items being purchased that require age verification.
          type: string
          format: date
        taxId:
          type: string
          description: Customer's tax ID reference.
          minLength: 0
          maxLength: 50
          nullable: true
    CheckoutCheckoutGetFulfilment:
      type: object
      nullable: false
      description: How and when the items will be received by the customer.
      properties:
        time:
          required:
            - asap
          type: object
          description: Time the customer wants to receive the order i.e. when order is fulfilled.
          properties:
            scheduled:
              required:
                - from
                - to
              type: object
              description: |
                Scheduled time the customer wants the order to be fulfilled.

                If ASAP is selected and fulfillable, this will be set to the next available fulfilment time.
              properties:
                from:
                  nullable: false
                  description: Earliest time the customer wants the order to be fulfilled represented in ISO 8601 UTC (Zulu Time).
                  type: string
                to:
                  nullable: false
                  description: |
                    Latest time the customer wants the order to be fulfilled represented in ISO 8601 UTC (Zulu Time). 

                    This time must be greater than or equal to the from time.
                  type: string
              nullable: true
            asap:
              nullable: false
              description: |
                If the order should be fulfilled as soon as possible (ASAP).

                ASAP may not be fulfillable.

                Default is false.
              type: boolean
          nullable: true
        location:
          nullable: true
          description: |
            The destination the customer wants to receive the order.

            This only applies to purchases with a delivery service type.
          properties:
            geolocation:
              required:
                - latitude
                - longitude
              description: The coordinates of a geographical location where the customer wants to receive the order.
              $ref: '#/components/schemas/SharedGeoposition'
            address:
              nullable: true
              description: The postal address where the customer wants to receive the order.
              properties:
                locality:
                  maxLength: 50
                  type: string
                  description: |
                    The locality of this address.

                    Also known as Town or City.

                    Please note, for the following countries, the maximum length is 64 characters.
                      - Austria (AT)
                      - Belgium (BE)
                      - Bulgaria (BG)
                      - Denmark (DK)
                      - Germany (DE)
                      - Luxembourg (LU)
                      - Netherlands (NL)
                      - Poland (PL)
                      - Slovakia (SK)
                      - Switzerland (CH)
                  minLength: 1
                  nullable: true
                lines:
                  maxItems: 4
                  type: array
                  minItems: 0
                  items:
                    maxLength: 100
                    type: string
                    description: Represents part of a street address.
                    minLength: 1
                    nullable: false
                  description: |
                    One or more lines representing the street address.

                    Please note:
                      * For Australia (AU) and New Zealand (NZ), the second item will represent the Level/Unit Number (optional).
                      * For the following countries, the maximum number of items is 1 and the maximum length of an item is 64 characters:
                        - Austria (AT)
                        - Belgium (BE)
                        - Bulgaria (BG)
                        - Denmark (DK)
                        - Germany (DE)
                        - Luxembourg (LU)
                        - Netherlands (NL)
                        - Poland (PL)
                        - Slovakia (SK)
                        - Switzerland (CH)
                  nullable: false
                postalCode:
                  maxLength: 50
                  type: string
                  description: |
                    Postal code of this address.

                    Please note:
                    * This is an optional field in Bulgaria (BG) only.
                    * For the following countries, the maximum length is 8 characters:
                      - Austria (AT)
                      - Belgium (BE)
                      - Bulgaria (BG)
                      - Denmark (DK)
                      - Germany (DE)
                      - Luxembourg (LU)
                      - Netherlands (NL)
                      - Poland (PL)
                      - Slovakia (SK)
                      - Switzerland (CH)
                  minLength: 1
                  nullable: true
                administrativeArea:
                  maxLength: 50
                  type: string
                  description: |
                    Geographical region of this address. 

                    Also known as County or State.

                    Required in Australia (AU) only for an order to be fulfilled.
                  minLength: 1
                  nullable: true
                additionalInformation:
                  type: object
                  description: |
                    Additional information about the address.

                    This is only supported in the following countries:
                      - Austria (AT)
                      - Belgium (BE)
                      - Bulgaria (BG)
                      - Denmark (DK)
                      - Germany (DE)
                      - Luxembourg (LU)
                      - Netherlands (NL)
                      - Poland (PL)
                      - Slovakia (SK)
                      - Switzerland (CH)
                  nullable: true
                  additionalProperties: false
                  properties:
                    entrance:
                      type: string
                      description: Entrance/access point to the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    floor:
                      type: string
                      description: Floor/level of the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    door:
                      type: string
                      description: Door to the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    companyName:
                      type: string
                      description: Name of the company at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    intercom:
                      type: string
                      description: Number to enter into the intercom at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    apartmentName:
                      type: string
                      description: Name of the apartment at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    flatNumber:
                      type: string
                      description: Number of the flat at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    accessCode:
                      type: string
                      description: Access code for the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
              type: object
          type: object
        table:
          required:
            - identifier
          type: object
          description: |
            The table where the customer wants to receive the order.

            This only applies to purchases with a `dinein` service type.
          properties:
            identifier:
              type: string
              description: The identifier of the table where the customer wants to receive the order.
              nullable: false
              minLength: 1
              maxLength: 12
          nullable: true
    CheckoutCheckoutGetRestaurant:
