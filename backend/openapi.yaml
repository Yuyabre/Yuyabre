          nullable: false
          description: Type of the campaign
          type: string
          enum:
            - customPromotion
            - matchingByOfferDetails
            - fastMovingGoods
        campaignStatus:
          nullable: false
          description: Indicates status of campaign
          $ref: '#/components/schemas/MarketingCampaignStatus'
        description:
          nullable: true
          description: Description of the campaign
          type: string
        priority:
          nullable: false
          description: Priority of the campaign. Default is 0.
          format: integer
          minimum: 0
          type: number
        premium:
          nullable: false
          default: false
