        externalFoodHygieneId: '12345'
        signUpReference: '123456789'
        isResponsibleForOwnDelivery: true
        isTestRestaurant: false
    RestaurantsRestaurantCreationData:
      type: object
      description: The data to start creating a restaurant on the platform.
      required:
        - name
        - location
        - phoneNumber
        - owner
        - commissionRate
      properties:
        name:
          type: string
          description: The restaurant name.
          minLength: 2
          maxLength: 50
          nullable: false
        location:
          type: object
          description: The restaurant location.
          nullable: false
          required:
            - properties
          properties:
            type:
              type: string
              description: The GeoJSON type representing the restaurant location.
              default: Feature
              nullable: false
            properties:
              type: object
              description: The restaurant location properties.
              nullable: false
              required:
                - validated
                - address
              properties:
                address:
                  items:
                    type: string
                  description: The restaurant address. Should be the restaurants address lines, followed by the city and then the postal code.
                  minItems: 3
                  maxItems: 5
                  type: array
                  nullable: false
                validated:
                  type: boolean
                  description: Provides information on whether the address given has been manually validated.
                  nullable: false
            coordinates:
              $ref: '#/components/schemas/SharedGeoposition'
              nullable: true
        phoneNumber:
          type: string
          description: The restaurant's public phone number in E.164 format.
          pattern: ^\+[1-9]\d{1,14}$
          nullable: false
        cuisines:
          type: array
          description: The restaurant's primary and secondary cuisine.
          minItems: 1
          maxItems: 2
          items:
            type: string
          nullable: false
        owner:
          type: object
          description: The restaurant owner.
          nullable: false
          required:
            - name
            - phoneNumber
          properties:
            name:
              type: string
              description: The full name of the restaurant owner.
              minLength: 2
              maxLength: 50
              nullable: false
            phoneNumber:
              type: string
              description: The phone/mobile number of the restaurant owner in E.164 format.
              pattern: ^\+[1-9]\d{1,14}$
              nullable: false
        email:
          type: string
          description: The restaurant's private email address for business correspondence between us and the restaurant.
          format: email
          nullable: true
        companyNumber:
          type: string
          description: The company number for the restaurant. In some markets this is also known as the VAT number.
          maxLength: 50
          nullable: true
        signUpFee:
          type: object
          description: The sign up fee paid by the the restaurant to get on the platform.
          nullable: true
          properties:
            value:
              type: integer
              description: The sign up fee in the lowest unit of the relevant local currency.
              minimum: 0
              nullable: false
            currency:
              type: string
              description: The ISO 4217 code for the currency provided.
              pattern: ^[A-Z]{3}$
              nullable: false
          required:
            - value
            - currency
        bankDetails:
          $ref: '#/components/schemas/RestaurantsRestaurantBankDetails'
        commissionRate:
          type: number
          description: The commission rate to charge for each order from this restaurant.
          format: double
          minimum: 0
          maximum: 1
          nullable: false
        externalFoodHygieneId:
          type: string
          description: The external food hygiene ID, if the market has such an organisation.
          nullable: true
        isResponsibleForOwnDelivery:
          type: boolean
          description: Indicates whether the restaurant will be responsible for handling the delivery of an order.
          default: false
          nullable: false
        allergenUrl:
          type: string
          description: URL that provides the allergen information for the restaurant
          nullable: true
        allergenPhoneNumber:
          type: string
          description: The phone number responsible for handling allergen queries
          pattern: ^\+[1-9]\d{1,14}$
          nullable: true
        isHalal:
          type: boolean
          description: Indicates whether or not the restaurant is halal
          default: false
          nullable: false
        cashPaymentOnly:
          type: boolean
          description: Does the restaurant accept only cash payment? It can only be true on Cash Payment Only / Card Payment Only
          default: false
          nullable: false
        cardPaymentOnly:
          type: boolean
          description: Does the restaurant accept only card payments? It can only be true on Cash Payment Only / Card Payment Only
