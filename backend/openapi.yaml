            value:
              description: Smallest unit of local currency
              format: int32
              type: integer
          type: object
        deliveryCharge:
          description: base delivery charge for a given zone
          properties:
            currency:
              description: Currency code in ISO 4217 format
              type: string
            value:
              description: Smallest unit of local currency
              format: int32
              type: integer
          type: object
