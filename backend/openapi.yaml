        - googleDistance
        - containsAlcoholicItems
      type: object
      properties:
        id:
          description: Job ID
          type: string
        partnerOrderReference:
          description: Reference ID of the order.
          type: string
          example: DARUA1
          nullable: true
        price:
          format: int32
          description: Price of the order associated to the job. Format is in the minor unit of the currency. For example, for EUR a value of 100 means 1EUR.
          type: integer
          example: 1520
        paymentMethod:
          description: Method of payment.
          type: string
          anyOf:
            - $ref: '#/components/schemas/CouriershiftflowservicePaymentMethod'
            - enum:
                - null
          nullable: true
        orderFlow:
          description: 'Defines the order flow, specifying the sequence of notifications: whether the courier is notified before the restaurant, the restaurant before the courier, or both simultaneously.'
          type: string
          allOf:
            - $ref: '#/components/schemas/CouriershiftflowserviceOrderFlow'
          deprecated: true
        orderStatus:
          description: Status of the order
          type: string
          allOf:
            - $ref: '#/components/schemas/CouriershiftflowserviceOrderStatus'
        googleDistance:
          format: int32
          description: Distance in meters.
          type: integer
          example: 1100
        containsAlcoholicItems:
          description: True if the job contains alcoholic items, otherwise false.
          type: boolean
        minimumAgeRequired:
          format: int32
          description: If this field is non-null, then it is the age of the customer required for receiving the order
          type: integer
          nullable: true
        hashedDateOfBirth:
          description: The SHA-256 hash (in HEX format) of the date of birth, formatted in ISO 8601 (YYYY-MM-DD). If the date of birth is unavailable, this field will be null
          type: string
          example: 253cc68f602792c897da18d783813611200910b3d35b44991254a5a39e36b233
          nullable: true
    CouriershiftflowserviceJobRouteStepDto:
      required:
        - eventType
        - jobTrackingId
        - estimatedTime
        - locationInfo
      type: object
      properties:
        eventType:
          description: The nature of the route step, e.g. pick up or delivery
          type: string
          allOf:
            - $ref: '#/components/schemas/CouriershiftflowserviceEventType'
        jobTrackingId:
          description: Tracking id of the job
          type: string
          example: J1SVM6YE31RR6S1234
        estimatedTime:
          format: date
          description: This is the estimated time of pickup or delivery depending on the `eventType`. It is the estimation of when the courier should/actually will be there. Format is ISO 8601.
          type: string
          example: '2021-04-18T20:06:09.000+00:00'
        scheduledTime:
          format: date
          description: Indicates the scheduled time for pickup or delivery, determined by the `eventType`. This field is applicable for pre-orders, where a customer places an order in advance (e.g., ordering in the morning for a delivery at noon). Format is ISO 8601.
          type: string
          example: '2021-04-18T20:06:09.000+00:00'
          nullable: true
        locationInfo:
          description: Contains information about the location of the route step.
          type: object
          allOf:
            - $ref: '#/components/schemas/CouriershiftflowserviceLocationInfoDto'
