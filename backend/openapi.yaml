        paging:
          $ref: '#/components/schemas/PagingAfterCursor'
        data:
          nullable: false
          description: Array of campaigns
          type: array
          items:
            $ref: '#/components/schemas/MarketingCampaign'
      example:
        paging:
          cursors:
            after: NDMyNzQyODI3OTQw
