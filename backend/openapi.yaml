      type: object
    CheckoutCheckoutMembershipAvailabilityReasons:
      type: object
      description: Indicates reasons for whether a membership is available for purchase on the Checkout.
      required:
        - type
        - displayText
      properties:
        type:
          type: string
          nullable: false
          description: Indicates the type of the restriction. Currently, possible values are `serviceType`, `customer`, `partner` or `orderValue` More values may be added in future.
        displayText:
          type: string
          nullable: true
          description: Describes the restriction.
        orderValue:
          type: object
          nullable: true
          description: Defines the order value criteria for the restriction.
          required:
            - minimum
          properties:
            minimum:
              type: integer
              nullable: false
              format: int32
              description: Defines the minimum order values necessary to purchase the membership in minor currency units.
    CheckoutCheckoutNotesV2:
      type: object
      description: Instructions about the order that the customer wants to submit.
      nullable: true
      properties:
        order:
          required:
            - note
          type: object
          description: Instructions about the order that the customer wants to submit.
          nullable: true
          properties:
            note:
              maxLength: 200
              type: string
              description: The contents of the note.
              minLength: 0
              nullable: false
        kitchen:
          required:
            - note
          type: object
          description: Instructions for the kitchen staff about the order that the customer wants to submit.
          nullable: true
          properties:
            note:
              maxLength: 200
              type: string
              description: The contents of the note.
              minLength: 0
              nullable: false
        courier:
          required:
            - note
          type: object
          description: Instructions for the courier about the order that the customer wants to submit.
          nullable: true
          properties:
            note:
              maxLength: 200
              type: string
              description: The contents of the note.
              minLength: 0
              nullable: false
    CheckoutCheckoutPaymentCheckoutUpdatePayment:
      type: object
      description: Instructions about the order that the customer wants to submit.
      nullable: true
      properties:
        methods:
          type: array
          minItems: 0
          maxItems: 4
          description: Any selected payment methods.
          items:
            description: Detail of payment by payment method.
            type: object
            nullable: false
            properties:
              type:
                description: |
                  The type of the payment method.

                  This corresponds to the `availablePaymentTypes`->`paymentType` in the OK response of the [Payment Options](#operation/paymentTenantPartnersPartnerIdOptionsGet) endpoint.
                type: string
                minLength: 1
                maxLength: 100
                nullable: false
              additionalData:
                description: Additional data that is required for a particular payment method.
                oneOf:
                  - $ref: '#/components/schemas/PaymentsTypesGeneric'
                  - $ref: '#/components/schemas/PaymentsTypesVoucher'
                  - $ref: '#/components/schemas/PaymentsTypesVouchers'
                  - $ref: '#/components/schemas/PaymentsTypesJetPay'
                  - $ref: '#/components/schemas/PaymentsTypesCash'
                  - $ref: '#/components/schemas/PaymentsTypesJetCredit'
            required:
              - type
            additionalProperties: false
    CheckoutCheckoutPaymentOptionsBasePaymentTypeProperties:
      type: object
      required:
        - paymentType
        - displayName
      properties:
        paymentType:
          description: |
            Identifier of the payment type. This should be sent to the API upon payment. Clients MUST assume that these values could be added or removed at any time and not to build any behaviour based
            on these values. The exception to this rule is where `behaviour` is set to `native` or `nativeOrExternal`. In these cases, the client may check this value and provide special 
            behaviour.

            Values for `native` payment types are: 
            - paypal_braintree
            - applepay
            - googlepay
          type: string
        displayName:
          type: string
          description: Display text that the user interface should use to identify the payment type. This will be localised in the requested language if necessary.
        iconUrl:
          type: string
          nullable: true
          description: URL for payment option icon. If not provided (e.g. for payment types under construction), clients should fall back to a generic placeholder icon.
          format: uri
        behaviour:
          type: string
          enum:
            - native
            - external
            - nativeOrExternal
          description: |
            Indicates whether the client may provide this option natively on the device (e.g. for wallet payments). 

            `native` indicates that the client must provide an implementation. The client MUST ignore payment types that it doesn't support.
            `external` indicates that behaviour is handled by the API. The client MUST not provide its own implementation.
            `nativeOrExternal` indicates that behaviour is handled by the API but could be enhanced by a client's own implementation.
        additionalData:
          type: object
          nullable: true
          description: Additional data related to this payment type
          properties:
            clientKey:
              type: string
              description: Used for PayPal Braintree payments
            merchantAccountId:
              type: string
              description: Used for PayPal Braintree payments
            sdkConfiguration:
              type: object
              nullable: true
              description: Used for ApplePay and GooglePay on Web
              oneOf:
                - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsSdkConfigurationApplepay'
                - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsSdkConfigurationGooglepay'
        excludedPaymentCapabilities:
          type: array
          nullable: true
          description: Determines if this payment type must be excluded from paying for certain items. If these items are present, this payment type should be ignored.
          items:
            type: string
            enum:
              - driverTip
              - membership
              - stampcard
              - membershipSubscription
    CheckoutCheckoutPaymentOptionsPaymentType:
      allOf:
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsBasePaymentTypeProperties'
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPaymentTypeProperties'
    CheckoutCheckoutPaymentOptionsPaymentTypeProperties:
      type: object
      required:
        - paymentType
        - displayName
        - status
        - isOnlinePayment
        - behaviour
      properties:
        status:
          type: string
          enum:
            - available
            - unavailable
          description: Indicates if the method is temporarily unavailable. If unavailable, clients should continue to show the payment type but disable selection. This should be accompanied by a message in `messages`.
        isOnlinePayment:
          type: boolean
          description: Indicates if the method is online or offline (e.g. a cash payment)
        hasOneClickPaymentDetails:
          description: |
            Indicates whether customer already has saved payment data. User interfaces should show a button to delete the data.

            Note: This property is being deprecated an will be replaced with an entry in `savedPaymentTypes` in future.
          type: boolean
        supportsOneClickPayment:
          description: Indicates whether payment option supports saving payment data for future payments. User interfaces should present a checkbox to save payment details, and this can default to checked.
          type: boolean
        balance:
          type: integer
          nullable: true
          description: If this payment type has a limited balance, the overall balance, regardless of what’s in the cart (in minor currency units) (e.g. 750 is equal to 7.5 EUR)
        availableBalance:
          type: integer
          nullable: true
          description: If this payment type has a limited balance, the balance that is available for the supplied basket (in minor currency units) (e.g. 750 is equal to 7.5 EUR)
        messages:
          type: array
          description: An array of messages for the customer associated with this payment type, localized according to the language specified in the request header
          items:
            type: object
            nullable: true
            properties:
              displayMode:
                type: string
                enum:
                  - info
                  - warning
                description: Indicates how to display the message
              displayText:
                type: string
                description: Display text that should be shown to the customer
            required:
              - displayMode
              - displayText
        currency:
          type: string
          description: ISO 4217 currency code of balance
        choice:
          type: object
          nullable: true
          description: When the payment type requires a sub-selection, a list of items that a customer must choose from
          properties:
            type:
              type: string
              description: The type of choices being presented, e.g. 'bank'.
            displayName:
              type: string
              description: Display text that the user interface may use to identify the set of choices, e.g. "Choose your bank". Clients may use their own text, but should fall back to this if unavailable.
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    description: Identifier for the choice. This must be supplied as `choiceId` when making a payment.
                  displayName:
                    type: string
                    description: Display text that the user interface should use to identify the choice.
                  iconUrl:
                    type: string
                    nullable: true
                    description: URL for an icon associated with the choice. If not provided, the user interface may fall back to a generic placeholder icon.
                    format: uri
                required:
                  - id
                  - displayName
        isNew:
          type: boolean
          description: Indicates that the payment method has been recently introduced and can be highlighted as such.
        balances:
          type: array
          nullable: true
          description: A list of all balances available to the user. Each item is an object that provides detailed information about a specific balance, such as its type and value.
          items:
            type: object
            required:
              - displayName
              - choiceId
              - type
              - balance
              - availableBalance
              - expireAt
              - iconUrl
              - status
            properties:
              displayName:
                type: string
                nullable: false
                description: Display text that the user interface should use to identify the prepayment type.
              choiceId:
                type: string
                nullable: false
                description: A unique identifier for this specific balance instance. It is used to distinguish this particular balance from all other balances a user may hold.
              type:
                type: string
                nullable: false
                description: Defines the type of the balance.
              balance:
                type: integer
                nullable: false
                description: The total value of this balance.
              availableBalance:
                type: integer
                nullable: false
                description: The portion of the total balance that is currently available for use.
              expireAt:
                type: string
                nullable: false
                description: The specific date and time at which the balance is no longer valid.
                format: date-time
              iconUrl:
                type: string
                nullable: false
                description: A URL that points to an image file for the balance icon.
                format: uri
              status:
                type: string
                nullable: false
                enum:
                  - available
                  - unavailable
                description: Status of the balance, available should be see it and selected, unavailable means users will be able to see but can't select because it is disabled in this status.
              excludedPaymentCapabilities:
                type: array
                nullable: true
                description: Determines if this balance must be excluded from paying for certain items. If these items are present, this balance should be ignored.
                items:
                  type: string
                  enum:
                    - driverTip
                    - membership
                    - membershipSubscription
              messages:
                type: array
                nullable: true
                description: An array of messages for the customer associated with this balance.
                items:
                  type: object
                  nullable: false
                  properties:
                    displayMode:
                      type: string
                      enum:
                        - info
                        - warning
                      description: Indicates how to display the message.
                    displayText:
                      type: string
                      description: Display text that should be shown to the customer.
    CheckoutCheckoutPaymentOptionsPreferredAvailablePaymentType:
      allOf:
        - $ref: '#/components/schemas/Paymentoptionsv2PreferredType'
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsBasePaymentTypeProperties'
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPaymentType'
      type: object
    CheckoutCheckoutPaymentOptionsPreferredPaymentType:
      type: object
      properties:
        preferredType:
          enum:
            - saved
            - new
      discriminator:
        propertyName: preferredType
        mapping:
          new: '#/components/schemas/CheckoutCheckoutPaymentOptionsPreferredAvailablePaymentType'
          saved: '#/components/schemas/CheckoutCheckoutPaymentOptionsPreferredSavedPaymentType'
        oneOf:
          - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPreferredAvailablePaymentType'
          - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPreferredSavedPaymentType'
      required:
        - preferredType
    CheckoutCheckoutPaymentOptionsPreferredSavedPaymentType:
      allOf:
        - $ref: '#/components/schemas/Paymentoptionsv2PreferredType'
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsBasePaymentTypeProperties'
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsSavedPaymentType'
      type: object
    CheckoutCheckoutPaymentOptionsSavedPaymentType:
      allOf:
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsBasePaymentTypeProperties'
        - $ref: '#/components/schemas/Paymentoptionsv2SavedPaymentTypeProperties'
    CheckoutCheckoutPaymentOptionsSdkConfigurationAdyenConfig:
      type: object
      description: Configuration specific to the `Adyen` components.
      properties:
        clientKey:
          type: string
          description: The public client key required for initializing the `Adyen` SDK components on the client-side.
        environment:
          type: string
          description: The `Adyen` environment to connect to (e.g., 'test', 'live') for the `Adyen` components.
    CheckoutCheckoutPaymentOptionsSdkConfigurationApplepay:
      type: object
      nullable: true
      description: ApplePay SDK settings
      properties:
        adyenConfig:
          $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsSdkConfigurationAdyenConfig'
        buttonConfig:
          type: object
          description: Button Config
          properties:
            supportedNetworks:
              type: array
              description: A list of supported card networks (e.g., `visa`, `mastercard`,`maestro`)
              items:
                type: string
                description: Supported network  (e.g., `visa`, `mastercard`,`maestro`)
    CheckoutCheckoutPaymentOptionsSdkConfigurationGooglepay:
      type: object
      nullable: true
      description: Root configuration object for initializing and customizing various components available within the SDK.
      properties:
        adyenConfig:
          $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsSdkConfigurationAdyenConfig'
        buttonConfig:
          type: object
          description: Configuration specifically for an `Adyen` payment button component.
          properties:
            configuration:
              type: object
              description: Core configuration details for the `Adyen` payment button's interaction.
              properties:
                merchantId:
                  type: string
                  description: The unique identifier for the merchant using the `Adyen` button component.
                gatewayMerchantId:
                  type: string
                  description: The merchant identifier specific to the `Adyen` gateway for the button component.
            allowedAuthMethods:
              type: array
              description: A list of allowed authentication methods for the `Adyen` button component (e.g., `PAN_ONLY`, `CRYPTOGRAM_3DS`).
              items:
                type: string
                description: Allowed Auth Method (e.g., `PAN_ONLY`, `CRYPTOGRAM_3DS`)
            allowedCardNetworks:
              type: array
              description: A list of allowed card networks (e.g., `VISA`, `MASTERCARD`, `AMEX`) that can be used with the `Adyen` button component
              items:
                type: string
                description: Allowed Card Network (e.g., `VISA`, `MASTERCARD`, `AMEX`)
    CheckoutCheckoutPaymentPayment:
      type: object
      description: Instructions about the order that the customer wants to submit.
      required:
        - options
        - methods
        - unallocatedBalance
        - total
      nullable: false
      properties:
        options:
          description: The payment options that are available for the customer to use when paying.
          type: object
          nullable: false
          properties:
            totalAvailableJetBalance:
              type: integer
              nullable: false
              description: The sum of all available credit balances.
            availablePaymentTypes:
              type: array
              description: List of available payment types. This list should be presented in the order provided.
              items:
                $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPaymentType'
            savedPaymentTypes:
              type: array
              description: List of payment types that the customer has saved for lower friction repeat payments. This list should be presented in the order provided.
              items:
                $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsSavedPaymentType'
            preferredPaymentTypes:
              type: array
              description: |
                List of payment types that are recommended to the customer for quick selection. The first item in the array should be pre-selected as the default.
                This array can contain a mix of types from the `availablePaymentTypes` and `savedPaymentTypes` arrays, depending on the value of `preferredType`. 
              items:
                $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPreferredPaymentType'
        methods:
          description: |
            Collection of payment methods the customer will use to pay for checkout.

            Note that this may differ from submitted methods as any methods that are not required, are invalid or are unavailable will have been removed.
          type: array
          minItems: 0
          maxItems: 4
          nullable: false
          items:
            $ref: '#/components/schemas/PaymentsPaymentType'
        total:
          description: |
            Total price the customer needs to pay as minor currency

            The total price will include any payment fees applied to payment methods.
          type: number
          format: integer
          minimum: 0
          nullable: false
    CheckoutCheckoutRequest:
      required:
        - PaymentOptionType
      description: Details needed to make a payment.
      properties:
        Action:
          description: Action data needed to make payment for payment method in use. This data is dependant on the Payment Service Provider and payment method. When used for checkout where fraud-check is required, device-id, payer email and payer identifier should be provided.
          $ref: '#/components/schemas/CheckoutCheckoutAction'
          type: object
        PaymentOptionType:
          description: Identifier used to determine method of payment.
          enum:
            - AccountCredit
            - AndroidPay
            - ApplePay
            - Card
            - Cash
            - GooglePay
            - PayPal
            - SavedCard
            - VCO
          type: string
        VoucherCode:
          description: Voucher code to apply to order.
          type: string
        PaymentOptionId:
          description: Token to use for saved card payment. Tokens retrieved from order payment options or basket payment options calls on Public API.
          type: string
      type: object
    CheckoutCheckoutResponse:
      description: The result of a payment attempt.
      properties:
        Timestamp:
          description: The UTC timestamp of the date and time that the response was generated at.
          format: date-time
          x-api-version-from: 2019-04
          type: string
        Tenant:
          description: The tenant associated with the consumer.
          type: string
        OrderId:
          description: The Id of the order.
          type: string
        Result:
          description: The result of payment attempt. 2xxxx = successful payment. 4xxxxx = validation error, 5xxxx = server error
          enum:
            - '20000'
            - '40000'
            - '50000'
          type: string
      type: object
    CheckoutCheckoutResponseV2:
      required:
        - restaurant
        - purchase
        - serviceType
        - customer
        - fulfilment
        - isFulfillable
        - issues
      description: Properties apply to all supported country codes, except where specified.
      properties:
        serviceType:
          nullable: false
          description: How the order will be dispatched.
          enum:
            - delivery
            - collection
            - dinein
          type: string
        restaurant:
          nullable: false
          $ref: '#/components/schemas/CheckoutCheckoutGetRestaurant'
        purchase:
          nullable: false
          $ref: '#/components/schemas/CheckoutPurchasePurchase'
        customer:
          nullable: false
          $ref: '#/components/schemas/CheckoutCheckoutGetCustomer'
        fulfilment:
          nullable: false
          $ref: '#/components/schemas/CheckoutCheckoutGetFulfilment'
        notes:
          nullable: true
          $ref: '#/components/schemas/CheckoutCheckoutNotesV2'
        voucher:
          nullable: true
          $ref: '#/components/schemas/CheckoutCheckoutVoucherResponse'
        deliveryOptions:
          nullable: true
          $ref: '#/components/schemas/CheckoutCheckoutDeliveryOptionsResponse'
        deliveryModelOptions:
          nullable: true
          $ref: '#/components/schemas/CheckoutDeliveryModelOptions'
        additionalProducts:
          nullable: true
          $ref: '#/components/schemas/CheckoutCheckoutAdditionalProductsResponse'
        tipping:
          nullable: true
          $ref: '#/components/schemas/CheckoutCheckoutGetTipping'
        currency:
          nullable: true
          description: The currency code in ISO-4217 format e.g. GBP.
          type: string
        payment:
          nullable: true
          $ref: '#/components/schemas/CheckoutCheckoutPaymentPayment'
        isFulfillable:
          nullable: false
          description: Whether the proposed order can be placed.
          type: boolean
        issues:
          type: array
          minItems: 0
          maxItems: 50
          items:
            nullable: false
            description: Represents a single issue associated with the proposed order.
            $ref: '#/components/schemas/CheckoutCheckoutIssueV2'
          description: One or more issues associated the proposed order, that may impact whether it can be placed.
          nullable: false
        topUp:
          $ref: '#/components/schemas/CheckoutCheckoutTopUp'
      type: object
    CheckoutCheckoutTopUp:
      nullable: true
      description: Expiration details of the top-up voucher.
      type: object
      properties:
        expiresAt:
          nullable: false
          description: The expiration date and time for the top-up voucher in ISO 8601 format.
          type: string
          format: date-time
          example: '2026-06-06T12:00:00Z'
    CheckoutCheckoutUpdateCustomer:
      type: object
      nullable: true
      description: Details of the customer making the purchase.
      properties:
        lastName:
          maxLength: 100
          type: string
          description: |
            Customer's last name (Optional). Also known as Family Name.

            Please note, for the following countries, the maximum length is 30 characters:
              - Austria (AT)
              - Belgium (BE)
              - Bulgaria (BG)
              - Denmark (DK)
              - Germany (DE)
              - Luxembourg (LU)
              - Netherlands (NL)
              - Poland (PL)
              - Slovakia (SK)
              - Switzerland (CH)
          minLength: 0
          nullable: true
        phoneNumber:
          maxLength: 16
          type: string
          description: |
            Customer's phone number.

            A phone number can be represented in:
              - E.164 format e.g. +447777111111 or;
              - Local format of submitted tenant e.g. 07777111111.

            E.164 formatted phone numbers are preferred.
          minLength: 3
          nullable: true
        dateOfBirth:
          nullable: true
          description: |
            Customer's date of birth represented in ISO 8601 format. If a time is submitted, it will be ignored.

            Required in Australia (AU) and New Zealand (NZ) only for fulfilling an order that contain items being purchased that require age verification.
          type: string
        firstName:
          maxLength: 100
          type: string
          description: |
            Customer's first name. Also known as Given Name(s).

            Please note, for the following countries, the maximum length is 30 characters:
              - Austria (AT)
              - Belgium (BE)
              - Bulgaria (BG)
              - Denmark (DK)
              - Germany (DE)
              - Luxembourg (LU)
              - Netherlands (NL)
              - Poland (PL)
              - Slovakia (SK)
              - Switzerland (CH)
          minLength: 1
          nullable: true
        taxId:
          type: string
          description: Customer's tax ID reference.
          minLength: 0
          maxLength: 50
          nullable: true
    CheckoutCheckoutUpdateFulfilment:
      type: object
      nullable: true
      description: How and when the items will be received by the customer.
      properties:
        time:
          nullable: true
          description: Time the customer wants to receive the order i.e. when order is fulfilled.
          properties:
            scheduled:
              required:
                - from
                - to
              type: object
              description: |
                Scheduled time the customer wants the order to be fulfilled.

                The scheduled time will be ignored if ASAP is selected.
              properties:
                from:
                  nullable: false
                  description: Earliest time the customer wants the order to be fulfilled represented in ISO 8601 UTC (Zulu Time).
                  type: string
                to:
                  nullable: false
                  description: |
                    Latest time the customer wants the order to be fulfilled represented in ISO 8601 UTC (Zulu Time). 

                    This time must be greater than or equal to the from time.
                  type: string
              nullable: true
            asap:
              nullable: false
              description: |
                If the order should be fulfilled as soon as possible (ASAP).

                ASAP may not be fulfillable.

                Default is false.
              type: boolean
          type: object
        location:
          nullable: true
          description: |
            The destination the customer wants to receive the order.

            This only applies to purchases with a delivery service type.
          properties:
            geolocation:
              required:
                - latitude
                - longitude
              type: object
              description: The coordinates of a geographical location where the customer wants to receive the order.
              properties:
                longitude:
                  nullable: false
                  description: The longitude of the geographical location.
                  format: decimal
                  type: number
                latitude:
                  nullable: false
                  description: The latitude of the geographical location.
                  format: decimal
                  type: number
              nullable: true
            address:
              nullable: true
              description: The postal address where the customer wants to receive the order.
              properties:
                locality:
                  maxLength: 50
                  type: string
                  description: |
                    The locality of this address.

                    Also known as Town or City.

                    Please note, for the following countries, the maximum length is 64 characters:
                      - Austria (AT)
                      - Belgium (BE)
                      - Bulgaria (BG)
                      - Denmark (DK)
                      - Germany (DE)
                      - Luxembourg (LU)
                      - Netherlands (NL)
                      - Poland (PL)
                      - Slovakia (SK)
                      - Switzerland (CH)
                  minLength: 1
                  nullable: true
                lines:
                  maxItems: 4
                  type: array
                  minItems: 1
                  items:
                    maxLength: 100
                    type: string
                    description: Represents part of a street address.
                    minLength: 1
                    nullable: false
                  description: |
                    One or more lines representing the street address. 

                    Please note:
                      * For Australia (AU) and New Zealand (NZ), the second item will represent the Level/Unit Number (optional).
                      * For the following countries, the maximum number of items is 1 and the maximum length of an item is 64 characters:
                        - Austria (AT)
                        - Belgium (BE)
                        - Bulgaria (BG)
                        - Denmark (DK)
                        - Germany (DE)
                        - Luxembourg (LU)
                        - Netherlands (NL)
                        - Poland (PL)
                        - Slovakia (SK)
                        - Switzerland (CH)
                  nullable: true
                postalCode:
                  maxLength: 50
                  type: string
                  description: |
                    Postal code of this address.

                    Please note:
                    * This is an optional field in Bulgaria (BG) only.
                    * For the following countries, the maximum length is 8 characters:
                      - Austria (AT)
                      - Belgium (BE)
                      - Bulgaria (BG)
                      - Denmark (DK)
                      - Germany (DE)
                      - Luxembourg (LU)
                      - Netherlands (NL)
                      - Poland (PL)
                      - Slovakia (SK)
                      - Switzerland (CH)
                  minLength: 1
                  nullable: true
                administrativeArea:
                  maxLength: 50
                  type: string
                  description: |
                    Geographical region of this address. 

                    Also known as County or State.

                    Required in Australia (AU) only for an order to be fulfilled.
                  minLength: 1
                  nullable: true
                additionalInformation:
                  type: object
                  description: |
                    Additional information about the address.

                    This is only supported in the following countries:
                      - Austria (AT)
                      - Belgium (BE)
                      - Bulgaria (BG)
                      - Denmark (DK)
                      - Germany (DE)
                      - Luxembourg (LU)
                      - Netherlands (NL)
                      - Poland (PL)
                      - Slovakia (SK)
                      - Switzerland (CH)
                  nullable: true
                  additionalProperties: false
                  properties:
                    entrance:
                      type: string
                      description: Entrance/access point to the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    floor:
                      type: string
                      description: Floor/level of the building.
                      minLength: 1
                      maxLength: 100
                      nullable: true
                    door:
                      type: string
                      description: Door to the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    companyName:
                      type: string
                      description: Name of the company at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    intercom:
                      type: string
                      description: Number to enter into the intercom at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    apartmentName:
                      type: string
                      description: Name of the apartment at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    flatNumber:
                      type: string
                      description: Number of the flat at the address.
                      minLength: 1
                      maxLength: 64
                      nullable: true
                    accessCode:
                      type: string
                      description: Access code for the building.
                      minLength: 1
                      maxLength: 64
                      nullable: true
              type: object
          type: object
        table:
          required:
            - identifier
          type: object
          description: |
            The table where the customer wants to receive the order.

            This only applies to purchases with a `dinein` service type.
          properties:
            identifier:
              type: string
              description: The identifier of the table where the customer wants to receive the order.
              nullable: false
              minLength: 1
              maxLength: 12
          nullable: true
    CheckoutCheckoutUpdateMembership:
      type: object
      description: Information about the membership to purchase.
      additionalProperties: false
      properties:
        id:
          type: string
          description: The Id of the membership.
          nullable: false
          minLength: 1
          maxLength: 50
