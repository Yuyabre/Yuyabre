              maxLength: 255
              nullable: true
            sortCode:
              type: string
              description: The sort code.
              minLength: 6
              maxLength: 6
            accountNumber:
              type: string
              description: The bank account number.
              minLength: 10
              maxLength: 12
        - type: object
          title: IBAN
          description: Information on the bank account of which we use to pay the restaurant, provided as an IBAN.
          required:
            - iban
          properties:
            bankName:
              type: string
              description: The name of the bank.
              minLength: 2
              maxLength: 100
              nullable: true
            accountHolderName:
              type: string
              description: The name of the bank account holder.
              maxLength: 255
              nullable: true
            iban:
              type: string
