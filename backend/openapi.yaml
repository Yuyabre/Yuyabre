    Paymentoptionsv2PaymentType:
      allOf:
        - $ref: '#/components/schemas/Paymentoptionsv2BasePaymentTypeProperties'
        - $ref: '#/components/schemas/Paymentoptionsv2PaymentTypeProperties'
    Paymentoptionsv2PaymentTypeProperties:
      allOf:
        - $ref: '#/components/schemas/CheckoutCheckoutPaymentOptionsPaymentTypeProperties'
      properties:
        isDefaultPreselected:
          type: boolean
          description: Indicates that the payment method should be the default preselected item for new customers. Clients may remember the last used selection and use that for repeat customers. Only one will have the value `true`.
          deprecated: true
    Paymentoptionsv2PreferredAvailablePaymentType:
      allOf:
        - $ref: '#/components/schemas/Paymentoptionsv2PreferredType'
        - $ref: '#/components/schemas/Paymentoptionsv2BasePaymentTypeProperties'
        - $ref: '#/components/schemas/Paymentoptionsv2PaymentType'
      type: object
    Paymentoptionsv2PreferredPaymentMethod:
      type: object
      required:
        - preferred
      properties:
        preferred:
          type: boolean
          description: Indicates whether a payment method should be set as preferred or not.
    Paymentoptionsv2PreferredPaymentType:
      type: object
      properties:
        preferredType:
          enum:
            - saved
            - new
      discriminator:
        propertyName: preferredType
        mapping:
          new: '#/components/schemas/Paymentoptionsv2PreferredAvailablePaymentType'
          saved: '#/components/schemas/Paymentoptionsv2PreferredSavedPaymentType'
        oneOf:
          - $ref: '#/components/schemas/Paymentoptionsv2PreferredAvailablePaymentType'
          - $ref: '#/components/schemas/Paymentoptionsv2PreferredSavedPaymentType'
      required:
        - preferredType
    Paymentoptionsv2PreferredSavedPaymentType:
      allOf:
        - $ref: '#/components/schemas/Paymentoptionsv2PreferredType'
        - $ref: '#/components/schemas/Paymentoptionsv2BasePaymentTypeProperties'
        - $ref: '#/components/schemas/Paymentoptionsv2SavedPaymentType'
      type: object
    Paymentoptionsv2PreferredType:
      description: The preferred type being used
      required:
        - preferredType
      properties:
        preferredType:
          description: |
            A string describing which preferred type is being used
            `new`: an "unsaved" payment type, similar to those in `availablePaymentTypes` `saved`: a saved payment type, similar to those in `savedPaymentTypes`
          type: string
          enum:
            - new
            - saved
      discriminator:
        propertyName: preferredType
    Paymentoptionsv2SavedPaymentType:
      allOf:
        - $ref: '#/components/schemas/Paymentoptionsv2BasePaymentTypeProperties'
        - $ref: '#/components/schemas/Paymentoptionsv2SavedPaymentTypeProperties'
    Paymentoptionsv2SavedPaymentTypeProperties:
      type: object
      required:
        - paymentType
        - choiceId
        - displayName
        - behaviour
      properties:
        subtitle:
          type: string
          description: Additional text to give context, for example the name of the bank account or masked account number.
        choiceId:
          type: string
          description: Id to distinguish multiple options of the same payment type. If provided, this must be included with the payment method in the payment request.
    Paymentorchestration4XxErrorSchema:
      type: object
      description: A HTTP 4xx error response
      properties:
        fault:
          type: object
          description: An object representing the nature of the failure
          required:
            - faultId
          properties:
            faultId:
              description: A value that helps identify this response back to logs, so we can easily find this specific fault
              type: string
            errors:
              type: array
              description: The list of errors
              items:
                type: object
                properties:
                  errorCode:
                    description: A code that identifies the problem type. It will be supported by human-readable documentation that identifies how to resolve the error
                    type: string
                    enum:
                      - paymentRefused
                      - paymentFailed
                      - invalidRequest
                      - unknown
                  description:
                    description: Specific details about the error that may assist you in resolving the issue
                    type: string
                    nullable: true
                  paymentMethod:
                    description: The payment method
                    type: string
                    nullable: true
                  reasons:
                    description: Reasons for the error in slug format
                    type: array
                    nullable: true
                    items:
                      type: string
                  displayText:
                    description: Customer facing display context associated with the error
                    type: string
                    nullable: true
      example:
        faultId: 25bbe062-c53d-4fbc-9d6c-3df6127b94fd
        errors:
          - errorCode: paymentRefused
            description: JetPay error received with reason code
            paymentMethod: jetpay
            reasons:
              - moneycardMonthlyLimitExceededError
            displayText: An unexpected error has occurred with your payment. Please try a different payment method.
    Paymentorchestration5XxErrorSchema:
      type: object
      description: A HTTP 5xx error response
      properties:
        fault:
          type: object
          description: An object representing the nature of the failure
          required:
            - faultId
          properties:
            faultId:
              description: A value that helps identify this response back to logs, so we can easily find this specific fault
              type: string
            errors:
              type: array
              description: The list of errors
              items:
                type: object
                properties:
                  errorCode:
                    description: A code that identifies the problem type. It will be supported by human-readable documentation that identifies how to resolve the error
                    type: string
                  description:
                    description: Specific details about the error that may assist you in resolving the issue
                    type: string
                    nullable: true
                  displayText:
                    description: Customer facing display context associated with the error
                    type: string
                    nullable: true
      example:
        faultId: 25bbe062-c53d-4fbc-9d6c-3df6127b94fd
        errors:
          - errorCode: paymentFailed
            description: Requested partner doesn't support any payment method
            displayText: An unexpected error has occurred. Please try again or contact support for assistance
    PaymentorchestrationAuthorizeRequest:
      description: The details needed to authorize a native payment transaction
      type: object
      properties:
        paymentMethod:
          description: |
            An identifier used to determine method of payment
          type: string
          nullable: false
        identifier:
          description: |
            A unique payment identifier
          type: string
          minLength: 1
          nullable: false
        paymentToken:
          description: |
            An authorization payment token generated by client device
          type: string
          minimum: 1
        additionalData:
          description: |
            Additional data for Braintree PayPal
          type: object
          nullable: true
          properties:
            payerID:
              type: string
              description: ID of the Payer
            payerEmail:
              type: string
              description: Email of the Payer
            deviceData:
              type: string
              description: Device fingerprint coming from SDK
      required:
        - paymentMethod
        - identifier
        - paymentToken
      additionalProperties: false
    PaymentorchestrationAuthorizeResponse:
      description: Payment authorized
      type: object
      required:
        - orderId
      properties:
        orderId:
          type: string
          description: The Id of the order.
      example:
        orderId: ryuwbcq0vkaj0q0zfiex8w
    PaymentorchestrationOrchestrateRequest:
      description: Details of a payment
      type: object
      properties:
        serviceType:
          description: Type of fulfilment
          type: string
          enum:
            - delivery
            - collection
            - dineIn
        legacyOrderId:
          description: Takeaway order id
          type: string
          nullable: true
        orderId:
          description: Modern order id
          type: string
        orderReference:
          description: The reference used by the customer to identify their order
          type: string
        device:
          type: object
          description: Properties of the ordering device
          properties:
            platform:
              type: string
              description: Type of operating system
              enum:
                - android
                - ios
                - web
            ip:
              description: Public IP address of device
              type: string
        products:
          type: array
          description: Products of the order
          nullable: true
          items:
            $ref: '#/components/schemas/PaymentorchestrationProduct'
        currency:
          type: string
          description: Currency of basket
        deliveryDateTime:
          type: string
          description: Date and time of requested delivery
          format: date-time
        orderDate:
          type: string
          description: Date and time of order placement
          format: date-time
        returnUrl:
          type: string
          description: Return URL for redirection after payment has succeeded.
          format: uri
        paymentMethods:
          type: array
          minLength: 1
          items:
            $ref: '#/components/schemas/PaymentsPaymentType'
        partner:
          type: object
          description: Properties of restaurant/grocery partner
          required:
            - id
            - type
          properties:
            id:
              type: string
              description: Partner id
            type:
              type: string
              description: Business type of partner
              enum:
                - restaurant
                - groceries
            isTest:
              type: boolean
              description: Whether partner is test partner or not
            name:
              type: string
              description: Partner name
              nullable: true
            brand:
              type: string
              description: Partner brand
              nullable: true
            deliveryModel:
              type: string
              description: Partner delivery model
              nullable: true
              enum:
                - marketplace
                - logistics
            cuisines:
              type: array
              description: Partner cuisines
              nullable: true
              items:
                $ref: '#/components/schemas/PaymentorchestrationCuisine'
            address:
              type: object
              description: Partner's address
              nullable: true
              properties:
                city:
                  type: string
                  description: This is the city
                streetAddress:
                  type: array
                  minItems: 1
                  items:
                    type: string
                  description: Street address
                postalCode:
                  type: string
                  description: Postal code
                coordinates:
                  nullable: true
                  description: The only two elements are longitude and latitude.
                  type: array
                  maxItems: 2
                  minItems: 2
                  items:
                    type: number
                    format: double
        costs:
          type: object
          description: Breakdown of costs
          properties:
            productsTotal:
              type: number
              description: Total price of the products excluding discounts
              format: integer
            discountsTotal:
              type: number
              description: Total of discounts
              format: integer
            delivery:
              type: number
              description: Delivery cost
              format: integer
            service:
              type: number
              description: Service fee
              format: integer
            bag:
              type: number
              description: Bag fee
              format: integer
            stampCardDiscount:
              type: number
              description: Bag fee
              format: integer
            voucherDiscountableAmount:
              type: number
              description: Amount that needs to be input for voucher redemption
              format: integer
            alcoholicItemsTotal:
              type: number
              description: Total of products containing alcohol
              format: integer
            driverTipAmount:
              type: number
              description: Driver tip to be paid with the order
              format: integer
        customer:
          type: object
          description: Details of customer
          properties:
            id:
              type: string
              description: Id of customer
            phone:
              type: string
              description: Customer phone number
            registrationDateTime:
              type: string
              description: Customer's registration date and time in ISO-8601 format
              format: date-time
              nullable: true
            role:
              type: string
              description: Role of customer
              enum:
                - guest
                - registered
                - unknown
            firstName:
              description: First name
              type: string
            lastName:
              type: string
              description: Last name
              nullable: true
            language:
              type: string
              description: ISO 639-1 code of customer's requested language
            email:
              type: string
              description: Email address
              format: email
            numberOfOrders:
              type: number
              description: Number of orders placed
              nullable: true
              format: integer
            consumerStatus:
              type: string
              description: Consumer status
              nullable: true
              enum:
                - newConsumer
                - returningConsumer
            deliveryAddress:
              type: object
              description: Delivery address or `null` if collection
              nullable: true
              properties:
                city:
                  type: string
                  description: This is the city
                streetAddress:
                  type: string
                  description: Street address
                postalCode:
                  type: string
                  description: Postal code
                geolocation:
                  type: object
                  description: Physical location
                  nullable: true
                  properties:
                    latitude:
                      type: number
                      description: Latitude in degrees
                    longitude:
                      type: number
                      description: Longitude in degrees
      required:
        - serviceType
        - orderId
        - orderReference
        - device
