            saturday:
              $ref: '#/components/schemas/JetConnectMenusUtfConnectorWorkingHours'
            sunday:
              $ref: '#/components/schemas/JetConnectMenusUtfConnectorWorkingHours'
        categories:
          description: A collection of menu categories
          type: array
          items:
            $ref: '#/components/schemas/JetConnectMenusUtfConnectorCategory'
        quantityRestrictions:
          description: A list of quantity restrictions
          type: array
          items:
            $ref: '#/components/schemas/JetConnectMenusUtfConnectorQuantityRestriction'
