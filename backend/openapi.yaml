      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api-daas, api-daas-produk, api-daas-prodaus, api-daas.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-daas-staging, api-daas-staguk, api-daas-stagaus, api-daas.stageu1]>
