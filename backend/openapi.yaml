openapi: 3.0.0
info:
  contact:
    name: Integration enquiries
    url: https://developers.just-eat.com/
    email: david.handley@justeattakeaway.com
  license:
    name: Apache 2
    url: https://www.apache.org/licenses/LICENSE-2.0.txt
  version: 1.0.11
  title: Delivery as a Service API
  x-logo:
    url: ./logo.png
  description: |-
    # Delivery as a Service API
    ## Security
    ### HTTPS
    All api calls and callbacks require HTTPS. Your service will need a valid SSL certificate and be accessible via the standard SSL port (port 443).
    ## Making an API request
    Our API calls require a user token in the form of a JWT. For example:
    ```
    GET https://api-daas-staging.skipthedishes.com/delivery/collect-points HTTP/1.1
    Authorization: Bearer abcd123456789
    ``` 
    The JWT is generated by posting to the [/auth/realms/daas/protocol/openid-connect/token](#operation/authRealmsDaasProtocolOpenidConnectTokenPost) endpoint.
    ## Date Formats
    ### Date and time formats
    All dates and times should use the [ISO 8601 standard for representation of dates and times](https://en.wikipedia.org/wiki/ISO_8601). These dates and times should be in UTC.
    #### For instance:
    * targetDeliverTime: `"2021-08-16T19:00:45.211Z"`
x-tagGroups:
  - name: Applications
    tags:
      - Delivery as a Service
paths:
  /auth/realms/daas/protocol/openid-connect/token:
    post:
      tags:
        - Operate Platform
        - Manage Public Ingress Gateway
        - Delivery as a Service
        - publicly-accessible
      summary: Generate JSON Web Token
      description: The Generate JSON Web Token endpoint enables partners to generate an authentication token used by other endpoints.
      operationId: authRealmsDaasProtocolOpenidConnectTokenPost
      security:
        - basic_auth: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DaasDaasConnectTokenRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasKeycloakAuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasUnauthorizedException'
              example:
                error: invalid_client
                error_description: Invalid client or Invalid client credentials
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasForbiddenException'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasErrorException'
              example:
                message: Not Found
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api, api-produk, api-prodaus, api.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-staging, api-staguk, api-stagaus, api.stageu1]>
      x-component-name: daasapigw
      x-status: Draft
