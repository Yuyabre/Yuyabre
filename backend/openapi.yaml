          type: array
        SpendMore:
          nullable: true
          $ref: '#/components/schemas/BasketSpendMore'
        TopUpToMov:
          nullable: true
          $ref: '#/components/schemas/BasketSmallOrderFeePrompt'
          description: The Minimum Order Value (MOV) of the restaurant if a TopUpToMov Small Order Fee has been applied to the basket. Mutually exclusive with FixedByBand.
        FixedByBand:
          nullable: true
          $ref: '#/components/schemas/BasketSmallOrderFeePrompt'
          description: The highest 'MaxOrderAmount' of the restaurant's Small Order Fee config bands, if a FixedByBand Small Order Fee has been applied to the basket. Mutually exclusive with TopUpToMov.
        Offers:
          items:
            $ref: '#/components/schemas/BasketOffer'
          type: array
        InvalidProducts:
          items:
            $ref: '#/components/schemas/BasketInvalidProduct'
          type: array
        InvalidParticipants:
          items:
            $ref: '#/components/schemas/BasketInvalidParticipant'
          type: array
          description: Collection of errors that happened to the participant to be shown to the customer
        ItemDiscounts:
          items:
            $ref: '#/components/schemas/BasketItemDiscountPrompt'
          description: Collection of item discount prompts to be shown to the customer
          type: array
        RequiresOther:
          type: boolean
          description: True if extra products are required. An example is when you need to add food if your basket only contains drinks
        DiscountApplied:
          nullable: true
          description: Details of applied discounts
          properties:
            Amount:
              format: decimal
              type: number
              description: The amount
          type: object
        RefreshMenu:
          type: boolean
          description: Flag that describes the menu needs to be reloaded (e.g. items in the basket become invalid so the menu needs to be re-fetched)
        Restrictions:
          items:
            $ref: '#/components/schemas/BasketRestrictionPrompt'
          description: Collection of restrictions prompts to be shown to the customer (e.g. the basket contains alcoholic items)
          type: array
        AmountSavedWithDeliveryBenefit:
          nullable: true
          description: The amount saved when the delivery benefit is applied
          format: decimal
          type: number
        RemainingSpendForDeliveryBenefit:
          nullable: true
