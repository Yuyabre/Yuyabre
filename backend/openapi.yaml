    RestaurantListOfOfflineItemsResponse:
      type: object
      properties:
        paging:
          description: Consists of pagination information.
          properties:
            cursors:
              description: Consists of cursors markers used in pagination.
              properties:
                after:
                  description: The value should be used in the query parameter named after. It is used as a cursor of the last returned record in the previous request, from which next offset going to be fetched. A missing or empty value indicates that the end of the result set has been reached.
                  type: string
              type: object
          type: object
        offlineItems:
          items:
            $ref: '#/components/schemas/RestaurantOfflineItemsResponse'
          description: List of offline items for a given restaurant.
          type: array
      example:
        paging:
          cursors:
            after: NDMyNzQyODI3OTQw
        offlineItems:
          - type: variation
            id: '111'
            nextAvailableAt: '2021-01-01T05:00:00.0000000'
          - type: variation
            id: '222'
            nextAvailableAt: '2021-01-01T05:00:00.0000000'
          - type: modifier
            id: '888'
            nextAvailableAt: '2021-01-01T05:00:00.0000000'
          - type: modifier
            id: '999'
            nextAvailableAt: '2021-01-01T05:00:00.0000000'
    RestaurantOfflineItemsRequest:
      type: object
      properties:
        modifierIds:
          maxItems: 250
          type: array
          minItems: 0
          items:
            type: string
          description: Modifier identifiers. Maximum sum of 250 Variation and Modifier IDs.
        variationIds:
          maxItems: 250
          type: array
          minItems: 0
          items:
            type: string
          description: Variation identifiers. Maximum sum of 250 Variation and Modifier IDs.
        nextAvailableAt:
          description: Time when items will be brought back online (ISO-8601 Date Time UTC).
          format: date-time
          type: string
          nullable: true
        menuVersionTimestamp:
          description: ISO-8601 string representing the UTC timestamp when the menu data was last updated in the source system. This is used in conjunction with [menu/product-catalogue ingestion](#operation/partnersTenantRestaurantIdProductCataloguePost) to ensure that records of offline items are not removed from our system if the menu data is older than the offline items request.
          format: date-time
          type: string
          nullable: true
      anyOf:
        - required:
            - modifierIds
        - required:
            - variationIds
      example:
        modifierIds:
          - '777'
          - '888'
          - '999'
        variationIds:
          - '111'
          - '222'
          - '333'
        nextAvailableAt: '2021-01-01T05:00:00.0000000'
        menuVersionTimestamp: '2023-06-19T14:28:00Z'
    RestaurantOfflineItemsResponse:
      type: object
      properties:
        type:
          items:
            type: string
          description: Item type identifier.
          type: string
        id:
          items:
            type: string
          description: Item identifier.
          type: string
        nextAvailableAt:
          description: Time when item(s) will be brought back online (ISO-8601 Date Time UTC).
          format: date-time
          type: string
      example:
        type: variation
        id: '111'
        nextAvailableAt: '2021-01-01T05:00:00.0000000'
    RestaurantOnlineItemsRequest:
