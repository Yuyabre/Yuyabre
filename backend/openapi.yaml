          type: array
          description: Email contact addresses associated with the partner.
          items:
            $ref: '#/components/schemas/RestaurantservicePartnerEmailAddress'
        phoneNumbers:
          type: array
          description: Phone contact addresses associated with the partner.
          items:
            $ref: '#/components/schemas/RestaurantservicePartnerPhoneNumbers'
        updatedBy:
          type: string
          description: Identifier of the user or system that created the partner.
        generalSettings:
          type: object
          description: General settings that can control various partner capabilities.
          nullable: false
          properties:
            allowCourierTipping:
              nullable: false
              description: Indicates whether the partner allows customers to tip the courier.
              type: boolean
            allowOrderComments:
              nullable: false
              description: Indicates whether the partner allows customers to leave comments / information on orders.
              type: boolean
            excludeFromSearch:
              nullable: false
              description: Indicates whether the partner should be excluded from search results.
              type: boolean
            autoAcceptOrders:
              nullable: false
              description: Indicates whether the orders to this partner are automatically accepted.
              type: boolean
            allowItemSubstitutions:
              nullable: false
              description: Indicates whether the partner can substitution items in an order.
              type: boolean
            allowSelfClosing:
              nullable: false
              description: Indicates whether the partner is allowed to close themselves.
              type: boolean
            showAddressOnline:
              type: boolean
              description: Showing the address on Web/APP when setting is enabled. (for Pickup orders - The restaurant's address must always be shown)
            allowPhoneNumberDisplayInEmail:
              type: boolean
              description: This setting shows or hides the phone number on the order confirmation email.
            allowGoogleFoodOrder:
              type: boolean
              description: Determines whether the restaurant is available on the Google Food Ordering Platform.
            isVIPPartner:
              type: boolean
              description: Indicates whether the partner is a VIP one.
