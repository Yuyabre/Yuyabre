    DaasDaasSimulateDeliveryRequest:
      type: object
      description: Simulate delivery
      required:
        - requestId
      properties:
        requestId:
          type: string
          description: The ID of the request. This is generated from the [Estimate delivery](#tag/Delivery-as-a-Service/paths/~1delivery~1estimate/post) endpoint.
          nullable: false
        deliveryStep:
          description: The step until which the delivery should be simulated. This is an optional field. If not provided, the delivery will be simulated until the DELIVERED step. If a delivery is simulated for any step before DELIVERED, it can be simulated again for any subsequent step; the simulation will then resume from the point where the previous simulation for that request ended.
          nullable: true
          type: string
          enum:
            - ASSIGNED
            - IN_TRANSIT_TO_COLLECT
            - ARRIVED_TO_COLLECT
            - COLLECTED
            - IN_TRANSIT_TO_DELIVER
            - ARRIVED_TO_DELIVER
            - DELIVERED
            - CANCELLED
          default: DELIVERED
        stepWaitDuration:
          description: The delay between each delivery step in milliseconds.
          nullable: true
          type: integer
          format: int32
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        stepWaitDuration: 10000
    DaasDaasUnauthorizedException:
      description: A HTTP 401 error response
      properties:
        error:
          description: Type of Exception.
          type: string
        message:
          description: The reason that an error was thrown.
          type: string
      type: object
      example:
        message: Unauthorized
    DaasScooberCourierResponse:
      type: object
      description: The status of a delivery.
      title: CourierJobStatus
      required:
        - status
        - orderId
        - requestId
        - vendorOrderId
        - orderTrackerURL
        - courier
      properties:
        status:
          enum:
            - ASSIGNED
            - ARRIVED_TO_COLLECT
            - COLLECTED
            - ARRIVED_TO_DELIVER
            - DELIVERED
            - CANCELLED
          type: string
          description: The current status of a delivery.
          nullable: false
        orderId:
          type: string
          description: The order Id associated with the delivery.
          nullable: false
        requestId:
          type: string
          description: The request ID associated with the delivery.
          nullable: false
        vendorOrderId:
          type: string
          description: Order ID supplied by the partner on delivery creation referencing the order within their systems.
          nullable: false
        orderTrackerURL:
          type: string
          description: The tracking URL for the delivery.  Note -- This is only available for the following markets [CA, BE, BG, DK, IT, NL, PL, ES, CH], otherwise the value will be `Not available`.
          nullable: false
        courier:
          type: object
          description: Details about the courier associated with the delivery.
          required:
            - name
          properties:
            id:
              type: string
              description: Id of the courier.  Note -- This is not currently available for the following markets and will be blank [BE, BG, DK, IT, NL, PL, ES, CH].
              nullable: false
            name:
              type: string
              description: Name of the courier.  Note -- This is not currently available for the following markets and will be blank [BE, BG, DK, IT, NL, PL, ES, CH].
              nullable: false
      example:
        status: DELIVERED
        orderId: efeb46ce-53eb-44cd-afba-ba59e7b84a89
        requestId: e0d58b3a-f547-4013-a4e5-728263040f33
        vendorOrderId: '123456789'
        orderTrackerURL: http://www.skipthedishes.com/order-tracker/efeb46ce-53eb-44cd-afba-ba59e7b84a89
        courier:
          id: 17cc81ef-d246-460a-a5d2-e4db506c17d7
          name: Example Courier
    DeliveryApiBulkDeliveryDetailsList:
      items:
        $ref: '#/components/schemas/DeliveryApiBulkDeliveryDetails'
      type: array
    DeliveryApiBulkDeliveryDetails:
      required:
        - DriverId
        - TimeStampWithUtcOffset
      properties:
        EtaAtDeliveryAddress:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the delivery address.
          example: '2020-12-25T16:45:28.7537228+00:00'
          type: string
        TimeStampWithUtcOffset:
          description: This should represent the bulk delivery updated timestamp.
          format: date-time
          type: string
        OrderId:
          description: Just Eat order identifier
          type: string
        Location:
          $ref: '#/components/schemas/LogisticsLocation'
        EtaAtRestaurant:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the restaurant.
          example: '2020-12-25T16:30:28.7537228+00:00'
          type: string
        DriverId:
          description: The driver identifier
          example: '123456'
          type: string
      type: object
    DeliveryApiDeliveryDetails:
      type: object
      required:
        - DriverId
        - TimeStampWithUtcOffset
      properties:
        DriverId:
          description: The driver identifier
          example: '123456'
          type: string
        Location:
          $ref: '#/components/schemas/LogisticsLocation'
        TimeStampWithUtcOffset:
          description: This should represent the delivery detailed updated timestamp.
          format: date-time
          type: string
      example:
        TimeStampWithUtcOffset: '2018-03-10T14:45:28.7537228+00:00'
        DriverId: fae456
    DeliveryApiDeliveryDriverAssignedDetails:
      required:
        - VehicleDetails
        - DriverId
        - DriverName
        - TimeStampWithUtcOffset
      properties:
        DriverId:
          description: The driver identifier
          example: '123456'
          type: string
        EtaAtDeliveryAddress:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the delivery address.
          example: '2020-12-25T16:45:28.7537228+00:00'
          type: string
        TimeStampWithUtcOffset:
          format: date-time
          description: This should represent the driver assigned timestamp.
          example: '2020-12-25T15:45:28.7537228+00:00'
          type: string
        DriverContactNumber:
          description: This should represent the driver's contact number.
          example: '+447123456789'
          type: string
        VehicleDetails:
          $ref: '#/components/schemas/DeliveryApiVehicleDetails'
        DriverName:
          description: |-
            This should represent the driver's name.

            **(Optional)** If `VehicleDetails` provided
          example: David
          type: string
        Location:
          $ref: '#/components/schemas/LogisticsLocation'
        EtaAtRestaurant:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the restaurant. In other words, it should not just contain the pick-up time initially requested by Just Eat.
          example: '2020-12-25T15:30:28.7537228+00:00'
          type: string
      type: object
    DeliveryApiDeliveryDriverDetailsWithEta:
      type: object
      required:
        - DriverId
        - TimeStampWithUtcOffset
      properties:
        Location:
          $ref: '#/components/schemas/LogisticsLocation'
        EtaAtDeliveryAddress:
          description: This should represent the delivery partner's best guess at when the driver will arrive at the delivery address.
          format: date-time
          type: string
        TimeStampWithUtcOffset:
          description: This should represent the Eta calculated timestamp.
          format: date-time
          type: string
        DriverId:
          description: The driver identifier
          example: '123456'
          type: string
      example:
        Location:
          Speed: 8.68
          Latitude: 51.51641
          Heading: 357.10382
          Accuracy: 12.814
          Longitude: -0.103198
        EtaAtDeliveryAddress: '2018-03-10T15:45:28.7537228+00:00'
        TimeStampWithUtcOffset: '2018-03-10T14:45:28.7537228+00:00'
        DriverId: fe157a
    DeliveryApiDeliveryDriverLocation:
      required:
        - DriverId
        - TimeStampWithUtcOffset
      properties:
        EtaAtRestaurant:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the restaurant.
          example: '2020-12-25T16:30:28.7537228+00:00'
          type: string
        Location:
          example:
            Speed: 8.68
            Latitude: 51.51641
            Heading: 357.10382
            Accuracy: 12.814
            Longitude: -0.103198
          $ref: '#/components/schemas/LogisticsLocation'
        EtaAtDeliveryAddress:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the delivery address.
          example: '2020-12-25T16:45:28.7537228+00:00'
          type: string
        TimeStampWithUtcOffset:
          format: date-time
          description: This should represent the location updated timestamp.
          example: '2020-12-25T15:45:28.7537228+00:00'
          type: string
        DriverId:
          description: The driver identifier
          example: '123456'
          type: string
      type: object
    DeliveryApiDeliveryDriverUnassignedDetails:
      required:
        - DriverId
        - TimeStampWithUtcOffset
      properties:
        EtaAtDeliveryAddress:
          format: date-time
          description: This should represent the delivery partner's best guess at when the driver will arrive at the delivery address.
          example: '2020-12-25T16:45:28.7537228+00:00'
          type: string
        'Location:':
          description: This should represent the driver's geographic location (longitude and latitude)
          $ref: '#/components/schemas/LogisticsLocation'
        TimeStampWithUtcOffset:
          format: date-time
          description: This should represent the driver unassigned timestamp.
          example: '2020-12-25T15:30:28.7537228+00:00'
          type: string
        DriverContactNumber:
          description: This should represent the driver's contact number.
          example: '+447123456789'
          type: string
        UnassignedBy:
          description: This should represent the actor who triggered unassignment.
          example: operation
          type: string
        DriverId:
          description: The driver identifier
