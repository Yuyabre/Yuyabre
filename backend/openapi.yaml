          type: string
          description: The collect point Id.
          nullable: false
        name:
          type: string
          description: Name of the collect point.
          nullable: false
        emailAddress:
          type: string
          description: Email of the collect point.
          nullable: false
        phoneNumber:
          type: string
          description: |
            Phone number of the collect point.

            A phone number can be represented in:
              - E.164 format e.g. +447777111111 or;
              - Local format of submitted tenant e.g. 07777111111.

            E.164 formatted phone numbers are preferred.
          nullable: false
          minLength: 3
          maxLength: 16
        address:
          type: string
          description: Address of the collect point.
          nullable: false
        city:
          type: string
          description: City of the collect point.
          nullable: false
        province:
          type: string
          description: Province of the collect point.  This will not be returned where a province is not applicable, for example in some EU markets.
          nullable: true
        postalCode:
          type: string
          description: Postal code of the collect point.
          nullable: true
        latitude:
          type: number
          description: Latitude information.
          nullable: false
          format: double
        longitude:
          type: number
          description: Longitude information.
          nullable: false
          format: double
        timeZone:
          type: string
          description: Time zone of the collect point in IANA format.
          nullable: false
        countryCode:
          type: string
          description: Country of the collect point in upper case ISO 3166-1 alpha-2 format.
          nullable: true
        locationRemarks:
          type: string
          description: Instructions from partner to the courier. These are intended to help the courier navigate to the partner premises.
          nullable: true
        courierRegion:
          type: string
          description: Id of the delivery region, where the collect point is located. This will only be returned for collect points in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
        corporateIdentifier:
          type: string
          description: Corporate identifier of the collect point, where applicable.
          nullable: true
