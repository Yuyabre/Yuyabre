        customerAccountType:
          type: string
          description: Customer Account Type
          enum:
            - default
            - guest
            - unknown
        queryType:
          type: string
          description: Describes the problem encountered by customers with the order
          enum:
            - missingItem
            - coldFood
            - damagedFood
            - incorrect
            - incorrectlyCooked
            - dietaryRequirementsNotMet
            - foreignObject
            - lateOrder
            - foodNotArrived
            - goodwillPayment
            - tip
            - inappropriateSubstitution
            - healthConcern
            - poorPresentation
            - disappointingTaste
            - orderNotDelivered
            - deliveryServiceIssue
            - alcoholOrderReturn
            - other
        refund:
