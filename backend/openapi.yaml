  /v1/delivery/status/{requestId}:
    get:
      tags:
        - Logistic Management
        - Define Delivery Plan
        - Delivery as a Service
        - publicly-accessible
      summary: Get Delivery Status
      description: |
        The Delivery Status endpoint enables partners to retrieve the the delivery status of a particular delivery. **Note: Courier Location is not available in `EU`**
      operationId: v1DeliveryStatusRequestIdGet
      security:
        - daas_jwt: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
        - name: requestId
          in: path
          description: The ID of the request. This is generated from the [Estimate delivery](#tag/Delivery-as-a-Service/paths/~1delivery~1estimate/post) endpoint
          required: true
          schema:
            type: string
      responses:
        '200':
          headers:
            cache-control:
              description: Information about how the response can be cached.
              schema:
                type: string
                example: no-cache
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaaSDeliveryStatusResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasUnauthorizedException'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasForbiddenException'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasInternalServerErrorException'
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api-daas, api-daas-produk, api-daas-prodaus, api-daas.prodeu1]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-daas-staging, api-daas-staguk, api-daas-stagaus, api-daas.stageu1]>
      x-component-name: daasdataservice
      x-status: Stable
  /your-notification-endpoint:
    post:
      tags:
        - Logistic Management
        - Define Delivery Plan
        - Delivery as a Service
        - publicly-accessible
      summary: Notify Partner
      description: This webhook will be invoked to send events related to ongoing deliveries to our partners.  Note that webhooks have HTTP connection and request timeouts of 10 seconds.  Failed webhooks will not be retried.
      operationId: yourNotificationEndpointPost
      security:
        - basic_auth: []
        - api_key: []
      parameters:
        - name: x-api-key
          in: header
          description: This field contains the token you provided if you selected token authentication during the setup configuration via the Create Notification Config endpoint.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaasDaaSNotificationConfigWebhookRequest'
      responses:
        '200':
          description: Respond with a 200 status code to indicate that you have received the notification.
      servers:
        - url: https://
          description: The URL of your webhook page
      x-component-name: daasdispatcher
      x-status: Draft
      x-webhook: 'Yes'
components:
