    RestaurantsNutrition:
      type: object
      description: Nutritional information for this item.
      properties:
        energyContent:
          items:
            $ref: '#/components/schemas/RestaurantsNutritionalRangeItem'
          type: array
          description: Energy information for this item.
          minItems: 1
          nullable: true
        alcoholByVolume:
          type: number
          format: decimal
          minimum: 0
          maximum: 100
          description: The alcohol by volume of this item, represented as a percentage value.
          nullable: true
        caffeine:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RestaurantsCaffeineInformation'
          nullable: true
        nutritionTable:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RestaurantsNutritionTableItem'
          nullable: true
        allergens:
          type: object
          additionalProperties: true
          description: Describes the allergens for a variation/modifier. If there are no allergens, the 'allergenSet' will be an empty array. If allergens are unknown, this field will not be included.
          properties:
            dataSource:
              type: string
              $ref: '#/components/schemas/RestaurantsNutritionalDataSource'
              description: The provider of the predicted or validated set of allergens.
            validated:
              type: boolean
              description: Specifies whether the set of allergens provided has been validated as accurate.
            allergenSet:
              type: array
              items:
                $ref: '#/components/schemas/RestaurantsAllergen'
              description: The set of allergens provided for this variation/modifier. If this is an empty array, this indicates that the variation/modifier does not contain any allergens.
            containsNoAllergens:
              type: boolean
              description: Additional safety check - this property will be set to true if the allergen set is empty.
          required:
            - dataSource
            - validated
            - allergenSet
          nullable: true
        additives:
          type: object
          additionalProperties: true
          description: Describes the additives for a variation/modifier. If there are no additives, the 'additiveSet' should be an empty array. If additives are unknown, this field should not be included.
          required:
            - dataSource
            - validated
            - additiveSet
          properties:
            dataSource:
              type: string
              $ref: '#/components/schemas/RestaurantsNutritionalDataSource'
              description: The provider of the predicted or confirmed set of additives.
            validated:
              type: boolean
              description: Specifies whether the set of additives provided has been confirmed as accurate.
            additiveSet:
              type: array
              items:
                $ref: '#/components/schemas/RestaurantsAdditive'
              description: The set of additives provided for this variation/modifier. If this is an empty array, this indicates that the variation/modifier does not contain any additives.
              nullable: true
            containsNoAdditives:
              type: boolean
              description: Additional safety check - this property will be set to true if the additive set is empty.
              nullable: true
      example:
        energyContent:
          - min: 100
            max: 100
            unit: kcal
          - min: 100
            max: 100
            unit: kJ
    RestaurantsNutritionProperty:
      description: Represents a nutrition component
      additionalProperties: true
      required:
        - name
        - unit
        - quantity
      properties:
        name:
          description: 'The nutrition component being referenced. Currently supported nutrition components: ''addedSugar'', ''calcium'', ''carbohydrates'', ''cholesterol'', ''energyKcal'', ''energyKj'', ''fat'', ''fibre'', ''iron'', ''potassium'', ''protein'', ''salt'', ''saturatedFat'', ''sodium'', ''sugar'', ''transFat'', ''vitaminD'''
          type: string
          nullable: false
        unit:
          description: The unit used to represented the nutrition quantity.
          $ref: '#/components/schemas/RestaurantsQuantityUnit'
          nullable: false
        quantity:
          description: The quantity of the nutrient.
          $ref: '#/components/schemas/RestaurantsQuantityValue'
          nullable: false
        percentRI:
          type: number
          format: decimal
          minimum: 0
          description: The percentage of the daily reference intake (RI) of an average adult.
          nullable: true
    RestaurantsNutritionTableItem:
      type: object
      additionalProperties: true
      description: Represents the nutrition table information for a specific serving.
      required:
        - description
        - nutritionProperties
      properties:
        description:
          type: string
          description: Label for the nutrition table item.
          nullable: false
        referenceQuantity:
          $ref: '#/components/schemas/RestaurantsReferenceQuantity'
          description: The quantity the nutrition table item applies to.
          nullable: true
        nutritionProperties:
          items:
            $ref: '#/components/schemas/RestaurantsNutritionProperty'
          description: The nutrition information for the reference quantity.
          type: array
          minItems: 1
          nullable: false
      example:
        description: Quantity Per 100g
        referenceQuantity:
          unit: g
          quantity:
            value: 100
            lessThan: false
        nutritionProperties:
          - name: fat
            unit: g
            quantity:
              value: 15
              lessThan: false
            percentRI: 50
          - name: protein
            unit: g
            quantity:
              value: 0.1
              lessThan: true
    RestaurantsNutritionalDataSource:
      description: The data source for a set of allergens or additives
