            enum:
              - MONDAY
              - TUESDAY
              - WEDNESDAY
              - THURSDAY
              - FRIDAY
              - SATURDAY
              - SUNDAY
        additionalRate:
          description: The rate to be applied for additional time
          $ref: '#/components/schemas/ScooberPayrollPayrollapiTimeCompensationPoliciesTimeCompensationRate'
        additionalTimeRange:
          description: The period of time in which additions should be paid
          $ref: '#/components/schemas/ScooberPayrollPayrollapiTimeCompensationPoliciesAdditionalTimeRange'
        seniorityLevels:
          description: The courier's seniority level in which the policy applies to
          type: array
          items:
            type: string
            enum:
              - LEVEL_0
              - LEVEL_1
              - UNDEFINED
        contractTypes:
          description: The type of contract in which the policy applies to
          type: array
          items:
            type: string
            enum:
              - FULL_TIME
              - PART_TIME
              - FREELANCER
              - STUDENT
              - MINI_JOBBER
              - MIDI_JOBBER
              - SUBCONTRACTOR
              - CONTINGENT_WORKER
              - FLEX
              - UNKNOWN
