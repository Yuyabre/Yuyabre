    TopRankCreateTopRankCampaignsRequest:
      type: object
      title: CreateTopRankCampaignsRequest
      description: The request to create new campaigns for a given partner.
      required:
        - costPerOrder
        - deliveryAreas
        - timeSlots
        - daysOfWeek
        - userId
        - userType
      properties:
        costPerOrder:
          format: int32
          description: The cost per order in the smallest unit of local currency (e.g., pence).
          type: integer
          minimum: 0
        deliveryAreas:
          description: The delivery areas that the campaign applies to.
          type: array
          items:
            type: string
          uniqueItems: true
        timeSlots:
          description: The campaign's running time of the day
          type: array
          items:
            $ref: '#/components/schemas/TopRankTimeSlot'
          uniqueItems: true
        daysOfWeek:
          description: The campaign's running days of the week
          type: array
          items:
            $ref: '#/components/schemas/SharedDayOfWeek'
          uniqueItems: true
        userId:
          type: string
          description: The ID related to the user who created this campaign.
        userType:
          $ref: '#/components/schemas/TopRankUserType'
      example:
        costPerOrder: 400
        deliveryAreas:
          - Area 1
        timeSlots:
          - key: lunch
            start: '11:00:00'
            end: '16:00:00'
        daysOfWeek:
          - sunday
        userId: agent1@justeattakeaway.com
        userType: agent
    TopRankPartnerBoostRequest:
