          format: integer
          type: number
          minimum: 1
          deprecated: true
          nullable: true
        maximumRedemptions:
          format: integer
          type: number
          description: The maximum number of discounted items that can be given, unlimited when null
          minimum: 1
          default: 1
          nullable: true
      example:
