        commercialAddress:
          street:
            - Houttil
            - 46 B
          city: Alkmaar
          state: Noord-Holland
          postcode: 1811 JN
          country: Netherlands
        legalAddress:
          street:
            - Houttil
            - 46 B
          city: Alkmaar
          state: Noord-Holland
          postcode: 1811 JN
          country: Netherlands
        currentOwners: []
        formerOwners: []
        principalOwner:
          type: individual
          birthDate: '1985-05-25'
          firstName: Deepak
          middleName: null
          lastName: Chhetri
          fullName: Deepak Chhetri
          nationality: German
          currentAddress:
            street:
              - Houttil
              - 46 B
            city: Alkmaar
            state: Noord-Holland
            postcode: 1811 JN
            country: Netherlands
