    AuthenticationserviceAuthorizationDenyRequest:
      description: A request to deny user authorization
      required:
        - returnUrl
      properties:
        returnUrl:
          type: string
          description: A return URL used by the front end to redirect the user
      example:
        returnUrl: https://mydomain.com?returnUrl=someinfo
    AuthenticationserviceAuthorizationDenyResponse:
      description: A response to user authorization denial request
      required:
        - validatedReturnUrl
      properties:
        validatedReturnUrl:
          type: string
          description: A validated URL used by the front end to redirect the user
      example:
        validatedReturnUrl: https://www.mydomain.com/AuthCodeFlow
    AuthenticationserviceConnectAuthorizeRequest:
      description: A request to initiate the Authentication Code flow
      required:
        - response_type
        - client_id
        - scope
        - redirect_uri
      properties:
        response_type:
          enum:
            - id_token
            - token
            - code
          type: string
          description: |-
            Determines the mechanism the server uses to authorize the creation of the tokens. The values can be combined to specify more than one token type.
            * `id_token` requests an identity token (only identity scopes are allowed)
            * `token` requests an access token (only resource scopes are allowed)
            * `code` requests an authorization code
            * `id_token token` token requests an identity token and an access token
            * `code id_token` requests an authorization code and identity token
            * `code id_token token` requests an authorization code, identity token and access token
        client_id:
          type: string
          description: The identifier of the client.
        scope:
          type: string
          enum:
            - openid
            - profile
            - offline_access
            - mobile_access
          description: |-
            One or more registered scopes to return. This can be the known values or custom scopes. This will typically be `openid`, to request the OpenID Connect scopes, and additionally `profile` when you require an identity token.
            `offline_access` is required if you require a refresh token in the subsequent token request.
        redirect_uri:
          type: string
          description: Must exactly match one of the allowed redirect URIs for that client.
        state:
          type: string
          description: The server will echo back the state value on the token response. This is for round-tripping state between client and provider, correlating request and response for CSRF/replay protection (recommended).
        code_challenge:
          type: string
          description: Sends the code challenge for PKCE.
        code_challenge_method:
          type: string
          enum:
            - plain
            - S256
          description: |-
            A method that was used to derive the code challenge for PKCE.
            * `plain` is the default if not specified. Indicates the code challenge is using plain text (not recommended).
            * `S256` indicates the challenge is hashed using SHA-256.
        acr_values:
          type: string
          description: Allows passing in additional authentication-related information.
        response_mode:
          type: string
          enum:
            - form_post
            - query
            - fragment
          description: |-
            Determines how the authorize response is returned.
            * `form_post` encodes the response as HTML form values.
            * `query` sends the response as part of the query string.
            * `fragment` encodes the response into a URL fragment.
        request:
          type: string
          description: Instead of providing all parameters as individual query string parameters, you can provide a subset, or all of them, as a JWT.
        request_uri:
          type: string
          description: URL of a pre-packaged JWT containing request parameters.
        nonce:
          type: string
          description: The API will echo back the nonce value in the identity token (this is for replay protection). Required for identity tokens via implicit grant.
        prompt:
          type: string
          enum:
            - 'null'
            - none
          description: |-
            * (empty/null) - use the default behaviour of showing the login UI.
            * `none` - no UI will be shown during the request. If this is not possible (e.g. because the user has to sign in or consent) an error is returned and the login UI will be shown, even if the user is already signed-in and has a valid session.
        login_hint:
          type: string
          description: Can be used to pre-fill the username field on the login page.
        ui_locales:
          type: string
          description: End-User's preferred languages and scripts for the user interface, represented as a space-separated list of language tag values, ordered by preference.
        max_age:
          type: integer
          description: If the user's logon session exceeds the maximum age (in seconds), the login UI will be shown.
      example:
        response_type: code
        client_id: client1
        scope: openid
        redirect_uri: https://myapp.com/signin-oidc
        state: 1234asd
        code_challenge: asdf879
        code_challenge_method: S256
        response_mode: query
        acr_values: tenant:uk
