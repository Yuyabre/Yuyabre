        verificationCode: A1B2C3
    BasketActiveBasketsResponse:
      required:
        - Baskets
      description: The response object for listing all active baskets of a consumer
      properties:
        PaginationToken:
          type: string
          description: A token to retrieve the next page of results. If null, there are no more results.
          example: eyJQYWdlSW5kZXgiOjAsIlBhZ2VTaXplIjozLCJGb3J3YXJkUGFnZVNpemUiOjN9
          nullable: true
        Counts:
          type: object
          description: The count of active baskets by type
          required:
            - Total
            - Single
            - Group
          properties:
            Total:
              type: number
              format: integer
              description: The total count of active baskets
              example: 3
            Single:
              type: number
              format: integer
              description: The count of single active baskets
              example: 1
            Group:
              type: number
              format: integer
              description: The count of group active baskets
              example: 2
        Baskets:
          type: array
          description: A list of baskets
          nullable: false
          items:
            type: object
            description: The details of a basket
            required:
              - Id
              - Restaurant
              - Fulfilment
              - CustomerRole
              - Mode
              - ItemCount
              - Status
            properties:
              Id:
                type: string
                description: The basket id
                example: EDAwNTY4ZGEtYjk4NC99OD-v1
              Restaurant:
                type: object
                description: The restaurant partner details
                required:
                  - Id
                  - Name
                  - SeoName
                  - Logo
                properties:
                  Id:
                    type: string
                    description: The restaurant id
                    example: '1690'
                  Name:
                    type: string
                    description: The restaurant partner name
                    example: Pizza Place
                  SeoName:
                    type: string
                    description: A unique name per tenant for a restaurant used for external operations.
                    example: pizza-place-downtown
                  Logo:
                    type: object
                    description: The restaurant partner logo
                    required:
                      - Url
                    properties:
                      Url:
                        type: string
                        description: The restaurant logo url
                        example: https://res.cloudinary.com/......./pizza-place-logo.png
                      AltText:
                        type: string
                        description: The restaurant logo alternative text
                        example: Pizza Place logo
                        nullable: true
              Fulfilment:
                type: object
                description: The fulfilment details
                required:
                  - ServiceType
                  - IsAsap
                properties:
                  ServiceType:
                    type: string
                    description: The service type
                    enum:
                      - Delivery
                      - Collection
                    example: Delivery
                  ScheduledDeliveryDateTime:
                    type: string
                    description: The scheduled delivery date time of the order
                    format: date-time
                    example: '2025-06-26T11:30:00Z'
                    nullable: true
                  IsAsap:
                    type: boolean
                    description: True if the fulfilment is asap
                    example: true
              CustomerRole:
                type: string
                description: The role of the customer in the Basket
                enum:
                  - Initiator
                  - Participant
                example: Participant
              Mode:
                type: string
                enum:
                  - None
                  - Group
                description: The basket mode
                example: Group
              ItemCount:
                type: number
                format: integer
                description: The item count in the basket
                example: 2
              Status:
                type: string
                description: The basket status
                enum:
                  - Ordering
                  - Ready
                  - Ordered
                example: Ready
      type: object
    BasketAdjustments:
      description: Adjustments related to the basket
