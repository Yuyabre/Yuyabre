          type: string
        updates:
          description: Collection of marketing channel subscription updates
          $ref: '#/components/schemas/ConsumersConsumerMarketingPreference'
      type: object
      example:
        emailAddress: consumer@just-eat.com
        updates:
          - isSubscribed: true
            channelName: Email
            dateUpdated: '2020-07-20T16:07:23.0000000+01:00'
    CorewebValidateMfaTokenRequest:
      required:
        - mfa_token
