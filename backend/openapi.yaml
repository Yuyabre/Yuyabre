          description: The details of the names the organization trades under for commercial purposes.
          type: array
          items:
            type: string
        commercialAddress:
          description: The details of the Primary Address at which the organization is located or conducts operations.
          $ref: '#/components/schemas/PartnersignupAddress'
        legalAddress:
          description: The details of the organization's official address as recorded with an external authority.
          $ref: '#/components/schemas/PartnersignupAddress'
        currentOwners:
          description: The detail of the person identified as a key stakeholder of the business or organization by the local registry or other official sources. The key stakeholder can be a natural person or an organization.
          type: array
          items:
            $ref: '#/components/schemas/PartnerproofofownershipOwner'
        formerOwners:
          description: The details of the person identified as a previously employed key stakeholder of a business or organization by the local registry or other official sources. A former key stakeholder can be a natural person or an organization.
          type: array
          items:
            $ref: '#/components/schemas/PartnerproofofownershipOwner'
        principalOwner:
          description: The person identified as a highest ranking key stakeholder of a business or organization by the local registry or other official sources. A key stakeholder can be a natural person or an organization.
          $ref: '#/components/schemas/PartnerproofofownershipOwner'
