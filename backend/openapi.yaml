    PartnersPartnerUpdateRequest:
      type: object
      description: A request to update the profile of a partner.
      properties:
        isTestPartner:
          nullable: false
          description: Indicates whether the partner is for testing purposes.
          type: boolean
        name:
          type: string
          description: Name of the partner in JET.
        addresses:
          type: array
