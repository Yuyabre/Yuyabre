    TopRankTopRankCampaignReport:
      type: object
      title: TopRankCampaignReport
      description: The top-rank campaign report which describes the performance of a campaign for partner for a given period.
      required:
        - campaignId
        - deliveryArea
        - startDate
        - costPerOrder
        - totalCost
        - totalRevenue
        - totalOrders
        - roas
        - status
      properties:
        campaignId:
          description: The unique identifier of the campaign.
          type: string
        deliveryArea:
          description: The location that the campaign applies to.
          type: string
        startDate:
          description: The UTC date and time at which the campaign was started.
          type: string
          format: date-time
        endDate:
          description: The UTC date and time at which the campaign was ended. Can be null if campaign is still running.
          type: string
          format: date-time
          nullable: true
        costPerOrder:
          description: The cost per order in the smallest unit of local currency (e.g., pence).
          type: integer
          format: int32
          minimum: 0
        totalCost:
          description: The total campaign cost for partner per report period in the smallest unit of local currency (e.g., pence).
          type: integer
          format: int32
          minimum: 0
        totalRevenue:
          description: The total revenue partner earned per report period within the campaign in the smallest unit of local currency (e.g., pence).
          type: integer
          format: int32
          minimum: 0
        totalOrders:
          description: The total number of orders partner got per report period within the campaign in the smallest unit of local currency (e.g., pence).
          type: integer
          format: int32
          minimum: 0
        roas:
          description: The amount of revenue earned for every unit spent on a campaign per report period within the campaign.
          type: number
          format: decimal
        status:
          description: The status of the campaign.
          type: string
          enum:
            - active
            - ended
      example:
        campaignId: 5d333100-2d05-4690-a2da-6d0c465c5c4c
        deliveryArea: Area 1
        startDate: '2024-08-05T10:35:03.0000000+00:00'
        endDate: '2024-08-20T11:45:55.0000000+00:00'
        costPerOrder: 399
        totalCost: 1596
        totalRevenue: 23940
        totalOrders: 4
        roas: 15
        status: ended
