                orderNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether an Order note can be supplied when updating a Collection checkout.
                  type: boolean
                kitchenNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether a Kitchen note can be supplied when updating a Collection checkout.
                  type: boolean
            delivery:
              required:
                - orderNoteAccepted
                - kitchenNoteAccepted
                - courierNoteAccepted
              nullable: false
              description: |
                Details of the types of customer notes that can be supplied when updating a Delivery checkout.
              type: object
              properties:
                orderNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether an Order note can be supplied when updating a Delivery checkout.
                  type: boolean
                kitchenNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether a Kitchen note can be supplied when updating a Delivery checkout.
                  type: boolean
                courierNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether a Courier note can be supplied when updating a Delivery checkout.
                  type: boolean
            dineIn:
              required:
                - orderNoteAccepted
                - kitchenNoteAccepted
              nullable: false
              description: |
                Details of the types of customer notes that can be supplied when updating a Dine In checkout.
              type: object
              properties:
                orderNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether an Order note can be supplied when updating a Dine In checkout.
                  type: boolean
                kitchenNoteAccepted:
                  nullable: false
                  description: |
                    Indicates whether a Kitchen note can be supplied when updating a Dine In checkout.
                  type: boolean
    CheckoutOptionsCheckoutOptions:
      required:
        - tipping
        - customerNotes
      description: Details of which options are available for the given checkout.
      type: object
      properties:
        currency:
          description: The currency code in ISO-4217 format e.g. GBP.
          type: string
          minLength: 3
          maxLength: 3
          nullable: false
        tipping:
          $ref: '#/components/schemas/CheckoutOptionsTipping'
        customerNotes:
          $ref: '#/components/schemas/CheckoutOptionsCheckoutCustomerNotes'
        vouchers:
          nullable: true
          $ref: '#/components/schemas/CheckoutOptionsVouchers'
        delivery:
          nullable: true
          $ref: '#/components/schemas/CheckoutOptionsDelivery'
        additionalProducts:
          nullable: true
          $ref: '#/components/schemas/CheckoutOptionsAdditionalProducts'
    CheckoutOptionsDelivery:
      type: object
      description: Contains all delivery options.
      properties:
        options:
          type: array
          nullable: true
          minItems: 1
          description: List of all delivery options.
          items:
            nullable: false
            $ref: '#/components/schemas/CheckoutOptionsDeliveryOption'
    CheckoutOptionsDeliveryOption:
      type: object
      description: Describes a delivery option.
      required:
        - default
        - name
        - tags
      properties:
        default:
          type: boolean
          nullable: false
          description: Whether the delivery option is enabled by default.
        name:
          type: string
          nullable: false
          description: The name of the delivery option.
        description:
          type: string
          nullable: true
          description: Provides a description of the delivery option.
        tags:
          type: array
          nullable: false
          description: Any tags related to the delivery option.
          items:
            type: string
            nullable: false
        fee:
          type: object
          nullable: true
          required:
            - amount
          description: The delivery fee without any benefit applied to it.
          properties:
            amount:
              type: integer
              nullable: false
              format: int32
              minimum: 0
              description: The amount of the fee in minor currency units.
        membership:
          nullable: true
          $ref: '#/components/schemas/CheckoutOptionsDeliveryOptionsMembership'
    CheckoutOptionsDeliveryOptionsMembership:
      type: object
      description: Describes a customer's membership relating to their delivery options.
      required:
        - id
      properties:
        id:
          type: string
          nullable: false
          description: The Id of the membership.
        expiry:
          type: object
          nullable: true
          required:
            - expiryDate
            - hasExpired
          description: Information about when this membership will expire.
          properties:
            expiryDate:
              type: string
              format: date-time
              nullable: false
              description: The expiration date of this membership in ISO 8601 UTC (Zulu Time).
            hasExpired:
              type: boolean
              nullable: false
              description: Indicates whether the membership has expired.
    CheckoutOptionsMembershipBenefit:
      type: object
      description: Describes a benefit which can be applied to the Checkout.
      required:
        - type
        - available
      properties:
        type:
          type: string
          nullable: false
          description: The type of the benefit. Currently the only possible value is `unlimitedFreeDelivery`, but more may be added in the future.
        restrictedBy:
          type: array
          nullable: true
          description: Lists the restrictions which indicate that the current Checkout is not eligible to select this benefit.
          items:
            $ref: '#/components/schemas/CheckoutOptionsRestriction'
            nullable: false
        code:
          type: string
          nullable: true
          description: The voucher code needed to apply to activate the benefit.
        available:
          type: boolean
          nullable: false
          description: Indicates whether the membership can be purchased.
    CheckoutOptionsMembershipPlan:
      type: object
      description: Contains the plan associated with the membership.
      required:
        - termsAndConditions
        - brandName
        - duration
        - price
        - benefits
      properties:
        description:
          type: string
          nullable: true
          description: Describes the membership plan.
        brandName:
          type: string
          nullable: true
          description: Brand name of the plan.
        termsAndConditions:
          $ref: '#/components/schemas/CheckoutOptionsMembershipTermsAndConditions'
          nullable: false
        subscription:
          $ref: '#/components/schemas/CheckoutOptionsMembershipSubscription'
          nullable: true
        duration:
          type: string
          format: duration
          description: The length of time the plan is active for in ISO 8601.
          nullable: false
        price:
          type: object
          description: The price of the membership plan.
          nullable: false
          required:
            - amount
          properties:
            amount:
              type: integer
              format: int32
              minimum: 0
              nullable: false
              description: The amount of the plan in minor currency units.
        benefits:
          type: array
          nullable: false
          description: Describes the benefits associated with the membership plan.
          items:
            $ref: '#/components/schemas/CheckoutOptionsMembershipPlanBenefit'
            nullable: false
    CheckoutOptionsMembershipPlanBenefit:
      type: object
      description: Describes a benefit of the membership plan.
      required:
        - type
        - displayText
      properties:
        type:
          type: string
          nullable: false
          description: The type of the benefit. Currently the only possible value is `unlimitedFreeDelivery`, but more may be added in the future.
        displayText:
          type: string
          nullable: false
          description: Text to describe the benefit.
        restrictions:
          type: array
          nullable: true
          description: Restrictions on the benefit being purchased. Currently the only possible values are `partner` and `orderValue`, but more may be added in the future.
          items:
            $ref: '#/components/schemas/CheckoutOptionsRestriction'
            nullable: false
        additionalContent:
          nullable: true
          $ref: '#/components/schemas/CheckoutOptionsAdditionalContent'
    CheckoutOptionsMembershipSubscription:
      type: object
      description: Contains information concerning recurring payments for the membership, if applicable.
      required:
        - price
        - displayText
      properties:
        price:
          type: object
          nullable: false
          description: Information concerning the price of the recurring payment.
          required:
            - amount
            - displayText
          properties:
            amount:
              type: integer
              nullable: false
              description: The amount taken for the recurring payment, in minor currency units.
            displayText:
              type: string
              nullable: false
              description: The amount taken for the recurring payment, in the local currency.
        displayText:
          type: string
          nullable: false
          description: The name of the subscription. E.g. "Plus Premium Subscription".
    CheckoutOptionsMembershipTermsAndConditions:
      type: object
      description: Provides the terms and conditions associated with the membership plan.
      required:
        - url
      properties:
        url:
          type: string
          nullable: false
          description: The URL of the terms and conditions.
        consent:
          $ref: '#/components/schemas/CheckoutOptionsMembershipTermsAndConditionsConsent'
          nullable: true
    CheckoutOptionsMembershipTermsAndConditionsConsent:
      type: object
      description: Contains information relating to the terms and conditions which the customer must consent to when purchasing the membership.
      required:
        - required
        - displayText
      properties:
        required:
          type: boolean
          nullable: false
          description: Indicates whether the customer must consent to the terms and conditions before purchasing the membership.
        displayText:
          type: string
          nullable: false
          description: The display text which describes the action being taken by the customer. E.g. "I have read and agreed to the terms and conditions.".
        link:
          type: object
          nullable: true
          description: Data used to build a hyperlink for the terms and conditions. This is only used when rendering the T&C's URL as part of the Consent UI.
          required:
            - displayText
          properties:
            displayText:
              type: string
              nullable: false
              description: The text to display when rendering the T&C's url. E.g. "click here".
    CheckoutOptionsRestriction:
      type: object
      description: Restrictions applied to benefit.
      required:
        - type
        - displayText
      properties:
        type:
          type: string
          nullable: false
          description: The type of the restriction. Currently, the only values are `orderValue` or `partner`, but more may be added in the future.
        displayText:
          type: string
          nullable: false
          description: Text to describe the restriction.
        maximumAmount:
          type: integer
          format: int32
          nullable: true
          description: If set, the maximum amount that the benefit can apply to, in minor currency units.
        minimumAmount:
          type: integer
          format: int32
          nullable: true
          description: If set, the minimum amount that the benefit can apply to, in minor currency units.
    CheckoutOptionsTipping:
      type: object
      nullable: false
      description: |
        Details of the types of tip that can be applied when updating a checkout.
      required:
        - courier
      properties:
        courier:
          type: object
          nullable: false
          description: |
            Details of the types of courier tip that can be applied when updating a checkout.
          required:
            - isEnabled
          properties:
            isEnabled:
              type: boolean
              nullable: false
              description: Indicates whether courier tipping is available for this checkout (true) or not (false).
            fixedAmount:
              type: object
              nullable: true
              description: When set, indicates that fixed tip amounts are available.
              required:
                - options
              properties:
                options:
                  type: array
                  nullable: false
                  description: An array of fixed amount tipping options that should be offered.
                  minItems: 1
                  maxItems: 10
                  items:
                    type: object
                    nullable: false
                    description: A fixed amount tipping option that should be offered.
                    required:
                      - amount
                    properties:
                      amount:
                        type: number
                        nullable: false
                        description: The amount that can be tipped in minor currency units.
                        format: integer
                        minimum: 1
            customAmount:
              type: object
              nullable: true
              description: When set, indicates that custom tip amounts are available.
              required:
                - minimum
                - maximum
              properties:
                minimum:
                  type: number
                  nullable: false
                  description: The minimum custom amount that can be tipped in minor currency units.
                  format: integer
                  minimum: 1
                maximum:
                  type: number
                  nullable: false
                  description: The maximum custom amount that can be tipped in minor currency units.
                  format: integer
                  minimum: 1
    CheckoutOptionsVouchers:
      type: object
      nullable: true
      description: |
        Contains all applicable vouchers.
      required:
        - applicable
      properties:
        applicable:
          type: array
          nullable: false
          minItems: 0
          description: |
            List of all applicable voucher codes.
          items:
            type: object
            required:
              - code
            properties:
              code:
                type: string
                nullable: false
                description: Applicable voucher code.
    CheckoutPaymentsCheckoutNativePaymentsSummary:
      required:
        - label
