                    MaximumAdditionalModifiers: 0
        Title: Get free lemonade
        Description: Get free lemonade with Super Burger
        Header: Free item!
        OfferId: abf1234G
    BasketItemDiscountPromptItem:
      additionalProperties: false
      description: An Item discount prompt item
