          - $ref: '#/components/schemas/CheckoutPaymentsStatusAwaitingAction'
          - $ref: '#/components/schemas/CheckoutPaymentsStatusRejected'
          - $ref: '#/components/schemas/CheckoutPaymentsStatusAccepted'
          - $ref: '#/components/schemas/CheckoutPaymentsStatusFailed'
      type: object
      description: The status details for a payment.
      properties:
        code:
          description: The status code of the payment.
          type: string
          enum:
