            description: Should the channel be subscribed to?
            type: boolean
          dateUpdated:
            description: The date of the marketing preference change
            format: date-time
            type: string
          channelName:
            description: The channel name.
            enum:
              - Email
              - Push
              - Sms
            type: string
        type: object
      type: array
    ConsumersConsumerMarketingPreferencev2:
      properties:
        emailAddress:
