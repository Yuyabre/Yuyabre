                $ref: '#/components/schemas/DaasDaasInternalServerErrorException'
              example:
                error: InternalServerErrorException
                message: Internal error.
      servers:
        - url: https://<api-env>.skipthedishes.com
          description: Production URL <api-env = [api-daas, api-daas-produk]>
        - url: https://<api-env>.skipthedishes.com
          description: Testing URL <api-env = [api-daas-staging, api-daas-staguk]>
      x-component-name: daasdispatcher
      x-status: Stable
  /v1/delivery/simulate:
    post:
      tags:
        - Logistic Management
        - Define Delivery Plan
        - Delivery as a Service
        - publicly-accessible
      summary: Simulate delivery
      description: |
        This endpoint allows partners to simulate a mock DaaS delivery through its full life cycle without manual intervention. This initiates from assigning the delivery to a courier and advances through sequential fulfillment phases of the delivery, ending in a status of COMPLETED. Please note:
          - This endpoint is only available in dev and staging environments.
          - Simulate Delivery is not available in `EU`.
      operationId: v1DeliverySimulatePost
      security:
        - daas_jwt: []
      parameters:
        - name: User-Agent
          description: |
            Identifies the client application, library, or device making the API request. Typically includes the application name, version, and optionally the operating system or platform details. Example: `MyApp/1.0.0 (Linux; x86_64)`.
          schema:
            type: string
          in: header
          required: true
      requestBody:
        required: true
        description: Simulate Delivery.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaasDaasSimulateDeliveryRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaaSSimulateDeliveryResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaasDaasErrorException'
              example:
                error: EntityNotFoundException
