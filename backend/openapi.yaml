            - CANCELLED
            - CANCELLATION_FAILURE
          type: string
          description: The current status of a delivery.
          nullable: false
        deliveryId:
          type: string
          description: The ID associated with the delivery in the logistics network.  In cases where there are multiple deliveries for a DaaS request, this ID will uniquely identify the individual delivery.
          nullable: false
        orderId:
          type: string
          description: The order ID associated with the delivery.
          nullable: false
        requestId:
          type: string
          description: The request ID associated with the delivery.
          nullable: false
        vendorOrderId:
          type: string
          description: Order ID supplied by the partner on delivery creation referencing the order within their systems.  If this was not specified by the partner this will be an auto-generated number by JET.
          nullable: false
        poolingId:
          type: string
          description: If Single Partner Pooling is enabled, this will contain a unique identifier of the pooled deliveries.  Deliveries with a matching `poolingId` will be picked up by the same courier.
          nullable: true
        deliveryProperties:
          type: object
          description: Details about the additional properties associated with the delivery.
          required:
            - isReturn
          properties:
            isReturn:
              type: boolean
              description: A flag indicating whether the delivery is a return job. If `true`, the delivery is a return.
              nullable: false
            reasonForReturn:
              type: string
              description: This field specifies the reason for the return of a delivery. It will only be populated if the delivery is being returned.
              nullable: true
        orderTrackerURL:
          type: string
          description: The tracking URL for the delivery.  Note -- This is only available for the following markets [CA, BE, BG, DK, IT, NL, PL, ES, CH], otherwise the value will be `Not available`.
          nullable: false
        courier:
          type: object
          description: Details about the courier associated with the delivery.
          required:
            - name
          properties:
            id:
              type: string
              description: Id of the courier.  Note -- This is not currently available for the following markets and will be blank [BE, BG, DK, IT, NL, PL, ES, CH].
              nullable: false
            name:
              type: string
              description: Name of the courier.  Note -- This is not currently available for the following markets and will be blank [BE, BG, DK, IT, NL, PL, ES, CH].
              nullable: false
      example:
        status: DELIVERED
        deliveryId: 0d6e0120-9523-45ab-a142-c9cc47b7767e
        orderId: efeb46ce-53eb-44cd-afba-ba59e7b84a89
        requestId: e0d58b3a-f547-4013-a4e5-728263040f33
        vendorOrderId: '123456789'
        poolingId: f664be7a-6ffc-4287-8a7f-3e32beacc851
        orderTrackerURL: http://www.skipthedishes.com/order-tracker/efeb46ce-53eb-44cd-afba-ba59e7b84a89
        courier:
          id: 17cc81ef-d246-460a-a5d2-e4db506c17d7
          name: Example Courier
        deliveryProperties:
          isReturn: false
          reasonForReturn: null
    DaasDaaSDelcoNotification:
      type: object
      description: All Delco Notifications.
      title: Rest of World market supported notifications
      anyOf:
        - $ref: '#/components/schemas/DaasDaaSDeliveryCreatedResponse'
        - $ref: '#/components/schemas/DaasDaaSCourierResponse'
        - $ref: '#/components/schemas/DaasDaaSCourierCollectionTimeResponse'
        - $ref: '#/components/schemas/DaasDaaSCourierLocationResponse'
        - $ref: '#/components/schemas/DaasDaaSCancelJobStatusResponse'
        - $ref: '#/components/schemas/DaasDaaSCourierDeliveryTimeResponse'
        - $ref: '#/components/schemas/DaasDaaSProofOfDeliveryResponse'
        - $ref: '#/components/schemas/DaasDaaSPictureProofOfDeliveryResponse'
    DaasDaaSDeliveryAddress:
      type: object
      description: Delivery Point address.
      required:
        - name
        - emailAddress
        - phoneNumber
        - address
        - city
      properties:
        name:
          type: string
          description: Name of the recipient.
          nullable: false
          maxLength: 100
        emailAddress:
          type: string
          description: Email of the recipient.
          nullable: false
          maxLength: 100
        phoneNumber:
          type: string
          description: |
            Phone number of the recipient.

            A phone number can be represented in:
              - E.164 format e.g. +447777111111 or;
              - Local format of submitted tenant e.g. 07777111111.

            E.164 formatted phone numbers are preferred.
          nullable: false
          maxLength: 40
        address:
          type: string
          description: Address of the recipient.
          nullable: false
          maxLength: 255
        city:
          type: string
          description: City of the recipient’s address.
          nullable: false
          maxLength: 50
        province:
          type: string
          description: Province of the recipient.
          nullable: true
          maxLength: 50
        postalCode:
          type: string
          description: Postal code of the recipient’s address.
          nullable: true
          maxLength: 15
        geolocation:
          description: |
            Coordinates of the recipient’s address to be used for the delivery. **(Note: This is mandatory for the following markets [BE, BG, DK, IT, NL, PL, ES, CH])**
          nullable: true
          allOf:
            - $ref: '#/components/schemas/SharedGeoJsonPoint'
    DaasDaaSDeliveryCreatedResponse:
      type: object
      description: The Skip order number for a DaaS order.
      title: DeliveryCreated
      required:
        - deliveryId
        - requestId
        - orderNumber
        - vendorOrderId
        - deliveryProperties
      properties:
        deliveryId:
          type: string
          description: The ID associated with the delivery in the logistics network.  In cases where there are multiple deliveries for a DaaS request, this ID will uniquely identify the individual delivery.
          nullable: false
        requestId:
          type: string
          description: The request ID associated with the delivery.
          nullable: false
        orderNumber:
          type: integer
          description: Vendor Order ID supplied by the partner referencing the order within their systems. Note, if the partner does not supply this value, JET will auto-generate a number instead.  **Note -- Soon to be deprecated.**
          nullable: false
        vendorOrderId:
          type: string
          description: Order ID referencing the order. Note, this can be supplied by the partner. If the partner does not supply this value, JET will auto-generate a number instead.
          nullable: false
        deliveryProperties:
          type: object
          description: Details about the additional properties associated with the delivery.
          properties:
            isReturn:
              type: boolean
              description: A flag indicating whether the delivery is a return job. If `true`, the delivery is a return.
              nullable: false
            reasonForReturn:
              type: string
              description: This field specifies the reason for the return of a delivery. It will only be populated if the delivery is being returned.
              nullable: true
        metadata:
          type: object
          description: Key-value map of partner custom identifiers that were provided during delivery creation.
          nullable: true
      example:
        deliveryId: 0d6e0120-9523-45ab-a142-c9cc47b7767e
        requestId: 8a260fb7-6555-42e9-a4cb-9b64224dfac1
        orderNumber: 123456789
        vendorOrderId: '123456789'
        deliveryProperties:
          isReturn: false
          reasonForReturn: null
        metadata:
          platform: Simulator
          version: 1.9.6
          mode: test
    DaasDaaSDeliveryDetails:
      type: object
      description: Details about the items being delivered.
      properties:
        weightGrams:
          type: number
          format: double
          description: Total weight of the items being delivered, in grams.
          nullable: false
          minimum: 0
        preparationDuration:
          type: number
          format: int32
          description: Number of minutes required to prepare the delivery.
          nullable: false
          minimum: 5
          maximum: 60
        hasAlcohol:
          type: boolean
          description: Whether the order contains alcohol or not. If not specified, the default is `false`.  If this is `true`, `ageRestriction` is required for the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
        ageRestriction:
          type: number
          format: int32
          description: Customer age required in order to hand over delivery.  Note -- this is required if `hasAlcohol` is `true`.
          minimum: 0
          nullable: true
    DaasDaaSDeliveryOptions:
      type: object
      description: Details about the delivery options.
      properties:
        proofOfDelivery:
          description: Proof of delivery protection to be used for the request, such as PIN codes. Note -- this is currently not supported in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSProofOfDelivery'
        unreachablePreference:
          description: The courier's action when a customer cannot be reached. If not specified, the default is `DROP_OFF`. Note -- this is currently not supported in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
          enum:
            - DROP_OFF
            - RETURN
        proofOfPickup:
          description: Proof of pickup protection to be used for the request, such as barcodes. Note -- this is currently not supported in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSProofOfPickup'
        vehiclePreference:
          description: |
            Optional settings to enforce specific vehicle types for the delivery, such as car-only deliveries. If not provided, the next available courier will be assigned regardless of vehicle type. **Note: Currently not supported in the following markets [BE, BG, DE, IT, NL, PL, ES, CH].**
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSVehiclePreference'
    DaasDaaSDeliveryRejectedResponse:
      type: object
      description: Delivery Rejected request.
      title: DeliveryRejected
      required:
        - message
        - requestId
      properties:
        message:
          type: string
          description: Rejection reason. Note -- Only available in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: false
        requestId:
          type: string
          description: The request ID associated with the delivery.
          nullable: false
        metadata:
          type: object
          description: Key-value map of partner custom identifiers that were provided during delivery creation.
          nullable: true
      example:
        requestId: 4cd98e14-9902-4b13-a3c0-78004898af32
        message: Mandatory request parameter firstName is missing
        metadata:
          store_id: '2132546'
    DaasDaaSDeliveryRequest:
      type: object
      description: The delivery object.
      required:
        - requestId
      properties:
        requestId:
          type: string
          description: The ID of the request. This is generated from the [Estimate delivery](#tag/Delivery-as-a-Service/paths/~1delivery~1estimate/post) endpoint. The ID that was generated must be used within five minutes of a successful estimate, otherwise the ID will be considered expired. Once an ID has been used for a successful delivery creation, it cannot be reused thereafter.
          nullable: false
        specialInstructions:
          type: string
          description: Instructions about the delivery that the customer wants to submit.
          nullable: true
          maxLength: 275
        targetCollectTime:
          type: string
          description: Time in UTC when the partners wish to have the order collected from the restaurant. Required if target deliver time was not specified in the Estimate delivery request.
          format: date-time
          nullable: true
        tip:
          description: Tip paid to the courier for a delivery in cents
          nullable: true
          type: integer
          format: int32
          minimum: 0
          exclusiveMinimum: false
        orderValue:
          description: Total value of an order in cents.
          nullable: true
          type: integer
          format: int32
          minimum: 0
          exclusiveMinimum: false
        vendorOrderId:
          type: string
          description: Order ID supplied by the partner referencing the order within their systems. This will be mandatory in the following markets [BE, BG, DK, IT, NL, PL, ES, CH]. This should be a human-readable value as it will be displayed for the courier during the pickup process, and is strongly recommended not to be a UUID. Note, if the partner does not supply this value, JET will auto-generate a number instead.
          nullable: true
        paymentType:
          type: string
          description: Specify the preferred payment type for the delivery. Deliveries will either be PREPAID or COD (Cash on Delivery). If COD is chosen, please ensure that the price in the order value field includes all potential surcharges such as tax. **Note:** Cash on Delivery (COD) is currently supported only in the BG (Bulgaria) market.
          nullable: true
        metadata:
          type: object
          description: Key-value map of partner custom identifiers. These identifiers will be included in webhook notifications. Values cannot exceed 255 characters.
          nullable: true
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        specialInstructions: Double meat
        targetCollectTime: '2021-08-04T19:00:45.211Z'
        tip: 100
        orderValue: 2000
        vendorOrderId: '123456789'
        paymentType: PREPAID
        metadata:
          store_id: '2132546'
    DaasDaaSDeliveryResponse:
      type: object
      description: The estimated delivery.
      properties:
        requestId:
          type: string
          description: Unique Id used to identify the request.
          nullable: false
        collect:
          type: object
          description: Estimated date and time of order collection in UTC. Will only be returned if target deliver time was not specified.
          nullable: false
          properties:
            id:
              type: string
              description: The collect point Id.
              nullable: false
        delivery:
          type: object
          description: Delivery point used to identify the delivery address. Represents a customer, or any other delivery point.
          nullable: false
        targetDeliverTime:
          description: Time in UTC when the partners wish to have the order delivered to the customer.
          type: string
          format: date-time
        specialInstructions:
          description: Instructions about the delivery that the customer wants to submit.
          type: string
          nullable: true
          format: string
        tip:
          description: Tip paid to the courier for a delivery in cents
          nullable: true
          type: integer
          format: int32
          minimum: 0
          exclusiveMinimum: false
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        collect:
          id: efeb46ce-53eb-44cd-afba-ba59e7b84a57
        delivery:
          name: Delivery Point
          emailAddress: delivery.point@email.com
          phoneNumber: '+12049433578'
          address: 140 Bannatyne Ave
          city: Winnipeg
          province: Manitoba
          postalCode: R3B 3C5
        targetDeliverTime: '2021-12-20T15:25:33.339Z'
        specialInstructions: Double meat
        tip: 100
    DaasDaaSDeliveryStatusResponse:
      type: object
      description: The status of a delivery.
      properties:
        status:
          enum:
            - UNASSIGNED
            - ASSIGNED
            - IN_TRANSIT_TO_COLLECT
            - ARRIVED_TO_COLLECT
            - COLLECTED
            - IN_TRANSIT_TO_DELIVER
            - ARRIVED_TO_DELIVER
            - DELIVERED
            - RETURN_INITIATED
            - UNKNOWN
            - CANCELLED
            - CANCELLATION_FAILURE
          type: string
          description: The current status of a delivery.
          nullable: false
        orderId:
          type: string
          description: The order Id associated with the delivery.
          nullable: false
        vendorOrderId:
          type: string
          description: Order ID supplied by the partner on delivery creation referencing the order within their systems.  If this was not specified by the partner this will be an auto-generated number by JET.
          nullable: false
        orderTrackerURL:
          type: string
          description: The tracking URL for the delivery. Note -- This is only available in the CA market, otherwise the value will be `Not available`.
          nullable: false
        timestamp:
          description: The timestamp in UTC.
          type: string
          format: date-time
        metadata:
          type: object
          description: Key-value map of partner custom identifiers that were provided during delivery creation.
          nullable: true
      example:
        status: DELIVERED
        orderId: efeb46ce-53eb-44cd-afba-ba59e7b84a89
        vendorOrderId: '123456789'
        orderTrackerURL: http://www.skipthedishes.com/order-tracker/efeb46ce-53eb-44cd-afba-ba59e7b84a89
        timestamp: '2021-12-20T15:25:33.339Z'
        deliveryId: 0d6e0120-9523-45ab-a142-c9cc47b7767e
        deliveryProperties:
          isReturn: false
        metadata:
          store_id: '2132546'
    DaasDaaSEstimateRequest:
      type: object
      description: The estimate delivery object.
      required:
        - collect
        - delivery
      properties:
        collect:
          description: Collect point used to identify the pick-up address. Represents a restaurant, a grocery store, or any other collect point. The available collect points can be retrieved using the [Get Collect Points](#tag/Delivery-as-a-Service/paths/~1delivery~1collect-points/get) endpoint.
          nullable: false
          required:
            - id
          type: object
          properties:
            id:
              type: string
              description: The collect point Id.
              nullable: false
        delivery:
          description: Delivery point used to identify the delivery address. Represents a customer, or any other delivery point.
          nullable: false
          allOf:
            - $ref: '#/components/schemas/DaasDaaSDeliveryAddress'
        deliveryDetails:
          description: Optional information about the items included in this delivery.  Note -- this will be required for the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSDeliveryDetails'
        deliveryOptions:
          description: Optional settings pertaining to the delivery preferences.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSDeliveryOptions'
        targetDeliverTime:
          description: |
            Supply this parameter to set up an advance order. It is the time in UTC for which the order should be delivered to the customer. This value must be between 1 hour to 5 days in advance. You may only specify either the `targetCollectTime` or `targetDeliverTime` with an advance order request. **Note: Currently not supported for the following markets [BE, BG, DK, IT, NL, PL, ES, CH]**
          nullable: true
          type: string
          format: date-time
        targetCollectTime:
          description: |
            Supply this parameter to set up an advance order. It is the time in UTC for which the courier should arrive to collect the order. This value must be between 1 hour to 5 days in advance. You may only specify either the `targetCollectTime` or `targetDeliverTime` with an advance order request. **Note: Currently not supported for the following markets [BE, BG, DK, IT, NL, PL, ES, CH]**
          nullable: true
          type: string
          format: date-time
        hasAlcohol:
          description: This previous `hasAlcohol` flag can no longer be used.  If `true`, an error will be returned and the estimate will be discarded.  Use the `deliveryDetails.hasAlcohol` flag instead for orders with alcohol.
          nullable: true
          deprecated: true
          type: boolean
        itemList:
          description: List of item to be included in the delivery.  This is required if the `proofOfPickup` flag is present as a part of `deliveryOptions`.
          nullable: true
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/DaasDaaSItem'
      example:
        collect:
          id: efeb46ce-53eb-44cd-afba-ba59e7b84a57
        delivery:
          name: Delivery Point
          emailAddress: delivery.point@email.com
          phoneNumber: '+12049433578'
          address: 140 Bannatyne Ave
          city: Winnipeg
          province: Manitoba
          postalCode: R3B 3C5
          geolocation:
            coordinates:
              - -37.8156
              - 144.96292
            type: point
        deliveryDetails:
          weightGrams: 100
          preparationDuration: 30
          hasAlcohol: false
          ageRestriction: 0
        deliveryOptions:
          proofOfDelivery:
            pinCode:
              type: DSP_GENERATED
          unreachablePreference: DROP_OFF
          proofOfPickup:
            barcode:
              type: PARTNER_PROVIDED
        targetDeliverTime: '2021-12-20T15:25:33.339Z'
        itemList:
          - itemId: '1111'
            name: Item1
            quantity: 4
            barcode:
              type: UPC
              value: '3765532'
          - itemId: '1141'
            name: Item4
            quantity: 3
            barcode:
              type: UPC
              value: '376665532'
    DaasDaaSEstimateResponse:
      type: object
      description: The estimated delivery.
      properties:
        requestId:
          type: string
          description: Unique Id used to identify the request.
          nullable: false
        dynamicDeliveryFee:
          type: integer
          description: The cost of the estimated delivery in minor currency units.
          format: int32
          nullable: false
        dynamicDeliveryFeeRule:
          type: string
          description: The rule triggered based on the distance of the delivery, allowing a fee to be associated with the delivery.
          nullable: false
        estimatedEarliestCollectTime:
          type: string
          description: Estimated date and time of order collection in UTC. Will only be returned if `targetCollectTime` or `targetDeliverTime` was not specified (only for asap requests).
          format: date-time
          nullable: true
        estimatedEarliestDeliverTime:
          type: string
          description: Estimated date and time of order delivery in UTC. Will only be returned if `targetCollectTime` or `targetDeliverTime` was not specified (only for asap requests).
          format: date-time
          nullable: true
        targetCollectTime:
          type: string
          description: Targeted date and time of order collection in UTC if `targetCollectTime` or `targetDeliverTime` was specified (only for advance requests).
          format: date-time
          nullable: true
        targetDeliverTime:
          type: string
          description: Targeted date and time of order delivery in UTC if `targetCollectTime` or `targetDeliverTime` was specified (only for advance requests).
          format: date-time
          nullable: true
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        dynamicDeliveryFee: 350
        dynamicDeliveryFeeRule: 5MinuteDelivery
        estimatedEarliestCollectTime: '2021-12-20T15:25:33.339Z'
        estimatedEarliestDeliverTime: '2021-12-20T15:45:33.339Z'
    DaasDaaSItem:
      type: object
      description: Details about an item being delivered.
      properties:
        itemId:
          type: string
          format: varchar40
          description: Identification code of the item.  This must be unique within a delivery.
          nullable: false
          minimum: 1
        name:
          type: string
          format: varchar100
          description: Name of the item.
          nullable: false
          minimum: 1
        quantity:
          type: number
          format: int32
          description: Number of this item to be included in the delivery.
          nullable: false
          minimum: 1
        barcode:
          description: Barcode of the item.  If the `deliveryOptions.proofOfPickup` type for this delivery is `barcode`, this field is required.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaasItemBarcode'
    DaasDaaSNotificationConfigRequest:
      type: object
      description: The notification config object.
      required:
        - email
        - endpoint
        - secret
        - type
      properties:
        email:
          type: string
          description: Email of the partner to contact in case there are any issues with the notifications.
          nullable: false
        endpoint:
          type: string
          description: Partner's HTTPS endpoint to receive events and notifications. Make sure the endpoint is properly prefixed as we only support HTTPS (secure) URLs.
          nullable: false
        secret:
          type: string
          description: The token or password.
          nullable: false
        type:
          type: string
          description: Type of configuration.
          enum:
            - BASIC
            - TOKEN
          nullable: false
        username:
          type: string
          description: The username of the partner's credentials to store. Only required for type BASIC.
          nullable: true
        subscriptions:
          type: array
          description: List of notification events to subscribe to. The partner will be subscribed to all events if this parameter is not supplied. On the other hand, if an empty list is supplied, you will be unsubscribed from all events.
          items:
            type: string
            enum:
              - ALL
              - COURIERJOBSTATUS
              - CANCELJOBSTATUS
              - COURIERCOLLECTIONTIME
              - COURIERLOCATION
              - DELIVERYREJECTED
              - COURIERDELIVERYTIME
              - PROOFOFDELIVERY
              - PROOFOFDELIVERY_PICTURE
          nullable: true
      example:
        email: email@partner.com
        endpoint: endpoint-partner.ca/webhook
        secret: partner-password
        type: BASIC
        username: partner-username
        subscriptions:
          - COURIERJOBSTATUS
          - CANCELJOBSTATUS
    DaasDaaSNotificationConfigResponse:
      type: object
      description: The notification config object.
      properties:
        email:
          type: string
          description: Email of the partner to contact in case there are any issues with the notifications.
          nullable: false
        endpoint:
          type: string
          description: Partner's endpoint for events and notifications to be sent to.
          nullable: false
        type:
          type: string
          description: Type of configuration.
          nullable: false
        username:
          type: string
          description: The username of the partner's credentials to store. Only required for type BASIC.
          nullable: true
        subscriptions:
          type: array
          description: List of notification events partner is subscribed to.
          nullable: true
      example:
        email: email@partner.com
        endpoint: endpoint-partner.ca/webhook
        type: BASIC
        username: partner-username
        subscriptions:
          - CANCELJOBSTATUS
    DaasDaaSNotificationConfigWebhookRequest:
      type: object
      description: The webhook notification config object.
      required:
        - id
        - type
        - timestamp
        - data
      properties:
        id:
          type: string
          description: Event UUID
          nullable: false
        type:
          type: string
          description: Event Type
          nullable: false
          enum:
            - COURIERJOBSTATUS
            - CANCELJOBSTATUS
            - COURIERCOLLECTIONTIME
            - DELIVERYCREATED
            - COURIERLOCATION
            - DELIVERYREJECTED
            - COURIERDELIVERYTIME
            - PROOFOFDELIVERY
            - PROOFOFDELIVERY_PICTURE
        timestamp:
          description: The timestamp in UTC.
          type: string
          nullable: false
          format: date-time
        data:
          nullable: false
          anyOf:
            - $ref: '#/components/schemas/DaasDaaSDelcoNotification'
            - $ref: '#/components/schemas/DaasDaaSScooberNotification'
          description: |
            The following data is dispatched to the partner through the webhook endpoint.  Please note that `CourierLocation` is not presently available for the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
      example:
        id: ee70cb3c-d7fa-11ec-9d64-0242ac120002
        type: COURIERJOBSTATUS
        timestamp: '2021-12-20T15:25:33.339Z'
        data:
          status: DELIVERED
          requestId: e0d58b3a-f547-4013-a4e5-728263040f33
          orderId: efeb46ce-53eb-44cd-afba-ba59e7b84a89
          orderTrackerURL: http://www.skipthedishes.com/order-tracker/efeb46ce-53eb-44cd-afba-ba59e7b84a89
          courier:
            name: Example Courier
    DaasDaaSPictureProofOfDeliveryResponse:
      type: object
      description: Picture As A Proof Of Delivery.
      title: PictureAsProofOfDelivery
      required:
        - deliveryId
        - requestId
        - vendorOrderId
        - urls
      properties:
        deliveryId:
          type: string
          description: The ID associated with the delivery in the logistics network.  In cases where there are multiple deliveries for a DaaS request, this ID will uniquely identify the individual delivery.
          nullable: false
        requestId:
          type: string
          description: The request ID associated with the delivery.
          nullable: false
        vendorOrderId:
          type: string
          description: Order ID supplied by the partner on delivery creation referencing the order within their systems.  If this was not specified by the partner this will be an auto-generated number by JET.
          nullable: false
        urls:
          type: array
          description: The list of temporary links to the images of a delivered order, valid for five minutes.
          items:
            type: string
          nullable: false
        metadata:
          type: object
          description: Key-value map of partner custom identifiers that were provided during delivery creation.
          nullable: true
      example:
        requestId: 54352cd8-1c31-4480-9df1-398563a73699
        vendorOrderId: '123456789'
        deliveryId: 0d6e0120-9523-45ab-a142-c9cc47b7767e
        urls:
          - https://bucket.s3.amazonaws.com/454-d3a7-4e46?X-Amz-Security-Token=IQoJb3Z2&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Date=20250228T233313Z&X-Amz-SignedHeaders=host&X-Amz-Credential=ASIASL3FNW%2Fus-east-1%2Fs3%2Faws4_request&X-Amz-Expires=300&X-Amz-Signature=8609e0e3ae69b
        metadata:
          store_id: '2132546'
    DaasDaaSPinCode:
      type: object
      description: Details about the type of PIN code.
      properties:
        type:
          description: Type of PIN code provider. Currently, only delivery service provider generated PIN code is supported. Note -- this is currently not supported for the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: false
          enum:
            - DSP_GENERATED
    DaasDaaSProofOfDelivery:
      type: object
      description: Details about the PIN code.
      properties:
        pinCode:
          description: Protect this delivery with a PIN code, which the customer must provide to the courier upon delivery. Note -- this is currently not supported in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSPinCode'
    DaasDaaSProofOfDeliveryResponse:
      type: object
      description: Proof Of Delivery.
      title: ProofOfDelivery
      required:
        - deliveryId
        - requestId
        - pinCode
        - status
      properties:
        deliveryId:
          type: string
          description: The ID associated with the delivery in the logistics network.  In cases where there are multiple deliveries for a DaaS request, this ID will uniquely identify the individual delivery.
          nullable: false
        requestId:
          type: string
          description: The request ID associated with the delivery.
          nullable: false
        vendorOrderId:
          type: string
          description: Order ID supplied by the partner on delivery creation referencing the order within their systems. If this was not specified by the partner this will be an auto-generated number by JET.
          nullable: false
        pinCode:
          type: string
          description: The PIN code generated for proof of delivery.
          nullable: true
        status:
          enum:
            - CREATED
            - VALID
            - INVALID
          type: string
          description: The status of the PIN code is defined as follows`:` CREATED indicates that a PIN code has been generated, VALID indicates that the PIN code has been successfully validated, and INVALID indicates that the validation of the PIN code has failed.
          nullable: false
        metadata:
          type: object
          description: Key-value map of partner custom identifiers that were provided during delivery creation.
          nullable: true
      example:
        requestId: 54352cd8-1c31-4480-9df1-398563a73699
        deliveryId: 0d6e0120-9523-45ab-a142-c9cc47b7767e
        vendorOrderId: '123456789'
        pinCode: '1234'
        status: CREATED
        metadata:
          store_id: '2132546'
    DaasDaaSProofOfPickup:
      type: object
      description: Details about the Barcode.
      properties:
        barcode:
          description: Use barcode scanning as a proof of pickup for this delivery.  If this option is selected, barcode values must be provided in the `itemList`.  Note -- this is feature currently not supported in the following markets [BE, BG, DK, IT, NL, PL, ES, CH].
          nullable: true
          allOf:
            - $ref: '#/components/schemas/DaasDaaSBarcode'
    DaasDaaSScooberNotification:
      type: object
      description: All Scoober Notifications.
      title: BE, BG, DK, IT, NL, PL, ES, CH market supported notifications
      anyOf:
        - $ref: '#/components/schemas/DaasDaaSDeliveryCreatedResponse'
        - $ref: '#/components/schemas/DaasScooberCourierResponse'
        - $ref: '#/components/schemas/DaasDaaSCourierCollectionTimeResponse'
        - $ref: '#/components/schemas/DaasDaaSCancelJobStatusResponse'
        - $ref: '#/components/schemas/DaasDaaSDeliveryRejectedResponse'
        - $ref: '#/components/schemas/DaasDaaSCourierDeliveryTimeResponse'
    DaasDaaSSimulateDeliveryResponse:
      type: object
      description: The simulated delivery response.
      properties:
        requestId:
          type: string
          description: Unique Id used to identify the request.
          nullable: false
        message:
          type: string
          description: The message related to the processing of the delivery simulation request.
          nullable: false
      example:
        requestId: 9f84ce96-69e4-4122-8250-b17c0e92dd25
        message: The delivery simulation request is being processed right now.
    DaasDaaSUpdateNotificationConfigRequest:
      type: object
      description: The update notification config object.
      properties:
        email:
          type: string
          description: Email of the partner to contact in case there are any issues with the notifications.
          nullable: true
        endpoint:
          type: string
          description: Partner's HTTPS endpoint to receive events and notifications. Make sure the endpoint is properly prefixed as we only support HTTPS (secure) URLs.
          nullable: true
        secret:
          type: string
          description: The token or password.
          nullable: true
        type:
          type: string
          description: Type of configuration.
          enum:
            - BASIC
            - TOKEN
          nullable: true
        username:
          type: string
          description: The username of the partner's credentials to store. Only required for type BASIC.
          nullable: true
        subscriptions:
          type: array
          description: List of notification events to subscribe to.
          items:
            type: string
            enum:
              - ALL
              - COURIERJOBSTATUS
              - CANCELJOBSTATUS
              - COURIERCOLLECTIONTIME
              - COURIERLOCATION
              - DELIVERYREJECTED
              - COURIERDELIVERYTIME
              - PROOFOFDELIVERY
              - PROOFOFDELIVERY_PICTURE
          nullable: true
      example:
        subscriptions:
          - COURIERJOBSTATUS
          - CANCELJOBSTATUS
    DaasDaaSVehiclePreference:
      type: object
      properties:
        carOnly:
          description: |
            If `true`, the delivery will be assigned only to couriers using cars. If `false`, the next available courier will be assigned regardless of vehicle type, based on the partner's preferences.
          type: boolean
          nullable: false
          default: false
    DaasDaasConnectTokenRequest:
      required:
        - grant_type
      properties:
        grant_type:
          description: The OAuth2 grant type. This must be set to "client_credentials"
          enum:
            - client_credentials
          type: string
    DaasDaasErrorException:
