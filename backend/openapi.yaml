    DiscoveryDiscoveryByGtinResponse:
      allOf:
        - properties:
            partners:
              type: array
              description: An array of partners who stock a GTIN which is available.
              items:
                type: object
                properties:
                  restaurantId:
                    type: string
                    description: The id of the restaurant.
                    nullable: false
                  name:
                    type: string
                    description: The display name of the restaurant.
                    nullable: false
                  uniqueName:
                    type: string
                    description: The restaurant name in slug format.
                    nullable: true
                  gtin:
                    type: string
                    description: The Global Trade Item Number. Used to search for a specific item which a restaurant if offering for sale.
                    nullable: false
                  deliveryEtaMinutes:
                    type: object
                    description: Estimate for the restaurant delivery times.
                    nullable: true
                    properties:
                      approximate:
                        description: The approximate delivery time in minutes.
                        type: number
                      rangeLower:
                        type: number
                        description: The earliest delivery time in minutes.
                      rangeUpper:
                        type: number
                        description: The latest delivery time in minutes.
                  isCollection:
                    type: boolean
                    description: True if the restaurant offers collection.
                    nullable: false
                  isDelivery:
                    type: boolean
                    description: True if the restaurant offers delivery.
                    nullable: false
                  isOpenNowForCollection:
                    type: boolean
                    description: True if the restaurant is open for collection now.
                    nullable: false
                  isOpenNowForDelivery:
                    type: boolean
                    description: True if the restaurant is open for delivery now.
                    nullable: false
                  isOpenNowForPreorder:
                    type: boolean
                    description: True if the restaurant is open for pre-orders now.
                  isTemporarilyOffline:
                    type: boolean
                    description: True if the restaurant is offline temporarily.
                    nullable: false
                  isPremier:
                    type: boolean
                    description: True if the restaurant is a premier restaurant (otherwise known as a Local Legend in the UK).
                    nullable: false
                  isTestRestaurant:
                    type: boolean
                    description: True if the restaurant is for testing.
                    nullable: false
                  availability:
                    type: object
                    description: The availability details of an item by service type.
                    nullable: false
                    properties:
                      delivery:
                        $ref: '#/components/schemas/DiscoveryServiceAvailability'
                        nullable: true
                      collection:
                        $ref: '#/components/schemas/DiscoveryServiceAvailability'
                        nullable: true
                  deliveryFees:
                    type: object
                    description: Information related to delivery fees.
                    nullable: true
                    properties:
                      minimumOrderValue:
                        type: number
                        description: The minimum order value (excluding fees) required, in the smallest unit of local currency (e.g. pence).
                      bands:
                        type: array
                        description: Collection of delivery fee bands.
                        items:
                          type: object
                          properties:
                            minimumAmount:
                              type: number
                              description: The minimum order value (excluding fees) when this fee band applies. The fee with the highest `minimumAmount` that is less than or equal to order value applies. This is in the smallest unit of local currency (e.g. pence).
                            fee:
                              type: number
                              description: The delivery fee, in the smallest unit of local currency (e.g. pence).
        - $ref: '#/components/schemas/PagingPagedAfterOnlyCursorResponse'
      example:
        partners:
          - restaurantId: '298668'
            name: Sainsbury's - Bath
            uniqueName: sainsbury-supermarket-bath
            gtin: '12345678901234'
            deliveryEtaMinutes:
              rangeLower: 10
              rangeUpper: 25
            isCollection: false
            isDelivery: true
            isOpenNowForCollection: false
            isOpenNowForDelivery: true
            isOpenNowForPreorder: false
            isTemporarilyOffline: false
            isPremier: false
            isTestRestaurant: false
            availability:
              delivery:
                isOpen: false
                canPreOrder: true
                nextAvailability:
                  from: '2023-03-21T11:32:00'
                isTemporarilyOffline: false
              collection:
                isOpen: false
                canPreOrder: true
                nextAvailability:
                  from: '2023-03-21T12:00:00'
                isTemporarilyOffline: false
            deliveryFees:
              minimumOrderValue: 1000
              bands:
                - minimumAmount: 1000
                  fee: 250
                - minimumAmount: 3000
                  fee: 0
        paging:
          cursors:
            after: '1234567890'
