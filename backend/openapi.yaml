              rank:
                description: |-
                  The relative rank of this candidate restaurant in relation to others in the response. 
                  For Promoted Placement - a smaller number indicates that this restaurant should be shown closer to the beginning of the list.
                  For Top Rank - a smaller number indicates that this restaurant has the bigger boosting score value. This value should be between 0 and 1.
