      description: The service fee details object of a restaurant. It contains a set of service fees configured for a given restaurant.
      properties:
        serviceFees:
          description: Contains a set of ServiceFee objects with id, amount, description, type, category, etc.
          nullable: true
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The id of the ServiceFee.
                nullable: false
              amount:
                type: number
                format: double
                description: The amount of the ServiceFee.
                nullable: false
              description:
                type: string
                description: The description of the ServiceFee.
                nullable: false
              type:
                $ref: '#/components/schemas/RestaurantfeesServiceFeeType'
              category:
                $ref: '#/components/schemas/RestaurantfeesServiceFeeCategory'
              startDate:
                type: number
                format: long
                description: The startDate timestamp of the ServiceFee.
                nullable: true
              endDate:
                type: number
                format: long
                description: The endDate timestamp of the ServiceFee.
                nullable: true
              filters:
                type: array
                description: Only when ServiceFeeType is PERCENT or FLAT_RATE, it would have a set of Filter property.
                nullable: true
                items:
                  $ref: '#/components/schemas/RestaurantfeesFilter'
              feeComponents:
                type: array
                description: Only when ServiceFeeType is PERCENT, it would have a set of FeeComponent property.
                nullable: true
                items:
                  $ref: '#/components/schemas/RestaurantfeesFeeComponent'
      example:
        serviceFees:
          - id: 691e7fd6-082c-4fea-bafa-2e9950891a5d
            amount: 99
            description: SkipTheDishes Service Fee
            type: FLAT_RATE
            category: REVENUE_SHARE
            startDate: 3600000
            filters:
              - orderMethod: CALL_IN
                orderType: DELIVERY
                paymentType: CREDIT_CARD
              - orderType: PICKUP
                paymentType: INTERAC_ONLINE
                orderMethod: ONLINE
          - id: 2ab9ad00-1034-4c38-b0d0-11460a316f4e
            amount: 10
            description: SkipTheDishes Service Fee
            type: PERCENT
            category: REVENUE_SHARE
            startDate: 3600000
            filters:
              - orderMethod: CALL_IN
                orderType: DELIVERY
                paymentType: CREDIT_CARD
              - orderType: PICKUP
                paymentType: INTERAC_ONLINE
                orderMethod: ONLINE
            feeComponents:
              - SUBTOTAL
          - id: 6329402c-0c97-4d16-adf3-6b781bfc6680
            amount: 25
            description: SkipTheDishes Service Fee
            type: PERCENT
            category: REVENUE_SHARE
            startDate: 3600000
            filters:
              - orderMethod: CALL_IN
                orderType: DELIVERY
                paymentType: CREDIT_CARD
            feeComponents:
              - SUBTOTAL
