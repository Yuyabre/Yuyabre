        accessCode:
          description: The One Time Access Code (OTAC).
          type: string
      example:
        expiry: '2021-01-20T19:35:13.6430000+00:00'
        accessCode: 8It2lEaJjG82nJtxO00Iab0CoF0=
    ConsumersVerifyConsumerOperation:
