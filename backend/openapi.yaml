        - queryId
        - customerAccountType
    ClaimsauthenticityserviceClaimRecommendationResponsePayload:
      type: object
      description: Represent the response object of a successful recommendation request
      properties:
        recommendationAction:
          type: string
          description: Recommendation on whether the customer should be refunded or not
          enum:
            - allow
            - manual
            - prevent
        signals:
          type: object
          description: The result of the many input signals considered when making recommendations
          properties:
            ravelinRecommendation:
              type: string
              description: Recommendation from Ravelin
              enum:
                - allow
                - manual
                - prevent
            customerSegment:
              type: string
              description: Customer segment classification
              enum:
                - unknown
                - none
                - goldProtect
                - silverProtect
            validProofOfDelivery:
              type: boolean
              description: Whether valid proof of delivery exists
            photoVerificationResult:
              type: object
              description: Results from photo verification process
              properties:
                photoVerificationRecommendationAction:
                  type: string
                  description: Recommendation action from photo verification
                  enum:
                    - allow
                    - manual
                    - prevent
                    - ignore
                claims:
                  type: array
                  description: List of claims from photo verification
                  items:
                    type: object
                    properties:
                      checks:
                        type: array
                        description: List of verification checks performed
                        items:
                          type: object
                          properties:
                            checkType:
                              type: string
                              description: Type of check performed
                              enum:
                                - googleReverseImageCheck
                                - aiImageVerificationCheck
                                - unknown
                            confidence:
                              type: number
                              description: Confidence score of the check
                              minimum: 0
                              maximum: 1
                      comment:
                        type: string
                        description: Comment about the claim
                      reason:
                        type: string
                        description: Reason for the claim result
                      itemId:
                        type: string
                        description: Id of the item being verified
                      evidence:
                        type: array
                        description: Evidence supporting the claim
                        items:
                          type: string
      required:
        - recommendationAction
      example:
        recommendationAction: allow
        signals:
          ravelinRecommendation: allow
          customerSegment: goldProtect
          validProofOfDelivery: true
          photoVerificationResult:
            photoVerificationRecommendationAction: manual
            claims:
              - checks:
                  - checkType: aiImageVerificationCheck
                    confidence: 0.85
                  - checkType: googleReverseImageCheck
                    confidence: 0.92
                comment: Item appears to match the order description
                reason: Photo verification successful with high confidence
                itemId: item_12345
                evidence:
                  - https://example.com/evidence/photo1.jpg
                  - https://example.com/evidence/photo2.jpg
    ClaimsauthenticityserviceDisputeRecommendationResponse:
      type: object
      description: Represents the partner dispute recommendation issued for a specific Order Id and refund Query Id
      properties:
        recommendationAction:
          type: string
          description: Recommendation on whether the partner dispute should be accepted or not
          enum:
            - allow
            - manual
            - prevent
        signals:
          type: object
          description: The result of the many input signals considered when making recommendations
          properties:
            photoEvidenceValidated:
              type: object
              description: The recommendation for dispute resolution based on photo evidence
              properties:
                recommendationAction:
                  type: string
                  description: Recommendation on whether the partner dispute should be accepted or not for the parent signal
                  enum:
                    - allow
                    - manual
                    - prevent
                source:
                  type: string
                  description: The source of the recommendation for this signal
                  enum:
                    - automation
                    - agent
            partnerDisputeRates:
              type: object
              description: The recommendation for dispute resolution based on partner dispute rates
              properties:
                recommendation:
                  type: string
                  description: Recommendation on whether the partner dispute should be accepted or not for the partner dispute rates signal
                  enum:
                    - allow
                    - manual
                    - prevent
                clawbackRate:
                  type: number
                  format: double
                  description: The clawback rate for the partner
                  minimum: 0
                  maximum: 1
                disputeRate:
                  type: number
                  format: double
                  description: The dispute rate for the partner
                  minimum: 0
                  maximum: 1
      example:
        recommendationAction: allow
        signals:
          photoEvidenceValidated:
            recommendationAction: allow
            source: automation
          partnerDisputeRates:
            recommendation: allow
            clawbackRate: 0
            disputeRate: 0
