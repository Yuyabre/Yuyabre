          format: date-time
          example: '2018-10-11T14:56:18.234284+01:00'
        nextAvailableAt:
          description: Date time in ISO8601 format of when the item becomes available again. This field is applicable only for UNAVAILABLE event type. Must be in the future.
          type: string
          format: date-time
          example: '2018-10-11T14:56:18.234284+01:00'
    JetConnectMenusUtfConnectorManufacturer:
      description: Legal requirement to display on front end
      type: object
      required:
        - name
        - brand
        - country_of_origin
      properties:
        name:
