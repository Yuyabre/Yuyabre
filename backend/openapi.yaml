    LowestproductpriceLowestProductPrice:
      description: Lowest Product Price information.
      type: object
      title: LowestProductPrice
      additionalProperties: false
      required:
        - productId
        - sinceDate
      properties:
        productId:
          nullable: false
          description: The unique identifier of product
          type: string
        sinceDate:
          nullable: false
          description: The starting date of product price analysis
          format: date
          type: string
        currency:
          nullable: true
          description: The currency code in ISO-4217 format e.g. GBP.
          type: string
        deliveryPrice:
          nullable: true
          description: Delivery Price
          $ref: '#/components/schemas/LowestproductpricePriceDate'
        collectionPrice:
          nullable: true
          description: Collection Price
          $ref: '#/components/schemas/LowestproductpricePriceDate'
    LowestproductpriceLowestProductPriceListResponse:
      description: List of lowest product prices
      additionalProperties: false
      type: object
      title: LowestProductPriceListEnvelope
      properties:
        data:
          nullable: false
          description: Array of lowest product prices
          type: array
          items:
            $ref: '#/components/schemas/LowestproductpriceLowestProductPrice'
      example:
        data:
          - productId: delivery-only-burger-id
            sinceDate: '2022-03-07'
            currency: GBP
            deliveryPrice:
              value: 1580
              date: '2022-03-20'
              savingPercentage: 0
              savingValue: 0
          - productId: collection-only-pizza-id
            sinceDate: '2022-03-07'
            currency: GBP
            collectionPrice:
              value: 1780
              date: '2022-03-22'
              savingPercentage: 10
              savingValue: 200
          - productId: collection-and-delivery-drink-id
            sinceDate: '2022-03-07'
            currency: GBP
            collectionPrice:
              value: 10
              date: '2022-03-27'
              savingPercentage: 20
              savingValue: 250
            deliveryPrice:
              value: 20
              date: '2022-03-21'
              savingPercentage: 20
              savingValue: 500
    LowestproductpricePriceDate:
      description: The price value at certain date
      additionalProperties: false
      type: object
      title: Price Date
      required:
        - value
        - date
        - savingPercentage
        - savingValue
      properties:
        value:
          description: Price money value in the smallest unit of local currency
          format: integer
          type: number
          minimum: 0
        date:
          nullable: false
          description: The date when price was set
          format: date
          type: string
        savingPercentage:
          description: Customer savings in percentage terms. The value is calculated as the difference between the current discounted price and the lowest price in the past. The equivalent in money is provided in `savingValue`. For zero and negative savings 0 will be returned.
          format: float
          type: number
          minimum: 0
          maximum: 100
        savingValue:
          description: Money value of savings between the current discounted price and lowest price in the past, in the smallest unit of local currency, e.g., $3.25 will be returned as 325. The equivalent in percentage is provided in `savingPercentage`. For zero and negative savings 0 will be returned.
          format: integer
          type: number
          minimum: 0
      example:
        value: 1580
        date: '2021-03-04'
        savingPercentage: 10
        savingValue: 500
    MarketingAggregatedMenuEnvelope:
