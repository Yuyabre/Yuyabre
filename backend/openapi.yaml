    RestaurantsProductTypes:
      type: array
      description: An array of tags that represent the type or properties of the variation. Supported values are `aerosolPaint`, `alcohol`, `antihistamines`, `babyFormula`, `cannabidiol`, `cannabis`, `christmasCracker`, `cigarettePapers`, `codeine`, `coldFlu`, `corrosive`, `decongestants`, `drink`, `energyDrink`, `hfss`, `lighterFuel`, `mature`, `medicine`, `nicotine`, `packagedFood`, `packaging`, `painKillers`, `pharmacyControlled`, `ratedMedia12`, `ratedMedia14`, `ratedMedia15`, `ratedMedia16`, `ratedMedia17`, `ratedMedia18`, `ratedMedia19`, `ratedMediaPG`, `ratedMediaR`, `ratedMediaU`, `restaurantPreparedFood`, `sedatives`, `sensitive`, `soldByNetQuantity`, `solvent`, `tobacco`, `vapingProduct`
      items:
        type: string
      uniqueItems: true
      minItems: 0
      nullable: true
    RestaurantsQuantityRestriction:
      type: object
      description: |-
        Specifies quantity restriction rules applicable to variations, ensuring that customers can purchase any variations listed in `variationIds`,
        but not more than the specified maximum total quantity for all variations combined.
      required:
        - id
        - name
        - maximum
        - restrictedVariations
      properties:
        id:
          description: The ID of the quantity restriction.
          type: string
          minLength: 1
        name:
          description: The name of the quantity restriction.
          type: string
          minLength: 1
        maximum:
          description: The maximum quantity allowed within a quantity restriction.
          type: number
          format: decimal
          minimum: 0
          exclusiveMinimum: true
        restrictedVariations:
          description: Identifies variations that are subject to quantity restriction rules and the quantity that they contribute to the maximum limit.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RestaurantsRestrictedProduct'
          nullable: false
      example:
        id: '123'
        name: Paracetamol
        maximum: 2
        restrictedVariations:
          - id: '111'
            contributingQuantity: 1
          - id: '222'
            contributingQuantity: 1
          - id: '333'
            contributingQuantity: 1
    RestaurantsQuantityUnit:
      description: Unit representing a quantity
      type: string
      enum:
        - g
        - kcal
        - kg
        - kJ
        - l
        - mg
        - ml
        - mmoles
    RestaurantsQuantityValue:
      type: object
      additionalProperties: true
      description: Represents the quantity of nutritional content.
      required:
        - value
      properties:
        value:
          type: number
          format: decimal
          minimum: 0
          description: The value representing the quantity of the nutrient
          nullable: false
        lessThan:
          type: boolean
          description: Indicates that the quantity is less than the specified value, e.g. <0.5g of fibre.
          nullable: true
    RestaurantsReferenceQuantity:
      description: Represents a reference quantity
      additionalProperties: true
      required:
        - unit
        - quantity
      properties:
        unit:
          description: The unit used to represented the reference quantity.
          $ref: '#/components/schemas/RestaurantsQuantityUnit'
        quantity:
          description: The value of the reference quantity.
          $ref: '#/components/schemas/RestaurantsQuantityValue'
    RestaurantsRestaurantBankDetails:
