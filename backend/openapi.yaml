      properties:
        DiscountPercentage:
          description: The discount percentage applied.
          format: integer
          type: number
          minimum: 1
          maximum: 100
        ProductId:
          description: The unique identifier of the discounted product item.
          type: string
        ModifierGroups:
          nullable: true
          minLength: 1
          items:
            $ref: '#/components/schemas/BasketModifierGroup'
          description: The collection of preselected modifier groups for the item.
          type: array
      example:
        ProductId: Lemonade1234
        DiscountPercentage: 100
        ModifierGroups:
          - ModifierGroupId: modifier111
            MinimumChoices: 1
            Modifiers:
              - ModifierId: NoSugar11
                Quantity: 1
                TotalPrice: 0
                MaximumAdditionalModifiers: 0
    BasketItemSubstitution:
