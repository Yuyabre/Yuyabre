    PartnersignupCreateShellRequestStatus:
      type: object
      description: Information about create partner shell request
      properties:
        status:
          description: Status of create partner shell request
          type: string
          enum:
            - pending
            - completed
            - failed
        partnerId:
          description: The Id of the Partner created
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              description:
                description: Specific details about the error that may assist you in resolving the issue
                type: string
              error:
                description: A small title for the error that gives code or name that identifies the problem type.
                type: string
      example:
        status: failed
        partnerId: '12345678'
        errors:
          - description: User Name should be at least 3 characters long.
            error: ValidationError
          - description: The email address provided is already in use.
            error: DataError
    PartnersignupCreateSignupRequest:
      required:
        - brandName
        - givenName
        - familyName
        - phoneNumber
        - emailAddress
        - premisesAddress
        - primaryCuisine
      type: object
      description: Information used to create a Partner shell creation request.
      properties:
        brandName:
          description: The name of partner's business.
          type: string
          maxLength: 512
        givenName:
          description: Applicant's first name
          type: string
          maxLength: 255
        familyName:
          description: Applicant's last name
          type: string
          maxLength: 255
        phoneNumber:
          description: Applicant's phone number in E.164 format.
          type: string
          maxLength: 20
        emailAddress:
          description: Applicant's email address
          type: string
          maxLength: 320
        premisesAddress:
          $ref: '#/components/schemas/PartnersignupAddress'
        primaryCuisine:
          description: Partner's primary cuisine
          type: string
          maxLength: 255
        secondaryCuisine:
          description: Partner's secondary cuisine
          type: string
          maxLength: 255
      example:
        brandName: ACME Ltd.
        givenName: Jane
        familyName: Doe
        phoneNumber: '+447700900999'
        emailAddress: jane.doe@example.com
        premisesAddress:
          street:
            - Unit 1
            - High Road
          city: London
          postcode: AR51 1ET
          state: London
          country: United Kingdom
          geolocation:
            coordinates:
              - 51.501285
              - -0.142442
            type: point
        primaryCuisine: Pizza
        secondaryCuisine: Burgers
    PartnersignupDocument:
