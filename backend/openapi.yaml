        mfa_token:
          description: The MFA token
          type: string
        otp:
          maxLength: 10
          description: The One Time Password
          type: string
      example:
        mfa_token: some_mfa_token
        otp: ABC123
      type: object
    CourierFeedbackCourierFeedbackRequest:
      required:
        - isPositiveFeedback
      properties:
        additionalComment:
          maxLength: 210
          nullable: true
          description: An additional free form comment accompanying the feedback
          type: string
        isPositiveFeedback:
          description: A flag to determine if the feedback is overall positive
          type: boolean
        reasons:
          nullable: false
          items:
            type: string
          description: A list of reasons describing the feedback
          type: array
      example:
        additionalComment: Went above and beyond
        isPositiveFeedback: true
        reasons:
          - had thermal bag
          - friendly
      type: object
    CourieractivityserviceErrorReason:
      description: |2
          Provides specific reasons for an API error, allowing clients to handle different error types programmatically.
          - `forbidden`: The user does not have the necessary permissions for the resource.
          - `invalidDate`: A provided date string does not conform to the expected format.
        Example: Providing '22-07-2025' when '2025-07-22' is expected.
          - `dateRangeExceeded`: The requested date range's duration is larger than the maximum allowed limit.
        Example: Requesting 90 days of data when the limit is 31.
          - `invalidDateRange`: The provided date range is logically impossible.
        Example: The 'startDate' (2025-07-22) is after the 'endDate' (2025-07-20).
      enum:
        - badRequest
        - dateRangeExceeded
        - forbidden
        - invalidDate
        - invalidDateRange
        - notFound
      type: string
    CourieractivityserviceErrorResponse:
      type: object
      properties:
        reason:
          description: A short, machine-readable error code
          type: string
          anyOf:
            - $ref: '#/components/schemas/CourieractivityserviceErrorReason'
            - type: string
    CourieractivityserviceInstant:
      format: date-time
      type: string
      example: '2022-03-10T16:15:50Z'
    CourieractivityserviceMoney:
      required:
        - currencyCode
        - amount
      type: object
      properties:
        currencyCode:
          description: Three-letter currency code as defined by the [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) standard (e.g., USD, EUR, GBP)
          type: string
          example: EUR
        amount:
          format: double
          description: Amount of money expressed in the specified currency
          type: number
          example: 10.85
    CourieractivityserviceStatistic:
      required:
        - tipsEarned
        - cashCollected
        - ordersDelivered
      type: object
      properties:
        tipsEarned:
          description: 'Tips earned in the date range. This field is null if the data is not available (e.g. because tips settings are disabled). Note: If tips earned is zero, you will receive `{ tipsEarned: { amount: 0, ... }}` and *not* null.'
          type: object
          allOf:
            - $ref: '#/components/schemas/CourieractivityserviceMoney'
          nullable: true
        cashCollected:
          description: 'Cash collected in the date range. This field is null if the data is not available. Note: If cash collected is zero, you will receive `{ cashCollected: { amount: 0, ... }}` and *not* null.'
          type: object
          allOf:
            - $ref: '#/components/schemas/CourieractivityserviceMoney'
          nullable: true
        ordersDelivered:
          format: int32
          description: Orders delivered in the date range.
          type: integer
          example: 5
    CourieractivityserviceSummariesResponse:
      required:
        - summaries
      type: object
      properties:
        summaries:
          description: Contains the activities summaries for each restaurant where the courier made a delivery during the current month.
          type: array
          items:
            $ref: '#/components/schemas/CourieractivityserviceSummary'
    CourieractivityserviceSummary:
      required:
        - restaurantName
        - restaurantId
        - showTips
        - statistic
      type: object
      properties:
        restaurantName:
          description: Name of the restaurant
          type: string
          example: Sahara Super Sushi Pizza
        restaurantId:
          description: Unique identifier for the restaurant
          type: string
          example: '9565322'
        showTips:
          description: Boolean indicating if tips are enabled for this restaurant
          type: boolean
          example: true
        statistic:
          description: |
            Statistic can be null if no activity is present. In other words, null statistic
            represents the fact that all fields (`deliveredOrders`, `tipsEarned`) are zero:
            ```json
            { deliveredOrders: 0, tipsEarned: 0, cashCollected: 0, ... }
            ```
          type: object
          allOf:
            - $ref: '#/components/schemas/CourieractivityserviceStatistic'
          nullable: true
