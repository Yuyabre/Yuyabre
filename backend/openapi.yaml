        Name:
          type: string
          description: The name
        ProductId:
          type: string
          description: The product id
      type: object
    BasketItemDiscount:
      additionalProperties: false
      description: Details of an Item discount
      type: object
      title: ItemDiscount
      properties:
        OfferId:
          description: The unique identifier of underlying consumer offers
          nullable: false
