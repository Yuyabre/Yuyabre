    DiscoveryRestaurantsV3BannerItem:
      title: Banner Item
      type: object
      required:
        - source
        - type
        - title
        - theme
        - imageUrl
        - primaryAction
      properties:
        source:
          description: |
            The source of the banner. This is used by clients for tracking purposes.
            Known values:
              * `braze` - A braze campaign banner.
              * `config` - A configuration-driven banner which can be used as fallback if Braze fails.
          type: string
        type:
          description: |
            The type of the banner used for styling.
            Known values:
              * `slimBold` - Two lines of heading (title) + one line of subtext (message) or an action.
              * `slimCta` - One line of heading (title) + one action + optional one line of subtext (message).
              * `slimInfo` - One line of heading (title) + one / two lines of subtext (message).
          type: string
        title:
          description: The title for the banner.
          type: string
        message:
          description: The message for the banner.
          type: string
        theme:
          description: The theme style for the banner.
          type: string
        imageUrl:
          description: URL for the banner image.
          type: string
          format: uri
        primaryAction:
          type: object
          $ref: '#/components/schemas/DiscoveryRestaurantsV3BannerItemAction'
        modal:
          description: Information about the modal for the banner.
          type: object
          required:
            - title
            - message
          properties:
            title:
              description: Title for the modal.
              type: string
            message:
              description: Message for the modal.
              type: string
            imageUrl:
              description: Image URL for the modal.
              type: string
              format: uri
            primaryAction:
              type: object
              $ref: '#/components/schemas/DiscoveryRestaurantsV3ModalItemAction'
            secondaryAction:
              type: object
              $ref: '#/components/schemas/DiscoveryRestaurantsV3ModalItemAction'
      x-examples:
        sliminfo_modal_no_secondary_cta:
          value:
            source: braze
            type: slimInfo
            title: Relax, delivery is on us
            message: Enjoy free pizza delivery and more… T&Cs apply
            theme: berry
            imageUrl: http://img.png
            primaryAction:
              text: Find out more
              targets:
                - type: modal
            modal:
              title: Dinner, delivered for free
              message: |-
                Want dinner without the hassle? You got it! Level up your evening with a tasty order from any pizza place, and we’ll treat you to free delivery* when you spend £15. It’s a win-win.

                *Participating stores only. Service charge applies. Ends 30 September. See just-eat.co.uk/info/Free-Delivery for full terms and site exclusions. T&Cs apply.
              imageUrl: http://img.png
              primaryAction:
                type: button
                text: Order Now
                targets:
                  - type: filter
                    value: free_delivery
        slimcta_no_modal:
          value:
            source: braze
            type: slimCta
            title: ¡Sin pedido no hay partido! ⚽
            message: Tu comida favorita al mejor precio
            theme: turmeric
            imageUrl: http://img.png
            primaryAction:
              text: Ver ofertas
              targets:
                - type: filter
                  value: with_discounts
        slimbold_no_modal_no_message_with_cta:
          value:
            source: braze
            type: slimBold
            title: 50% de dto. en farmacia
            theme: cupcake
            imageUrl: http://img.png
            primaryAction:
              text: Ver ofertas
              targets:
                - type: filter
                  value: SERP_CampaignId_12345
    DiscoveryRestaurantsV3BannerItemAction:
      title: Banner Item Action
      description: Action to be triggered.
      type: object
      required:
        - targets
      properties:
        text:
          description: The text to be displayed with the action.
          type: string
        targets:
          description: A list of targets for the action.
          type: array
          items:
            type: object
            required:
              - type
            properties:
              type:
                description: |
                  The type of action.
                  Known values:
                    * `modal` - Action to open the modal component of the banner. 
                    * `url` - Action to redirect users to any external URL to SERP (or menu).
                    * `filter` - Action to open search and apply a filter selection to it.
                    * `partnerMenu` - Action to open partner menu.
                    * `vertical` - Action to open search and apply a vertical selection to it.
                    * `copyCode` - Action to copy text to clipboard (e.g. a voucher code).
                type: string
              value:
                description: |
                  The value to be used with the action type specified.
                  Property requirement:
                    * `modal` - Unused.
                    * `url` - Mandatory.
                    * `filter` - Mandatory.
                    * `partnerMenu` - Mandatory.
                    * `vertical` - Mandatory.
                    * `copyCode` - Mandatory.
                type: string
        trackingInfo:
          type: object
          $ref: '#/components/schemas/DiscoveryRestaurantsV3BannerItemActionTrackingInfo'
    DiscoveryRestaurantsV3BannerItemActionTrackingInfo:
      title: Banner Item Action Tracking Information
      description: Tracking information for client applications.
      type: object
      properties:
        vertical:
          description: |
