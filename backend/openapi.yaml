    PromotedPlacementActivePlacement:
      properties:
        status:
          type: object
          description: Contains status information for different aspects of this placement. 'normal' status is assumed if no additional status information is available.
          properties:
            budget:
              properties:
                code:
                  enum:
                    - budgetLow
                    - budgetExhausted
                  description: The status code that describes this placement's current budget status.
                  type: string
              required:
                - code
              description: The budget status of this placement.
              additionalProperties: true
            contract:
              $ref: '#/components/schemas/PromotedPlacementActivePlacementContractStatus'
            pause:
              properties:
                code:
                  enum:
                    - paused
                  description: The status code that describes this placement's pause status.
                  type: string
                pauseDate:
                  format: date-time
                  description: The UTC date and time at which this placement was paused as a result of a manual action. Available if the status code is "paused".
                  type: string
                resumeDate:
                  format: date-time
                  description: The UTC date and time at which this placement is scheduled to be resumed. Available if the status code is "paused" and a resume date was specified.
                  type: string
              required:
                - code
              description: The pause status of this placement.
              additionalProperties: true
        weeklyBudget:
          $ref: '#/components/schemas/PromotedPlacementWeeklyBudgetStatus'
        purchaseDate:
          format: date-time
          description: The UTC date and time at which this placement was purchased.
          type: string
        salesChannel:
          type: string
          description: The source of the placement's sale.
          enum:
            - telesales
            - selfService
        startDate:
          format: date-time
          description: The UTC date and time at which this placement started, or will start.
          type: string
        deliveryArea:
          description: The location that the placement applies to.
          type: string
        placementId:
          description: The unique identifier of the placement.
          type: string
        availableActions:
          items:
            enum:
              - adjustBudget
              - cancelAtEndOfWeek
              - cancelAtSpecifiedTime
              - cancelImmediately
              - pause
              - resume
              - undoCancel
            type: string
          description: A list of the currently supported actions for this placement.
          type: array
      type: object
      required:
        - availableActions
        - placementId
        - deliveryArea
        - purchaseDate
        - startDate
        - salesChannel
        - weeklyBudget
        - status
      additionalProperties: true
      example:
        status:
          pause:
            code: paused
            pauseDate: '2021-01-14T12:02:32.0000000+00:00'
            resumeDate: '2021-02-12T00:00:00.0000000+00:00'
        weeklyBudget:
          recommended: 13000
          minimumAllowable: 500
          total: 13000
          maximumAllowable: 100000
          remaining: 5000
        purchaseDate: '2021-01-01T14:45:00.0000000+00:00'
        startDate: '2021-01-01T14:45:00.0000000+00:00'
        deliveryArea: NW6
        placementId: '100005'
        salesChannel: telesales
        availableActions:
          - adjustBudget
          - resume
          - cancelAtEndOfWeek
          - cancelImmediately
