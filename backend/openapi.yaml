    MenugeneratorapiMenuUploadInstructions:
      type: object
      properties:
        instructions:
          type: array
          description: The file upload instructions for a set of menu files. There will be an instruction item for each file.
          items:
            type: object
            description: Upload instructions for a single menu file. The instructions enable clients to construct a HTTP request to perform an upload.
            properties:
              url:
                type: string
                description: The URL to perform a PUT request to with the file as the request body.
              headers:
                type: object
                description: The headers to send with the request. The property names are the header names and the property values are the header values.
            required:
              - url
              - headers
      required:
        - instructions
    MenugeneratorapiMenuUploadProcess:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/MenugeneratorapiMenuUploadProcessStatus'
        summary:
          type: string
          description: A short summary that provides additional context to the process status.
          nullable: true
        partnerName:
          type: string
          description: The name of the partner that the menu generator process is for.
        menuTypist:
          type: string
          description: The name of the agent that initiated the menu generator process.
        menuId:
          type: string
          description: The unique identifier of the menu in Skip Menu Builder.
        partnerId:
          type: string
          description: The unique identifier of the restaurant partner belonging to this menu generation process.
        cuisines:
          type: array
          items:
            type: string
          description: The partner's cuisines that will be used as contextual metadata for the menu files.
      required:
        - status
        - description
        - partnerName
        - cuisines
    MenugeneratorapiMenuUploadProcessStatus:
      type: string
      enum:
        - uploading
        - uploaded
        - parsed
        - readyForReview
        - generating
        - generated
        - reviewing
        - reviewed
        - complete
        - error
      description: |
        The status of the menu generator process. It can take the following items:
          * `uploading`      - The user is still in the process of uploading the menu files.
          * `uploaded`       - The user has finished uploading menu files.
          * `parsed`         - The provided menu files have been parsed and a draft menu is ready to be generated.
          * `readyForReview` - The status to move to when it's ready to generate and review the draft menu.
          * `generating`     - Draft menu is being generated using the parsed files.
          * `generated`      - Draft menu is generated.
          * `reviewing`      - Draft menu is being reviewed by the user.
          * `reviewed`       - The status to move to when user is finishing reviewing the draft menu.
          * `complete`       - The status to move to when user published the menu.
          * `error`          - The status to move to when provided menu files could not be processed in such a way to produce a draft menu.
    MenugeneratorapiMenuUploadProcesses:
      type: object
      properties:
        processes:
          items:
            $ref: '#/components/schemas/MenugeneratorapiMenuUploadProcess'
          type: array
          description: List of menu generator processes limited to 100 results.
        after:
          type: string
          description: The last key to use in the next request to get the next page of results.
          nullable: true
