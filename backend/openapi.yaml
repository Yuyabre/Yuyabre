    DeliveryPoolUpdateDeliveryPoolRisk:
      required:
        - riskLevel
      type: object
      description: A change to a delivery pool risk
      properties:
        riskLevel:
          description: |
            The risk level value between 0 and 9 where 0 being little to no "risk" and 9 being at maximum "risk".

            The agreed process for handling missing risk signal values:
              - If the last value < 9, remain online - BAU.
              - If the last value = 9, remain offline.

            The higher risk value, the smaller polygon will be defined.
          type: number
          format: integer
          minimum: 0
          maximum: 9
      example:
        riskLevel: 1
