          description: The identifier of offer causing prompt to be shown
          type: string
      example:
        ItemDiscounts:
          - ProductId: Lemonade1234
            DiscountPercentage: 100
            ModifierGroups:
              - ModifierGroupId: modifier111
                MinimumChoices: 1
