                count: 1
          - name: Coca Cola
            count: 5
            categoryName: Drink
            type: menuItem
            variations:
              - name: 330ml
                count: 2
              - name: 500ml
                count: 2
          - name: Smoky BBQ Chicken
            count: 2
            type: menuItem
            categoryName: 40% off Your Favourites
            variations:
              - name: Small
                count: 4
              - name: Medium
                count: 2
