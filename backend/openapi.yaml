      additionalProperties: false
      nullable: true
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 50
          description: Code for the voucher to apply.
          nullable: false
        status:
          description: The current status of the voucher to apply.
          $ref: '#/components/schemas/CheckoutVouchersVoucherStatus'
    CheckoutCheckoutVoucherV2:
