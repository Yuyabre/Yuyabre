          pattern: \D{2}
        city:
          description: The policy's city name when applicable
          type: string
        name:
          description: The policy's name
          type: string
        description:
          description: The detailed policy's description
          type: string
        weeklyThresholdInHours:
          description: The maximum hours in a week accounted as regular working hours
          type: number
          format: double
        advanceShiftPlanningDays:
          description: The number of days in advance that shifts are planned
          type: integer
          format: int64
        timeScope:
          description: The period of time in which additional compensation should be paid
