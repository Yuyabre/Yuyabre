    MarketingSubscriptionRules:
      description: Rules that define how a restaurant should be subscribed and unsubscribed from a campaign
      additionalProperties: false
      type: object
      title: SubscriptionRules
      properties:
        partnerSubscriptionEnabled:
          nullable: false
          default: false
          description: Whether Partner can manage campaign subscription via self-service tools.
          type: boolean
        minimumSubscribePeriod:
          nullable: true
          description: Period of time during which a restaurant cannot opt out from campaign. The period starts from when the restaurant is subscribed to the campaign.
          format: timespan
          type: string
        unsubscribeNoticePeriod:
          nullable: true
          description: Period of time from when opt out is requested to the when the restaurant is unsubscribed. Notice period includes cancellation period.
          format: timespan
          type: string
        cancelOptOutRequestPeriod:
          nullable: true
          description: Period of time during which a restaurant can cancel the opt-out and remain subscribed to the campaign. Cancellation period starts from when opt out is requested.
          format: timespan
          type: string
        unsubscribeOfferActiveDays:
          nullable: true
          description: Period of time during which the campaign offers remain active after the restaurant is unsubscribed from the campaign.
          format: integer
          minimum: 1
          type: number
        minimumResubscribePeriod:
          nullable: true
          description: Period of time during which a restaurant cannot opt back in. The period starts from when the restaurant is unsubscribed from the campaign.
          format: timespan
          type: string
      example:
        partnerSubscriptionEnabled: true
        minimumSubscribePeriod: 60.00:00:00
        unsubscribeNoticePeriod: 30.00:00:00
        cancelOptOutRequestPeriod: 7.00:00:00
        unsubscribeOfferActiveDays: 90
        minimumResubscribePeriod: 90.00:00:00
    MarketingSubscriptionStatus:
